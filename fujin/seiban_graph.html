<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>製番進捗 - FUJIN</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Meiryo", sans-serif; color: #1f2937; background: #f8fafc; }
body { display: flex; height: 100vh; overflow: hidden; }

/* ヘッダ(製番グラフ全体の説明) */
.sg-head {
  position: sticky; top: 0; z-index: 10;
  padding: 14px 18px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
  color: #fff;
}
.sg-head h1 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: .02em; }
.sg-head .meta { font-size: 11px; opacity: .9; margin-top: 3px; }

/* 左ペイン: 起点製番リスト */
.left {
  width: 420px; min-width: 420px; height: 100vh; overflow-y: auto;
  background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column;
}
.left .search {
  padding: 10px 12px; border-bottom: 1px solid #e5e7eb; background: #f8fafc;
  display: flex; flex-direction: column; gap: 6px;
}
.left .search input {
  width: 100%; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px;
}
.left .search .kpi { display: flex; gap: 10px; font-size: 11.5px; color: #475569; align-items: center; }
.left .search .kpi b { color: #1e3a8a; }
.left .root-list { flex: 1; overflow-y: auto; }
.root-item {
  padding: 10px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; align-items: center;
}
.root-item:hover { background: #eff6ff; }
.root-item.active { background: #dbeafe; border-left: 4px solid #2563eb; padding-left: 10px; }
.root-item .sb {
  font-family: "SF Mono", "Menlo", monospace; font-weight: 700; font-size: 13px; color: #1e3a8a;
  display: flex; align-items: center; gap: 6px;
}
.root-item .kbd {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 700;
}
.kbd-J { background: #dbeafe; color: #1e40af; }
.kbd-K { background: #fce7f3; color: #9d174d; }
.kbd-M { background: #ecfccb; color: #4d7c0f; }
.kbd-X { background: #ede9fe; color: #5b21b6; }
.root-item .name { font-size: 12px; color: #475569; grid-column: 1 / -1; }
.root-item .due { font-size: 11px; color: #64748b; text-align: right; }
.root-item .badges { display: flex; gap: 4px; flex-wrap: wrap; }
.badge { padding: 1px 7px; border-radius: 999px; font-size: 10.5px; font-weight: 700; }
.badge-arr   { background: #fef3c7; color: #92400e; }
.badge-proc  { background: #fee2e2; color: #991b1b; }
.badge-pur   { background: #dbeafe; color: #1e40af; }
.badge-ov    { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.badge-done  { background: #ecfdf5; color: #065f46; }
.badge-down  { background: #fff7ed; color: #9a3412; }

/* 右ペイン: ツリー詳細 */
.right { flex: 1; height: 100vh; overflow-y: auto; padding: 0; }
.right .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; font-size: 14px; }
.detail-head {
  padding: 16px 24px; background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
  border-bottom: 2px solid #c7d2fe;
}
.detail-head .sb-big { font-family: "SF Mono", "Menlo", monospace; font-size: 22px; font-weight: 700; color: #1e3a8a; }
.detail-head .name { font-size: 15px; color: #1f2937; margin-top: 4px; }
.detail-head .row { display: flex; gap: 18px; margin-top: 8px; flex-wrap: wrap; font-size: 12.5px; color: #475569; }
.detail-head .row .k { color: #94a3b8; margin-right: 4px; }
.detail-head .row .v { font-weight: 600; color: #1e3a8a; }
.detail-totals {
  display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;
}
.tile {
  padding: 8px 14px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
  min-width: 100px;
}
.tile .v { font-size: 18px; font-weight: 700; color: #1f2937; }
.tile .l { font-size: 10.5px; color: #64748b; margin-top: 2px; }
.tile.warn { border-color: #fbbf24; background: #fef3c7; }
.tile.warn .v { color: #92400e; }
.tile.danger { border-color: #f87171; background: #fee2e2; }
.tile.danger .v { color: #991b1b; }
.tile.ok { border-color: #86efac; background: #ecfdf5; }
.tile.ok .v { color: #065f46; }

.tree-wrap { padding: 18px 24px; }
.tree-section-title { font-size: 13px; font-weight: 700; color: #1e3a8a; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px dashed #cbd5e1; }
.tree-node {
  margin: 6px 0; padding: 8px 14px;
  background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
  display: grid; grid-template-columns: auto 1fr auto auto; gap: 4px 14px;
  align-items: center;
}
.tree-node.has-residual { border-left: 4px solid #f59e0b; }
.tree-node.done { border-left: 4px solid #10b981; opacity: .85; }
.tree-node .sb {
  font-family: "SF Mono", "Menlo", monospace; font-weight: 700; font-size: 13px;
  color: #1e3a8a; display: flex; align-items: center; gap: 6px;
}
.tree-node .label { font-size: 12px; color: #475569; }
.tree-node .via { font-size: 10.5px; color: #94a3b8; margin-top: 2px; font-style: italic; }
.tree-node .due { font-size: 11px; color: #64748b; white-space: nowrap; }
.tree-node .badges { display: flex; gap: 4px; flex-wrap: wrap; }
.tree-children { margin-left: 28px; border-left: 2px dashed #cbd5e1; padding-left: 14px; margin-top: 4px; }

/* Filter */
.filter-bar {
  display: flex; gap: 12px; padding: 10px 24px; background: #f1f5f9;
  border-bottom: 1px solid #e2e8f0; font-size: 12px; color: #475569;
  position: sticky; top: 0; z-index: 5;
}
.filter-bar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.filter-bar select { padding: 3px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; background: #fff; }

@media (max-width: 900px) {
  body { flex-direction: column; }
  .left { width: 100%; min-width: 0; height: 40vh; }
  .right { height: 60vh; }
}
</style>
</head>
<body>

<div class="left">
  <div class="sg-head">
    <h1>🌐 製番進捗(親子グラフ)</h1>
    <div class="meta" id="metaInfo">読込中…</div>
  </div>
  <div class="search">
    <input id="searchBox" type="search" placeholder="製番・製品名・顧客名で絞り込み" autofocus>
    <div class="kpi">
      <span>表示中: <b id="visibleCount">0</b> / <b id="totalCount">0</b></span>
      <span>残あり: <b id="residualCount" style="color:#dc2626">0</b></span>
    </div>
  </div>
  <div class="root-list" id="rootList"></div>
</div>

<div class="right">
  <div id="rightContent" class="empty">
    左の起点製番を選択してください
  </div>
</div>

<script src="seiban_graph.js"
        onerror="window.SEIBAN_GRAPH={meta:{},roots:[],seibans:{},item_names:{}};"></script>
<script>
const G = window.SEIBAN_GRAPH || {meta:{}, roots:[], seibans:{}, item_names:{}};
const SEIBANS = G.seibans || {};
const ITEM_NAMES = G.item_names || {};
const ROOTS = G.roots || [];

const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function fmtDate(s) {
  if (!s) return '';
  s = String(s).replace(/[\/\-]/g, '');
  if (s.length === 8 && /^\d{8}$/.test(s)) return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}`;
  return s;
}

function getInfo(sb) {
  return SEIBANS[sb] || {kind:'?', item_code:'', item_name:'', customer:'', due:'', qty:0, remain:0, residual:{arr:0,proc:0,pur:0,n_arr:0,n_proc:0,n_pur:0,overdue:0,has_residual:false}};
}

// メタ情報
function renderMeta() {
  const m = G.meta || {};
  document.getElementById('metaInfo').innerHTML = `生成: ${escapeHtml(m.generated||'?')} ／ 基準日: ${escapeHtml(m.basis_date||'?')} ／ 起点製番(残あり) <b>${(m.n_roots||0).toLocaleString()}</b>件`;
  document.getElementById('totalCount').textContent = ROOTS.length.toLocaleString();
}

// 起点製番リスト
function renderRootList(filterText = '') {
  const tbody = document.getElementById('rootList');
  const q = filterText.trim().toLowerCase();
  let visible = 0, residual = 0;
  const items = ROOTS.filter(r => {
    const info = getInfo(r.s);
    if (!q) return true;
    const hay = `${r.s} ${info.item_code} ${info.item_name} ${info.customer}`.toLowerCase();
    return hay.includes(q);
  });
  tbody.innerHTML = items.slice(0, 500).map(r => {
    const info = getInfo(r.s);
    const own = info.residual;
    const tot = r.totals;
    if (own.has_residual || tot.n_with_residual > 0) residual++;
    visible++;
    const ownBadges = [];
    if (own.n_arr > 0)  ownBadges.push(`<span class="badge badge-arr">未確定${own.n_arr}</span>`);
    if (own.n_proc > 0) ownBadges.push(`<span class="badge badge-proc">工程残${own.n_proc}</span>`);
    if (own.n_pur > 0)  ownBadges.push(`<span class="badge badge-pur">発注残${own.n_pur}</span>`);
    if (own.overdue > 0) ownBadges.push(`<span class="badge badge-ov">⚠期限超${own.overdue}</span>`);
    let downBadge = '';
    if (tot.n_with_residual > 0) downBadge = `<span class="badge badge-down">下流${tot.n_with_residual}件残</span>`;
    if (ownBadges.length === 0 && !downBadge) {
      ownBadges.push(`<span class="badge badge-done">✓完納</span>`);
    }
    return `<div class="root-item" data-sb="${escapeHtml(r.s)}">
      <div class="sb"><span class="kbd kbd-${info.kind}">${escapeHtml(info.kind)}</span>${escapeHtml(r.s)}</div>
      <div class="due">${escapeHtml(fmtDate(info.due))}</div>
      <div class="name">${escapeHtml(info.item_name || info.item_code || '(品目情報なし)')}${info.customer ? ' / '+escapeHtml(info.customer):''}</div>
      <div class="badges">${ownBadges.join('')}${downBadge}</div>
    </div>`;
  }).join('') + (items.length > 500 ? '<div style="padding:10px 14px;color:#94a3b8;font-size:12px;text-align:center">…他 ' + (items.length - 500).toLocaleString() + ' 件 (絞り込み推奨)</div>' : '');
  document.getElementById('visibleCount').textContent = visible.toLocaleString();
  document.getElementById('residualCount').textContent = residual.toLocaleString();
  tbody.querySelectorAll('.root-item').forEach(el => {
    el.addEventListener('click', () => {
      tbody.querySelectorAll('.root-item.active').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
      renderDetail(el.dataset.sb);
    });
  });
}

// 詳細ペイン
function renderDetail(sb) {
  const root = ROOTS.find(r => r.s === sb);
  if (!root) return;
  const info = getInfo(sb);
  const res = info.residual;
  const tot = root.totals;
  const rcEl = document.getElementById('rightContent');
  rcEl.className = '';
  const ownTotalUnits = (res.arr + res.proc + res.pur);
  rcEl.innerHTML = `
    <div class="detail-head">
      <div class="sb-big"><span class="kbd kbd-${info.kind}" style="font-size:11px;padding:2px 8px;vertical-align:middle">${escapeHtml(info.kind)}</span> ${escapeHtml(sb)}</div>
      <div class="name">${escapeHtml(info.item_name)} <span style="color:#94a3b8;font-family:monospace;font-size:12px">${escapeHtml(info.item_code)}</span></div>
      <div class="row">
        ${info.customer ? `<div><span class="k">得意先</span><span class="v">${escapeHtml(info.customer)}</span></div>` : ''}
        ${info.due ? `<div><span class="k">納期</span><span class="v">${escapeHtml(fmtDate(info.due))}</span></div>` : ''}
        ${info.qty ? `<div><span class="k">受注数</span><span class="v">${info.qty}</span> ／ <span class="k">残</span><span class="v">${info.remain}</span></div>` : ''}
      </div>
      <div class="detail-totals">
        <div class="tile ${res.n_arr+res.n_proc+res.n_pur > 0 ? 'warn' : 'ok'}">
          <div class="v">${res.n_arr + res.n_proc + res.n_pur}</div>
          <div class="l">自身の残件数(未確定${res.n_arr}+工程${res.n_proc}+発注${res.n_pur})</div>
        </div>
        <div class="tile ${tot.n_with_residual > 0 ? 'warn' : 'ok'}">
          <div class="v">${tot.n_with_residual} / ${tot.n_total}</div>
          <div class="l">下流製番(残あり/全派生)</div>
        </div>
        ${tot.n_overdue > 0 ? `<div class="tile danger"><div class="v">${tot.n_overdue}</div><div class="l">下流の期限超過</div></div>` : ''}
        ${res.overdue > 0 ? `<div class="tile danger"><div class="v">${res.overdue}</div><div class="l">自身の期限超過</div></div>` : ''}
      </div>
    </div>
    <div class="filter-bar">
      <label><input type="checkbox" id="onlyResidual"> 残ありのみ表示</label>
      <label><input type="checkbox" id="onlyOverdue"> 期限超過のみ</label>
      <span style="color:#94a3b8;margin-left:auto">凡例: <span class="badge badge-arr">未確定</span> <span class="badge badge-proc">工程残</span> <span class="badge badge-pur">発注残</span> <span class="badge badge-ov">⚠期限超</span></span>
    </div>
    <div class="tree-wrap">
      <div class="tree-section-title">⬇ 派生製番ツリー (BOM経由でつながる別製番)</div>
      <div id="treeBody"></div>
    </div>
  `;
  renderTree(root.tree, document.getElementById('treeBody'));
  document.getElementById('onlyResidual').addEventListener('change', () => renderTree(root.tree, document.getElementById('treeBody')));
  document.getElementById('onlyOverdue').addEventListener('change', () => renderTree(root.tree, document.getElementById('treeBody')));
}

function nodeHtml(n) {
  const info = getInfo(n.s);
  const res = info.residual;
  const itName = ITEM_NAMES[n.v] || n.v;
  const onlyResidual = document.getElementById('onlyResidual')?.checked || false;
  const onlyOverdue  = document.getElementById('onlyOverdue')?.checked || false;
  // 子孫まで含めた residual / overdue を集計
  function hasResidualDeep(nodes) {
    for (const x of nodes) {
      const ix = getInfo(x.s).residual;
      if (ix.has_residual) return true;
      if (hasResidualDeep(x.c||[])) return true;
    }
    return false;
  }
  function hasOverdueDeep(nodes) {
    for (const x of nodes) {
      if (getInfo(x.s).residual.overdue > 0) return true;
      if (hasOverdueDeep(x.c||[])) return true;
    }
    return false;
  }
  const selfMatchResidual = res.has_residual;
  const childMatchResidual = hasResidualDeep(n.c||[]);
  const selfMatchOverdue = res.overdue > 0;
  const childMatchOverdue = hasOverdueDeep(n.c||[]);
  if (onlyResidual && !(selfMatchResidual || childMatchResidual)) return '';
  if (onlyOverdue && !(selfMatchOverdue || childMatchOverdue)) return '';

  const badges = [];
  if (res.n_arr > 0)  badges.push(`<span class="badge badge-arr">未${res.n_arr}</span>`);
  if (res.n_proc > 0) badges.push(`<span class="badge badge-proc">工${res.n_proc}</span>`);
  if (res.n_pur > 0)  badges.push(`<span class="badge badge-pur">注${res.n_pur}</span>`);
  if (res.overdue > 0) badges.push(`<span class="badge badge-ov">⚠超${res.overdue}</span>`);
  if (badges.length === 0) badges.push(`<span class="badge badge-done">✓完納</span>`);

  const cls = res.has_residual ? 'has-residual' : 'done';
  const dueStr = info.due ? `<div class="due">${escapeHtml(fmtDate(info.due))}</div>` : '<div></div>';
  const itemDisp = info.item_name ? `${escapeHtml(info.item_name)} <span style="color:#94a3b8;font-family:monospace;font-size:10.5px">${escapeHtml(info.item_code)}</span>` : escapeHtml(info.item_code || '(品目情報なし)');
  const viaDisp = n.v ? `<div class="via">↑経由部品: ${escapeHtml(itName)} <span style="font-family:monospace;color:#cbd5e1">${escapeHtml(n.v)}</span> (${n.src})</div>` : '';
  let html = `<div class="tree-node ${cls}">
    <div class="sb"><span class="kbd kbd-${info.kind}">${escapeHtml(info.kind)}</span>${escapeHtml(n.s)}</div>
    <div>
      <div class="label">${itemDisp}${info.customer ? ' <span style="color:#94a3b8">/ '+escapeHtml(info.customer)+'</span>' : ''}</div>
      ${viaDisp}
    </div>
    <div class="badges">${badges.join('')}</div>
    ${dueStr}
  </div>`;
  // 子孫を含める(残ありフィルター時、子側だけ残ありなら親も表示する仕様 = 上記)
  if (n.c && n.c.length) {
    const childHtml = n.c.map(nodeHtml).filter(s => s).join('');
    if (childHtml) {
      html += `<div class="tree-children">${childHtml}</div>`;
    }
  }
  return html;
}

function renderTree(nodes, container) {
  if (!nodes || nodes.length === 0) {
    container.innerHTML = '<div style="padding:14px;color:#94a3b8;font-size:13px">派生製番はありません(自身の手配のみ)</div>';
    return;
  }
  const html = nodes.map(nodeHtml).filter(s => s).join('');
  container.innerHTML = html || '<div style="padding:14px;color:#94a3b8;font-size:13px">フィルター条件に一致する派生製番はありません</div>';
}

// 検索バインド
document.getElementById('searchBox').addEventListener('input', e => {
  renderRootList(e.target.value);
});

// 初期表示
renderMeta();
renderRootList();
</script>

</body>
</html>
