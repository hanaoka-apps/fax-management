<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>製番進捗 - FUJIN</title>
<style>
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans","Noto Sans JP", sans-serif;
  color:#1f2937; background:#f8fafc;
}
body { display:flex; flex-direction:column; overflow:hidden; }
.head {
  height:48px; background:linear-gradient(135deg,#0f766e 0%,#14b8a6 100%); color:#fff;
  display:flex; align-items:center; padding:0 18px; gap:14px; flex-shrink:0;
}
.head h1 { font-size:15px; font-weight:700; margin:0; letter-spacing:.02em; }
.head .meta { font-size:11px; opacity:.9; }

/* ===== ツールバー ===== */
.toolbar {
  background:#fff; border-bottom:1px solid #e5e7eb; padding:9px 14px;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center; flex-shrink:0;
}
.toolbar .field { display:flex; align-items:center; gap:5px; font-size:11.5px; color:#475569; font-weight:600; }
.toolbar select, .toolbar input { padding:4px 8px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px; font-family:inherit; }
.toolbar .kpi {
  font-size:11px; color:#475569; padding:3px 10px; background:#f1f5f9; border-radius:999px;
}
.toolbar .kpi b { color:#0f766e; font-size:13px; }

/* ===== 本体: 左右2ペイン ===== */
.wrap { flex:1; display:flex; overflow:hidden; }
.list { width:55%; min-width:480px; overflow:auto; background:#fff; border-right:1px solid #e5e7eb; }
.detail { flex:1; overflow:auto; padding:18px; background:#f8fafc; }

/* ===== 一覧テーブル ===== */
.list table { width:100%; border-collapse:collapse; font-size:12px; }
.list thead { position:sticky; top:0; background:#f1f5f9; z-index:1; }
.list th { padding:7px 9px; text-align:left; font-weight:600; color:#475569; border-bottom:2px solid #e5e7eb; white-space:nowrap; cursor:pointer; user-select:none; }
.list th:hover { background:#e2e8f0; }
.list th .arrow { color:#0f766e; font-size:9px; margin-left:3px; }
.list td { padding:6px 9px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
.list tr { cursor:pointer; }
.list tr:hover td { background:#f0fdfa; }
.list tr.selected td { background:#ccfbf1; }
.sb { font-family:"SF Mono","Menlo",monospace; font-weight:600; color:#0f766e; font-size:11.5px; }
.code { font-family:"SF Mono","Menlo",monospace; font-weight:600; color:#1e40af; font-size:11.5px; }
.pname { color:#1f2937; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block; vertical-align:middle; }
.customer { color:#64748b; font-size:11px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.tag-uncomp   { background:#fef3c7; color:#92400e; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; }
.tag-comp     { background:#dcfce7; color:#166534; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; }
.tag-situation { padding:1px 7px; border-radius:4px; font-size:10px; font-weight:700; }
.tag-situation.no_arrange { background:#fee2e2; color:#991b1b; }
.tag-situation.in_progress { background:#cffafe; color:#155e75; }
.tag-situation.all_done { background:#dcfce7; color:#166534; }
.tag-situation.stopped { background:#fed7aa; color:#9a3412; }
.orders-list { margin:8px 0 14px; padding:8px 12px; background:#f8fafc; border-radius:6px; font-size:11.5px; }
.orders-list .o { padding:3px 0; color:#475569; border-bottom:1px dashed #e5e7eb; }
.orders-list .o:last-child { border-bottom:none; }
.orders-list .o .onum { font-family:"SF Mono","Menlo",monospace; color:#7c3aed; font-weight:600; margin-right:6px; }
.orders-list .o .ocode { font-family:"SF Mono","Menlo",monospace; color:#1e40af; font-weight:600; margin-right:6px; }
.orders-list .o .ostate.comp { color:#166534; font-weight:700; }
.orders-list .o .ostate.uncomp { color:#92400e; font-weight:700; }
.bar-wrap { display:flex; align-items:center; gap:6px; }
.bar { display:inline-block; width:80px; height:8px; background:#e5e7eb; border-radius:4px; overflow:hidden; vertical-align:middle; }
.bar > div { height:100%; background:linear-gradient(90deg,#14b8a6 0%,#0f766e 100%); }
.bar > div.warn { background:linear-gradient(90deg,#f59e0b 0%,#d97706 100%); }
.bar > div.danger { background:linear-gradient(90deg,#ef4444 0%,#b91c1c 100%); }
.due { font-size:11px; color:#475569; }
.due.overdue { color:#b91c1c; font-weight:700; }
.empty { padding:40px 20px; text-align:center; color:#94a3b8; }

/* ===== 詳細パネル ===== */
.detail .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; max-width:900px; }
.detail .card .head2 { padding:14px 18px; background:linear-gradient(135deg,#f0fdfa 0%,#ccfbf1 100%); border-bottom:1px solid #5eead4; }
.detail .card .head2 h2 { margin:0 0 6px; font-size:16px; color:#134e4a; }
.detail .card .head2 .sb { font-size:18px; }
.detail .card .head2 .meta2 { font-size:12px; color:#475569; margin-top:6px; line-height:1.7; }
.detail .card .body2 { padding:14px 18px; }
.detail .placeholder { text-align:center; padding:60px 30px; color:#94a3b8; }
.detail .placeholder .ico { font-size:64px; opacity:.3; margin-bottom:12px; }

/* KPIカード */
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:14px; }
.kpi-card { padding:9px 12px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:8px; }
.kpi-card .l { font-size:10.5px; color:#64748b; font-weight:600; }
.kpi-card .v { font-size:20px; font-weight:700; color:#1f2937; margin-top:3px; }
.kpi-card.manufactured .v { color:#166534; }
.kpi-card.in_progress  .v { color:#0e7490; }
.kpi-card.arranged     .v { color:#1e40af; }
.kpi-card.unarranged   .v { color:#7c2d12; }
.kpi-card.overdue      .v { color:#b91c1c; }

/* 部品テーブル */
.parts-table { width:100%; border-collapse:collapse; font-size:11.5px; }
.parts-table thead th { padding:6px 8px; background:#f1f5f9; color:#475569; font-weight:600; text-align:left; border-bottom:2px solid #e5e7eb; position:sticky; top:0; white-space:nowrap; }
.parts-table td { padding:5px 8px; border-bottom:1px solid #f1f5f9; }
.parts-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.parts-table .status { font-size:10.5px; padding:1px 6px; border-radius:999px; font-weight:700; }
.parts-table .status.manufactured { background:#dcfce7; color:#166534; }
.parts-table .status.in_progress { background:#cffafe; color:#155e75; }
.parts-table .status.arranged { background:#dbeafe; color:#1e40af; }
.parts-table .status.unarranged { background:#fed7aa; color:#9a3412; }
.parts-table .ov-mark { color:#b91c1c; font-weight:700; font-size:10px; margin-left:4px; }
.parts-toolbar { display:flex; gap:8px; align-items:center; margin:10px 0 6px; flex-wrap:wrap; }
.parts-toolbar input { padding:4px 8px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px; font-family:inherit; }
.parts-toolbar select { padding:4px 8px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px; font-family:inherit; }
.parts-toolbar .info { font-size:11px; color:#64748b; }
.csv-btn { padding:4px 12px; background:#0f766e; color:#fff; border:none; border-radius:5px; font-size:11.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.csv-btn:hover { background:#134e4a; }

@media print {
  .head, .toolbar, .list { display:none !important; }
  .detail { overflow:visible; padding:0; }
  .detail .card { box-shadow:none; max-width:100%; border:none; }
  body { overflow:visible; }
}
</style>
</head>
<body>

<div class="head">
  <h1>🏭 製番進捗</h1>
  <span class="meta" id="metaSpan">—</span>
</div>

<div class="toolbar">
  <div class="field">
    <label>接頭辞:</label>
    <select id="prefSel"><option value="">全て</option></select>
  </div>
  <div class="field">
    <label>状況:</label>
    <select id="statusSel">
      <option value="active">手配あり (進行中+止まり)</option>
      <option value="">全て</option>
      <option value="in_progress">進行中のみ</option>
      <option value="stopped">止まり (手配なし)</option>
      <option value="no_arrange">未着手 (受注のみ)</option>
      <option value="all_done">完納のみ</option>
    </select>
  </div>
  <div class="field">
    <label>検索:</label>
    <input id="searchInp" type="search" placeholder="製番/品目/顧客名" style="width:180px">
  </div>
  <div class="field">
    <label>進捗率:</label>
    <select id="progressSel">
      <option value="">全て</option>
      <option value="0-0.25">0〜25%</option>
      <option value="0.25-0.75">25〜75%</option>
      <option value="0.75-1">75〜100%</option>
    </select>
  </div>
  <span class="kpi" id="kpiBox">—</span>
</div>

<div class="wrap">
  <div class="list">
    <table id="seibanTable">
      <thead><tr>
        <th data-sort="sb">製番</th>
        <th data-sort="product_code">製品</th>
        <th data-sort="customer">顧客</th>
        <th data-sort="due_date">納期</th>
        <th class="num" data-sort="qty_remain">残量</th>
        <th data-sort="progress_rate">進捗</th>
        <th class="num" data-sort="parts_overdue">遅延部品</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="detail" id="detail">
    <div class="placeholder">
      <div class="ico">🏭</div>
      <div>左の一覧から製番を選ぶと、部品ごとの進捗が表示されます</div>
    </div>
  </div>
</div>

<!-- 製番進捗データ (window.SEIBAN_DATA = {meta, seibans}) -->
<script src="seiban_progress.js" onerror="window.SEIBAN_DATA=null;"></script>
<script>
let DATA = null;
let SEIBANS = [];
let CURRENT = null;
let TODAY_YMD = "";
let sortCol = "due_date";
let sortDir = 1; // 1 asc / -1 desc

function load() {
  DATA = window.SEIBAN_DATA;
  if (!DATA) {
    document.getElementById("detail").innerHTML = `<div class="placeholder"><div class="ico">📭</div><div>seiban_progress.js が読み込めません</div><div style="font-size:11px;margin-top:8px;color:#94a3b8">build_seiban_progress.py を実行して再配布してください</div></div>`;
    return;
  }
  SEIBANS = DATA.seibans || [];
  document.getElementById("metaSpan").textContent =
    `生成: ${DATA.meta.generated} ／ 基準日: ${DATA.meta.basis_date} ／ ${DATA.meta.n_seibans.toLocaleString()}製番`;
  // 接頭辞セレクト
  const prefs = Object.keys(DATA.meta.pref_counts || {}).sort();
  const prefSel = document.getElementById("prefSel");
  prefs.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p; opt.textContent = `${p} (${DATA.meta.pref_counts[p].toLocaleString()})`;
    prefSel.appendChild(opt);
  });
  // 基準日からYYYYMMDD
  TODAY_YMD = (DATA.meta.basis_date || "").replace(/[/-]/g,"");
  render();
}
window.addEventListener('error', e => {
  console.error('[seiban_progress] error:', e.message);
});

function applyFilters(arr) {
  const pref = document.getElementById("prefSel").value;
  const status = document.getElementById("statusSel").value;
  const q = (document.getElementById("searchInp").value || "").toLowerCase().trim();
  const prog = document.getElementById("progressSel").value;
  return arr.filter(s => {
    if (pref && s.pref !== pref) return false;
    // 状況フィルター: active=手配あり / 各situation / 全て(空)
    if (status === "active" && !s.has_arrange) return false;
    if (status && status !== "active" && s.situation !== status) return false;
    if (q) {
      const blob = (s.sb + " " + s.product_code + " " + (s.product_name||"") + " " + (s.customer||"")
                    + " " + (s.orders||[]).map(o=>(o.onum||"")+" "+(o.name||"")).join(" ")).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    if (prog) {
      const [lo, hi] = prog.split("-").map(Number);
      if (s.progress_rate < lo || s.progress_rate > hi) return false;
    }
    return true;
  });
}

const SITUATION_LABEL = {
  no_arrange: "未着手",
  in_progress: "進行中",
  stopped: "止まり",
  all_done: "完納",
};

function render() {
  let arr = applyFilters(SEIBANS);
  arr.sort((a,b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (av === bv) return 0;
    return ((av < bv) ? -1 : 1) * sortDir;
  });
  document.getElementById("kpiBox").innerHTML = `表示 <b>${arr.length.toLocaleString()}</b> / 全 ${SEIBANS.length.toLocaleString()}`;
  const tbody = document.querySelector("#seibanTable tbody");
  if (arr.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">条件に合う製番なし</td></tr>';
    return;
  }
  tbody.innerHTML = arr.slice(0, 500).map(s => {
    const dueD = parseDateYmd(s.due_date);
    const isOverdue = s.is_uncomp && dueD && TODAY_YMD && dueD < TODAY_YMD;
    const barCls = s.progress_rate >= 0.75 ? "" : (s.progress_rate >= 0.25 ? "warn" : "danger");
    const pctw = Math.round((s.progress_rate||0) * 100);
    const sitTag = `<span class="tag-situation ${s.situation}">${SITUATION_LABEL[s.situation]||s.situation}</span>`;
    return `<tr data-sb="${escapeAttr(s.sb)}">
      <td><span class="sb">${escapeHtml(s.sb)}</span> ${sitTag}</td>
      <td><span class="code">${escapeHtml(s.product_code||"-")}</span><br><span class="pname">${escapeHtml(s.product_name||"")}</span></td>
      <td><span class="customer">${escapeHtml(s.customer||"-")}</span></td>
      <td><span class="due ${isOverdue?'overdue':''}">${formatDate(s.due_date)}</span></td>
      <td class="num">${(s.qty_remain||0).toLocaleString()}</td>
      <td>
        ${s.parts_total > 0 ? `<div class="bar-wrap">
          <div class="bar"><div class="${barCls}" style="width:${pctw}%"></div></div>
          <span style="font-size:11px;color:#475569;width:60px">${pctw}% (${s.parts_manufactured}/${s.parts_total})</span>
        </div>` : '<span style="color:#94a3b8;font-size:11px">手配なし</span>'}
      </td>
      <td class="num">${s.parts_overdue ? '<span style="color:#b91c1c;font-weight:700">'+s.parts_overdue+'</span>' : 0}</td>
    </tr>`;
  }).join("") + (arr.length > 500 ? '<tr><td colspan="7" class="empty">…他あり (絞り込みを推奨)</td></tr>' : "");
  tbody.querySelectorAll("tr[data-sb]").forEach(tr => {
    tr.onclick = () => {
      tbody.querySelectorAll("tr").forEach(x => x.classList.remove("selected"));
      tr.classList.add("selected");
      renderDetail(tr.dataset.sb);
    };
  });
}

function renderDetail(sb) {
  const s = SEIBANS.find(x => x.sb === sb);
  if (!s) return;
  CURRENT = s;
  const dueD = parseDateYmd(s.due_date);
  const isOverdue = s.is_uncomp && dueD && TODAY_YMD && dueD < TODAY_YMD;
  const pct = Math.round((s.progress_rate||0)*100);
  const sitTag = `<span class="tag-situation ${s.situation}">${SITUATION_LABEL[s.situation]||s.situation}</span>`;
  const bomTag = s.has_seiban_bom ? '<span style="background:#bbf7d0;color:#166534;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px">📗 製番別BOM登録</span>' : '';
  let ordersHtml = "";
  if (s.orders && s.orders.length > 0) {
    ordersHtml = `<div class="orders-list">
      <div style="font-weight:700;color:#1f2937;margin-bottom:4px">受注 ${s.orders.length}件</div>
      ${s.orders.map(o => `<div class="o">
        <span class="onum">${escapeHtml(o.onum||"-")}</span>
        <span class="ocode">${escapeHtml(o.code||"")}</span>
        <span>${escapeHtml(o.name||"")}</span>
        / 顧客 <strong>${escapeHtml(o.customer||"-")}</strong>
        / 納期 ${formatDate(o.due)}
        / 数量 <strong>${o.qty}</strong> 売上済 ${o.sold} 残 <strong>${o.remain}</strong>
        / <span class="ostate ${o.comp?'comp':'uncomp'}">${o.comp?'完納':'未完納'}</span>
      </div>`).join("")}
    </div>`;
  }
  document.getElementById("detail").innerHTML = `
    <div class="card">
      <div class="head2">
        <h2><span class="sb">${escapeHtml(s.sb)}</span> ${sitTag}${bomTag}</h2>
        <div style="font-size:14px;color:#1f2937;margin-top:4px"><span class="code">${escapeHtml(s.product_code||"-")}</span> ${escapeHtml(s.product_name||"")}</div>
        <div class="meta2">
          顧客: <strong>${escapeHtml(s.customer||"-")}</strong> ／ 納期: <strong class="${isOverdue?'due overdue':''}">${formatDate(s.due_date)}</strong>
          ／ 受注数量: <strong>${(s.qty||0).toLocaleString()}</strong> ／ 残量: <strong>${(s.qty_remain||0).toLocaleString()}</strong>
          ${s.orders_count > 1 ? `／ 受注<strong>${s.orders_count}件</strong>` : ""}
        </div>
        ${ordersHtml}
      </div>
      <div class="body2">
        <div class="kpis">
          <div class="kpi-card"><div class="l">手配品目</div><div class="v">${s.parts_total}</div></div>
          <div class="kpi-card manufactured"><div class="l">完納</div><div class="v">${s.parts_manufactured}</div></div>
          <div class="kpi-card in_progress"><div class="l">進行中</div><div class="v">${s.parts_in_progress}</div></div>
          <div class="kpi-card arranged"><div class="l">手配済(着手前)</div><div class="v">${s.parts_arranged}</div></div>
          ${s.has_seiban_bom ? `<div class="kpi-card unarranged"><div class="l">BOM未手配候補</div><div class="v">${s.parts_unarranged}</div></div>` : ''}
          <div class="kpi-card overdue"><div class="l">納期遅延</div><div class="v">${s.parts_overdue}</div></div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:12px;color:#475569;margin-bottom:4px">進捗率: <strong>${pct}%</strong> (完納${s.parts_manufactured} + 進行中${s.parts_in_progress}×0.5 / ${s.parts_total})</div>
          <div class="bar" style="width:100%;height:14px"><div class="${pct>=75?'':(pct>=25?'warn':'danger')}" style="width:${pct}%"></div></div>
        </div>
        <div class="parts-toolbar">
          <input id="partsSearch" type="search" placeholder="部品コード/名で絞り込み" style="width:200px">
          <select id="partsStatusSel">
            <option value="">全状態</option>
            <option value="unarranged">手配漏れのみ</option>
            <option value="arranged">手配済のみ</option>
            <option value="in_progress">進行中のみ</option>
            <option value="manufactured">完納のみ</option>
            <option value="overdue">遅延のみ</option>
          </select>
          <span class="info" id="partsCount">${s.parts_total}件</span>
          <button class="csv-btn" onclick="downloadCsv()">📥 部品リストCSV</button>
        </div>
        <div style="max-height:60vh;overflow:auto">
          <table class="parts-table" id="partsTable">
            <thead><tr>
              <th>状態</th><th>品目コード</th><th>品目名</th>
              <th class="num">必要</th><th class="num">手配数</th><th class="num">報告済</th><th>納期</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  renderParts();
  document.getElementById("partsSearch").addEventListener("input", renderParts);
  document.getElementById("partsStatusSel").addEventListener("change", renderParts);
}

function renderParts() {
  if (!CURRENT) return;
  const q = (document.getElementById("partsSearch").value || "").toLowerCase().trim();
  const stf = document.getElementById("partsStatusSel").value;
  let arr = CURRENT.parts || [];
  if (q) arr = arr.filter(p => (p.c + " " + (p.n||"")).toLowerCase().includes(q));
  if (stf === "overdue") arr = arr.filter(p => p.ov);
  else if (stf) arr = arr.filter(p => p.s === stf);
  document.getElementById("partsCount").textContent = `${arr.length}件 / 全${CURRENT.parts_total}件`;
  const tbody = document.querySelector("#partsTable tbody");
  const statusLabel = {manufactured:"完納", in_progress:"進行中", arranged:"手配済", unarranged:"手配漏れ", unknown:"-"};
  tbody.innerHTML = arr.map(p => `
    <tr>
      <td><span class="status ${p.s}">${statusLabel[p.s]||p.s}</span>${p.ov?'<span class="ov-mark">⚠遅延</span>':''}</td>
      <td><span class="code">${escapeHtml(p.c)}</span></td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(p.n||"")}</td>
      <td class="num">${p.q}</td>
      <td class="num">${p.aq||0}</td>
      <td class="num">${p.ar||0}</td>
      <td>${formatDate(p.due||"")}</td>
    </tr>
  `).join("") || '<tr><td colspan="7" class="empty">該当部品なし</td></tr>';
}

function downloadCsv() {
  if (!CURRENT) return;
  const headers = ["状態","品目コード","品目名","必要数","手配数","報告済","遅延","納期"];
  const lines = [headers.join(",")];
  for (const p of CURRENT.parts) {
    lines.push([p.s, p.c, (p.n||"").replace(/,/g," "), p.q, p.aq||0, p.ar||0, p.ov?"遅延":"", p.due||""].join(","));
  }
  const blob = new Blob(["﻿"+lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,16).replace(/[-T:]/g,"");
  a.href = url; a.download = `製番部品_${CURRENT.sb}_${ts}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function parseDateYmd(s) {
  s = (s || "").replace(/[/-]/g,"");
  return (s.length===8 && /^\d+$/.test(s)) ? s : "";
}
function formatDate(s) {
  s = (s || "").replace(/[/-]/g,"");
  if (s.length===8 && /^\d+$/.test(s)) return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}`;
  return s || "-";
}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}

// イベントバインド
["prefSel","statusSel","progressSel"].forEach(id => document.getElementById(id).addEventListener("change", render));
document.getElementById("searchInp").addEventListener("input", render);
document.querySelectorAll("th[data-sort]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortDir = -sortDir;
    else { sortCol = col; sortDir = (col === "due_date" || col === "sb") ? 1 : -1; }
    render();
  });
});

load();
</script>
