<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>FUJIN 受注追跡</title>
<style>
:root{
  --bg:#f4f5f7; --panel:#fff; --line:#e5e7eb; --muted:#6b7280; --text:#1f2937;
  --primary:#2563eb; --primary-dark:#1e3a8a; --good:#16a34a; --warn:#c27903; --bad:#b91c1c;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:"Hiragino Sans","Meiryo",sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.55}
header{padding:14px 24px;background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);color:#fff}
header h1{margin:0;font-size:18px;font-weight:600}
header .meta{font-size:12px;opacity:.92;margin-top:3px}
main{padding:14px 24px 60px;max-width:1700px;margin:0 auto}

.kpi-bar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.kpi{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;min-width:140px}
.kpi .l{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.kpi .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:2px}
.kpi.good .v{color:var(--good)} .kpi.warn .v{color:var(--warn)} .kpi.bad .v{color:var(--bad)}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-family:inherit}
.toolbar input[type=search]{min-width:240px}
.toolbar .count{margin-left:auto;font-size:12px;color:var(--muted)}
.toolbar .btn{padding:6px 14px;background:#fff;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.toolbar .btn:hover{background:#f8fafc}
.toolbar .btn.primary{background:#1e293b;color:#fff;border-color:#1e293b}

.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#f1f5f9;color:#475569;font-weight:700;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:11.5px;letter-spacing:.02em}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{background:#e2e8f0}
tbody td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:hover{background:#eff6ff}
.mono{font-family:"SF Mono","Menlo",monospace}
.bd{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.bd-good{background:#dcfce7;color:#166534}
.bd-bad{background:#fecaca;color:#7f1d1d}
.bd-warn{background:#fef3c7;color:#92400e}
.bd-mid{background:#e2e8f0;color:#475569}
.bd-j{background:#ffe1d0;color:#a04418}
.bd-m{background:#d8ecff;color:#1c4a9c}
.bd-k{background:#eadcf5;color:#5b2f85}

.overdue-cell{color:#a16207;font-weight:600}
.due-near{background:#fef3c7;color:#92400e}
.due-past{background:#fecaca;color:#7f1d1d}

/* モーダル */
#omdl{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100}
#omdl.show{display:flex}
#omdl .box{background:#fff;border-radius:10px;padding:22px 26px;width:min(900px,95%);max-height:88vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
#omdl h3{margin:0 0 10px;font-size:16px}
#omdl .sec{margin-bottom:14px}
#omdl .sec h4{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:0 0 6px}
#omdl .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
#omdl .cell{background:#f8fafc;border:1px solid var(--line);border-radius:6px;padding:8px 10px}
#omdl .cell .l{font-size:10px;color:var(--muted)}
#omdl .cell .v{font-size:14px;font-weight:600;margin-top:2px}
#omdl .cell.good .v{color:var(--good)} #omdl .cell.warn .v{color:var(--warn)} #omdl .cell.bad .v{color:var(--bad)}
#omdl .close{margin-top:10px;padding:7px 16px;background:#1e293b;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
#omdl table{font-size:11.5px}
#omdl table th{background:#f1f5f9;padding:5px 7px}
#omdl table td{padding:5px 7px}
.hint{font-size:10.5px;color:var(--muted);font-style:italic}
.judgement{padding:10px 14px;border-radius:8px;margin-bottom:10px;font-size:13px;font-weight:600}
.judgement.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
.judgement.ng{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.judgement.unknown{background:#f1f5f9;color:#475569;border:1px solid var(--line)}

/* BOM構成ビュー: iframeで同画面に乗せる */
#bomFrameModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;z-index:300}
#bomFrameModal.show{display:block}
#bomFrameModal iframe{position:absolute;top:2vh;left:2vw;width:96vw;height:96vh;border:none;background:#fff;border-radius:10px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
#bomFrameModal .close-btn{position:absolute;top:0.5vh;right:1vw;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--line);cursor:pointer;font-size:18px;z-index:301;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1e293b;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#bomFrameModal .close-btn:hover{background:#f1f5f9}
</style></head><body>
<header>
  <h1>📋 FUJIN 受注追跡 (営業向け)</h1>
  <div class="meta">未完納受注を起点に手配進捗・充足判定を可視化 ／ 基準日: 2026/05/21 ／ 生成: 2026-05-21 17:39</div>
</header>
<main>
  <div class="kpi-bar" id="kpiBar"></div>
  <div class="toolbar">
    <input type="search" id="q" placeholder="オーダー№・品目コード・品目名・得意先・製番で検索">
    <select id="fEnough">
      <option value="">充足判定: 全て</option>
      <option value="ok">✓ 足りそう</option>
      <option value="ng">⚠ 不足のみ</option>
      <option value="urgent">🚨 不足＋期限超過(緊急)</option>
      <option value="unk">不明(製番なし等)</option>
    </select>
    <select id="fOverdue">
      <option value="">期限超過: 全て</option>
      <option value="y">期限超過手配ありのみ</option>
    </select>
    <select id="fSeiban">
      <option value="">製番種別: 全て</option>
      <option value="J">J(個別受注)</option>
      <option value="M">M(繰返生産)</option>
      <option value="K">K(計画ロット)</option>
      <option value="none">製番なし</option>
    </select>
    <span style="color:#475569;font-size:12px;margin-left:6px">納期:</span>
    <input type="date" id="fDueFrom" title="納期 from(以降)" style="width:140px">
    <span style="color:#94a3b8;font-size:12px">〜</span>
    <input type="date" id="fDueTo" title="納期 to(まで)" style="width:140px">
    <button class="btn" id="btnReset">リセット</button>
    <button class="btn primary" id="btnExport">📋 表示中をCSV出力</button>
    <span class="count" id="countInfo"></span>
  </div>
  <div class="tbl-wrap">
    <table id="tbl">
      <thead><tr>
        <th class="sortable" data-k="du">納期 ▲</th>
        <th class="sortable" data-k="od">受注日</th>
        <th class="sortable" data-k="on">オーダー№</th>
        <th class="sortable" data-k="cn">得意先</th>
        <th class="sortable" data-k="cd">品目</th>
        <th>品目名</th>
        <th class="sortable" data-k="sb">製番</th>
        <th style="text-align:right" class="sortable" data-k="qy">受注数</th>
        <th style="text-align:right" class="sortable" data-k="rm">残量</th>
        <th class="sortable" data-k="ac">手配数</th>
        <th class="sortable" data-k="ov">期限超過</th>
        <th class="sortable" data-k="en">充足</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<div id="omdl" onclick="if(event.target.id==='omdl')closeOM()">
  <div class="box">
    <div id="omdlBody"></div>
    <button class="close" onclick="closeOM()">閉じる</button>
  </div>
</div>

<!-- BOM構成ビュー: 同画面内でiframe表示 -->
<div id="bomFrameModal">
  <button class="close-btn" onclick="closeBomFrame()" title="閉じる">×</button>
  <iframe id="bomFrame" src="about:blank"></iframe>
</div>

<script>
const ORDERS = [];
const TODAY = "2026/05/21";

function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function fmtDue(d){
  if(!d) return "";
  const ds = d.replace(/\//g,"-");
  const today = TODAY.replace(/\//g,"-");
  let cls = "";
  if(ds < today) cls = "due-past";
  else {
    const dt = new Date(ds);
    const diff = (dt - new Date(today)) / 86400000;
    if(diff <= 14) cls = "due-near";
  }
  return `<span class="${cls}" style="padding:2px 6px;border-radius:6px">${escapeHtml(d)}</span>`;
}
function seibanBd(sb){
  if(!sb) return '<span class="bd bd-mid">なし</span>';
  const k = sb[0];
  const c = {J:"bd-j",M:"bd-m",K:"bd-k"}[k] || "bd-mid";
  return `<span class="mono">${escapeHtml(sb)}</span> <span class="bd ${c}">${k}</span>`;
}
function judgeBd(o){
  // 後方互換: 真偽値だけ渡された場合
  if(typeof o === "boolean" || o === null){
    if(o === true) return '<span class="bd bd-good">✓ 足りそう</span>';
    if(o === false) return '<span class="bd bd-warn">⚠ 不足</span>';
    return '<span class="bd bd-mid">不明</span>';
  }
  if(o.en === true) return '<span class="bd bd-good">✓ 足りそう</span>';
  if(o.en === false){
    // 期限超過手配が混じっていたら「不足＋期限超過」=緊急
    if((o.ov||0) > 0 || (o.cv||0) > 0){
      return '<span class="bd bd-bad" title="数量不足＋既に手配が期限超過">🚨 不足＋期限超過</span>';
    }
    return '<span class="bd bd-warn" title="数量が足りない（追加手配検討）">⚠ 不足</span>';
  }
  return '<span class="bd bd-mid">不明</span>';
}

let sortKey="du", sortDir=1;
function sortRows(rows){
  return rows.slice().sort((a,b)=>{
    let va=a[sortKey], vb=b[sortKey];
    if(va===null||va===undefined) va="";
    if(vb===null||vb===undefined) vb="";
    if(typeof va==="number" && typeof vb==="number") return (va-vb)*sortDir;
    if(typeof va==="boolean") return ((va?1:0)-(vb?1:0))*sortDir;
    va=String(va); vb=String(vb);
    return (va<vb?-1:va>vb?1:0)*sortDir;
  });
}

function filterRows(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const fE = document.getElementById("fEnough").value;
  const fO = document.getElementById("fOverdue").value;
  const fS = document.getElementById("fSeiban").value;
  const fF = document.getElementById("fDueFrom").value;
  const fT = document.getElementById("fDueTo").value;
  return ORDERS.filter(o=>{
    if(q){
      const hay = `${o.on} ${o.cd} ${o.nm} ${o.cn} ${o.sb||""}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(fE === "ok"  && o.en !== true)  return false;
    if(fE === "ng"  && !(o.en === false && (o.ov||0) === 0 && (o.cv||0) === 0))  return false;
    if(fE === "urgent" && !(o.en === false && ((o.ov||0) > 0 || (o.cv||0) > 0))) return false;
    if(fE === "unk" && o.en !== null)  return false;
    if(fO === "y" && (o.ov||0) === 0) return false;
    if(fS){
      const k = (o.sb||"")[0] || "";
      if(fS === "none" && o.sb) return false;
      else if(fS !== "none" && k !== fS) return false;
    }
    if(fF){
      const dn = (o.du||"").replace(/\//g,"-");
      if(dn < fF) return false;
    }
    if(fT){
      const dn = (o.du||"").replace(/\//g,"-");
      if(dn > fT) return false;
    }
    return true;
  });
}

function renderKPI(){
  const total = ORDERS.length;
  const enough = ORDERS.filter(o=>o.en===true).length;
  const short = ORDERS.filter(o=>o.en===false).length;
  const unk = ORDERS.filter(o=>o.en===null).length;
  const overdue = ORDERS.filter(o=>(o.ov||0)>0).length;
  const noArr = ORDERS.filter(o=>o.ac===0).length;
  // 直近14日納期
  const today = new Date(TODAY.replace(/\//g,"-"));
  const near = ORDERS.filter(o=>{
    if(!o.du) return false;
    const dt = new Date(o.du.replace(/\//g,"-"));
    const diff = (dt - today)/86400000;
    return diff >= 0 && diff <= 14;
  }).length;
  // 「不足＋期限超過」=緊急 と 「単純不足」を分けて集計
  const urgent = ORDERS.filter(o=>o.en===false && ((o.ov||0)>0 || (o.cv||0)>0)).length;
  const shortOnly = short - urgent;
  const k = [
    {l:"未完納受注", v:total, c:""},
    {l:"✓ 足りそう", v:enough, c:"good"},
    {l:"🚨 不足＋期限超過(緊急)", v:urgent, c:"bad"},
    {l:"⚠ 不足のみ", v:shortOnly, c:"warn"},
    {l:"不明", v:unk, c:""},
    {l:"紐付き手配なし", v:noArr, c:"warn"},
    {l:"納期14日以内", v:near, c:"warn"},
  ];
  document.getElementById("kpiBar").innerHTML = k.map(x=>
    `<div class="kpi ${x.c}"><div class="l">${x.l}</div><div class="v">${x.v.toLocaleString()}</div></div>`
  ).join("");
}

function render(){
  const rows = sortRows(filterRows());
  document.getElementById("countInfo").textContent = `${rows.length.toLocaleString()} / ${ORDERS.length.toLocaleString()} 件`;
  const tb = document.querySelector("#tbl tbody");
  tb.innerHTML = rows.slice(0, 500).map(o=>`
    <tr onclick="openOM(${o.i})">
      <td class="mono" style="white-space:nowrap;font-weight:600">${fmtDue(o.du)}</td>
      <td class="mono" style="white-space:nowrap;color:#64748b;font-size:11px">${escapeHtml(o.od||"")}</td>
      <td class="mono"><strong>${escapeHtml(o.on)}</strong>${o.rw?`-${escapeHtml(o.rw)}`:""}</td>
      <td>${escapeHtml(o.cn||"-")}</td>
      <td class="mono">${escapeHtml(o.cd)}</td>
      <td>${escapeHtml(o.nm)}</td>
      <td>${seibanBd(o.sb)}</td>
      <td style="text-align:right">${o.qy}</td>
      <td style="text-align:right;font-weight:700">${o.rm}</td>
      <td style="text-align:center">${o.ac||0}<small style="color:#94a3b8"> (自${o.as||0})</small></td>
      <td style="text-align:center" class="${o.ov>0?'overdue-cell':''}">${o.ov||0}</td>
      <td>${judgeBd(o)}</td>
    </tr>`).join("");
  if(rows.length > 500){
    tb.innerHTML += `<tr><td colspan="12" class="hint" style="text-align:center;padding:14px">…他 ${rows.length-500} 件 (フィルターで絞り込んでください)</td></tr>`;
  }
}

function openOM(i){
  const o = ORDERS[i];
  if(!o) return;
  let html = `<h3>📋 ${escapeHtml(o.on)}${o.rw?`-${o.rw}`:""} ／ ${escapeHtml(o.nm)}
    <button onclick="goToBomView('${escapeHtml(o.cd).replace(/'/g,"\\'")}')" style="margin-left:14px;padding:5px 14px;background:#1e40af;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">🌳 構成ビューを見る</button>
  </h3>`;
  // 充足判定 大表示
  let jcls = "unknown", jtxt = "充足判定: 不明（製番なし等で紐付け不可）";
  if(o.en === true){
    jcls = "ok";
    if(o.jb === "bom"){
      jtxt = `✓ 出荷可能の見込み (BOM納期内ボトルネック=${o.bn}台 ≥ 残量${o.rm})`;
    } else {
      jtxt = `✓ 出荷可能の見込み (本体在庫${o.se}＋納期内手配${o.sq}＝${o.co} ≥ 残量${o.rm})`;
    }
  } else if(o.en === false){
    jcls = "ng";
    const bnTxt = o.bn !== null ? `／BOM納期内で作れる台数=${o.bn}台` : "";
    jtxt = `⚠ 納期に間に合わない可能性 (本体在庫${o.se||0}＋納期内手配${o.sq}＝${o.co||0} < 残量${o.rm}${bnTxt})`;
  }
  html += `<div class="judgement ${jcls}">${jtxt}</div>`;

  // 受注情報
  html += `<div class="sec"><h4>受注情報</h4><div class="grid">
    <div class="cell"><div class="l">受注日</div><div class="v">${escapeHtml(o.od||"-")}</div></div>
    <div class="cell"><div class="l">納期</div><div class="v">${escapeHtml(o.du||"-")}</div></div>
    <div class="cell"><div class="l">得意先</div><div class="v" style="font-size:12px">${escapeHtml(o.cn||"-")}<br><span class="mono" style="font-size:10px">${escapeHtml(o.cc||"")}</span></div></div>
    <div class="cell"><div class="l">受注数 / 売上済 / 残量</div><div class="v">${o.qy} / ${o.sd} / <strong style="color:#1e40af">${o.rm}</strong></div></div>
    <div class="cell"><div class="l">製番 / 受注区分</div><div class="v" style="font-size:11.5px">${escapeHtml(o.sb||"なし")}<br><span style="font-size:10.5px;color:#64748b">${escapeHtml(o.kb||"-")}</span></div></div>
  </div></div>`;

  // 受注品目の手配状況
  const lateNote = o.sql > 0 ? `<br><small style="color:#a16207;font-size:10px">⚠ 納期外手配 ${o.sql}個</small>` : "";
  html += `<div class="sec"><h4>受注品目本体の手配状況</h4><div class="grid">
    <div class="cell"><div class="l">品目コード</div><div class="v mono" style="font-size:13px">${escapeHtml(o.cd)}</div></div>
    <div class="cell ${o.se!==null && o.se<0 ? 'bad' : ''}"><div class="l">現在庫</div><div class="v">${o.se!==null?o.se:"—"}</div></div>
    <div class="cell"><div class="l">納期内手配数(自身)</div><div class="v">${o.sq}${lateNote}</div></div>
    <div class="cell ${o.ov>0 ? 'warn' : ''}"><div class="l">期限超過手配</div><div class="v">${o.ov||0}件</div></div>
  </div></div>`;

  // ボトルネックサマリー
  if(o.bn !== null){
    const bnCls = o.bn >= o.rm ? "good" : "warn";
    const bnIcon = o.bn >= o.rm ? "✓" : "⚠";
    const bnCodes = (o.bc||[]).slice(0,3).map(c=>`<span class="mono" style="font-weight:600">${escapeHtml(c)}</span>`).join(", ");
    const dlFmt = o.dl ? `${o.dl.slice(0,4)}/${o.dl.slice(4,6)}/${o.dl.slice(6,8)}` : "(納期不明)";
    html += `<div class="sec"><h4>BOM展開ボトルネック判定 (納期内手配のみで計算)</h4>
      <div class="judgement ${bnCls === 'good' ? 'ok' : 'ng'}">
        ${bnIcon} 納期内に作れる台数: <strong style="font-size:16px">${o.bn}台</strong> (受注残量 ${o.rm}台)
        ${o.bn < o.rm ? `<br><span style="font-weight:400;font-size:11px">最も少ない部品(${o.cm}件中の制約): ${bnCodes}</span>` : ""}
      </div>
      <div class="hint">手配締切日: <strong>${dlFmt}</strong> (受注納期-1日)。手配予定日がこの日以前のもののみ「納期内」として計算。${o.cl?`<span style="color:#a16207"> ／ 納期外手配を持つ子品目: ${o.cl}件 (補助列で表示)</span>`:""}</div>
    </div>`;
  }

  // 子品目(BOM展開) - 納期内/納期外を分けて表示
  if(o.ch && o.ch.length){
    const managedChildren = o.ch.filter(c=>!c.skip);
    const excludedChildren = o.ch.filter(c=>c.skip);
    if(managedChildren.length){
      html += `<div class="sec"><h4>BOM 子品目 - 在庫管理品目 (${managedChildren.length}件)</h4>`;
      html += `<table style="width:100%"><thead><tr>
        <th>子品目</th><th>品目名</th>
        <th style="text-align:right">使用数</th>
        <th style="text-align:right">必要</th>
        <th style="text-align:right">在庫</th>
        <th style="text-align:right" title="手配予定日 ≤ 受注納期-1日">納期内手配</th>
        <th style="text-align:right" title="手配予定日 > 受注納期-1日">納期外</th>
        <th style="text-align:right">作れる</th>
        <th>判定</th>
      </tr></thead><tbody>`;
      managedChildren.forEach(c=>{
        const isBn = (o.bc||[]).includes(c.code);
        const ok = c.makeable >= o.rm;
        const cls = ok ? "" : "background:#fef3c7";
        const judge = ok ? '<span class="bd bd-good">充足</span>' : '<span class="bd bd-warn">不足</span>';
        const lateCell = (c.arr_qty_late||0) > 0
          ? `<td style="text-align:right;color:#a16207;font-weight:600" title="${c.arr_count_out}件の手配が納期超過">${c.arr_qty_late}</td>`
          : `<td style="text-align:right;color:#cbd5e1">0</td>`;
        html += `<tr style="${cls}"><td class="mono">${escapeHtml(c.code)}${isBn?' <span title="ボトルネック" style="color:#b91c1c;font-weight:700">★</span>':''}</td>
          <td>${escapeHtml(c.name||"")}</td>
          <td style="text-align:right">×${c.qty_per}</td>
          <td style="text-align:right">${c.need}</td>
          <td style="text-align:right;${c.eff!==null && c.eff<0?'color:#b91c1c;font-weight:700':''}">${c.eff!==null?c.eff:"—"}</td>
          <td style="text-align:right">${c.arr_qty||0}</td>
          ${lateCell}
          <td style="text-align:right;font-weight:700">${c.makeable}台</td>
          <td>${judge}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      if(o.cl > 0){
        html += `<div class="hint" style="margin-top:6px;color:#a16207;background:#fef3c7;padding:8px 10px;border-radius:6px;border-left:3px solid #f59e0b">⚠ <strong>納期外手配あり ${o.cl}件</strong>。これらは受注納期前日までに完成しない可能性があります。製造部に短納期化や前倒しを相談してください。</div>`;
      }
      if(o.cv) html += `<div class="hint" style="margin-top:6px;color:#a16207">★ 子品目で期限超過(今日基準)の手配: ${o.cv}件</div>`;
      html += `</div>`;
    }
    if(excludedChildren.length){
      html += `<div class="hint" style="margin-top:6px;color:#94a3b8">※ 在庫管理「行わない」設定の子品目 ${excludedChildren.length}件 は判定からも表示からも除外しています</div>`;
    }
  }

  // メモ
  html += `<div class="hint">※ 充足判定: ①本体在庫＋納期内手配が残量以上 → 即出荷可。②不足でもBOM(納期内手配)から組立可能なら〇。③在庫管理しない品目は除外。<br>※ <strong>納期内</strong>＝手配予定日が受注納期の前日以前。BOM上位品目の状況・他受注との競合は未考慮。</div>`;

  document.getElementById("omdlBody").innerHTML = html;
  document.getElementById("omdl").classList.add("show");
}

// 構成ビュー: 同じ画面内にiframeで表示（手配確定HTMLを直接読み込み）
function goToBomView(code){
  closeOM(); // 受注モーダルは閉じてから
  const frame = document.getElementById("bomFrame");
  // 手配確定HTMLを iframe で開く + hash で品目指定 → 該当品目のBOMモーダルが自動で開く
  frame.src = `results_production.html#code=${encodeURIComponent(code)}`;
  document.getElementById("bomFrameModal").classList.add("show");
}
function closeBomFrame(){
  document.getElementById("bomFrameModal").classList.remove("show");
  // メモリリーク防止のためsrcクリア
  setTimeout(()=>{ document.getElementById("bomFrame").src = "about:blank"; }, 200);
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape" && document.getElementById("bomFrameModal").classList.contains("show")){
    closeBomFrame();
  }
});
function closeOM(){document.getElementById("omdl").classList.remove("show");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeOM();});

// CSVエクスポート
function exportCsv(){
  const rows = sortRows(filterRows());
  const headers = ["納期","オーダー№","行","得意先コード","得意先","品目コード","品目名","製番","受注区分","受注数","売上済","残量","手配数(製番)","手配数(自身)","期限超過","現在庫","充足"];
  const lines = [headers.join(",")];
  rows.forEach(o=>{
    const cell = v=>{ let s=String(v==null?"":v).replace(/\r?\n/g," "); if(/[",]/.test(s)) s='"'+s.replace(/"/g,'""')+'"'; return s; };
    lines.push([o.du,o.on,o.rw,o.cc,o.cn,o.cd,o.nm,o.sb,o.kb,o.qy,o.sd,o.rm,o.ac,o.as,o.ov,o.se,o.en===true?"足りそう":o.en===false?"不足":"不明"].map(cell).join(","));
  });
  const csv = "\uFEFF" + lines.join("\r\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url;
  a.download = `受注追跡_${rows.length}件_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
