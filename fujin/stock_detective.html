<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>構成ツリー - FUJIN</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  color: #1f2937; background: #fff;
}
/* ===== ヘッダ検索バー (コンパクト版: 縦42px) ===== */
.searchbar {
  height: 42px; display: flex; align-items: center; gap: 10px;
  padding: 0 14px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  border-bottom: 1px solid #f59e0b;
  white-space: nowrap; overflow-x: auto;
}
.searchbar .title {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700; color: #78350f;
}
.searchbar .title .ico { font-size: 16px; }
.searchbar .input-wrap {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 1.5px solid #d97706; border-radius: 8px;
  padding: 2px 2px 2px 10px; flex: 0 1 380px; min-width: 240px;
}
.searchbar .input-wrap:focus-within { outline: 2px solid #f59e0b; outline-offset: 1px; }
.searchbar input {
  flex: 1; border: none; outline: none; padding: 4px 4px;
  font-size: 13px; font-family: inherit; background: transparent;
}
.searchbar button.go {
  padding: 4px 12px; background: #d97706; color: #fff; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  letter-spacing: .04em;
}
.searchbar button.go:hover { background: #b45309; }
.searchbar button.clear {
  background: none; border: none; color: #92400e; font-size: 13px; cursor: pointer; padding: 3px 7px;
  border-radius: 4px;
}
.searchbar button.clear:hover { background: rgba(217,119,6,.15); }
.searchbar .hint-mini {
  font-size: 11px; color: #78350f; opacity: .85;
}
.searchbar .hint-mini b { color: #92400e; }
.searchbar .recent {
  display: none; align-items: center; gap: 4px; flex-wrap: nowrap;
  font-size: 10.5px; color: #78350f;
}
.searchbar .recent .lbl { opacity: .7; padding-right: 2px; }
.searchbar .recent .chip {
  padding: 1px 7px; background: #fff; border: 1px solid #d97706; border-radius: 999px;
  font-family: "SF Mono", "Menlo", monospace; font-size: 10.5px; cursor: pointer; color: #92400e;
}
.searchbar .recent .chip:hover { background: #fef3c7; }

/* 構成なし品目ボタン (オレンジ枠、目立たせる) */
.searchbar button.orphan-btn {
  padding: 4px 12px; background: #fff; color: #b45309; border: 1.5px solid #d97706;
  border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 4px; letter-spacing: .02em;
}
.searchbar button.orphan-btn:hover { background: #fef3c7; }
.searchbar button.orphan-btn .cnt {
  background: #d97706; color: #fff; padding: 0 6px; border-radius: 999px; font-size: 10.5px;
  font-family: "SF Mono", "Menlo", monospace;
}
/* 品目手順登録漏れボタン (赤系) */
.searchbar button.orphan-btn.nr-btn {
  color: #991b1b; border-color: #dc2626;
}
.searchbar button.orphan-btn.nr-btn:hover { background: #fee2e2; }
.searchbar button.orphan-btn.nr-btn .cnt { background: #dc2626; }
/* 使用禁止品目を含む構成ボタン (紫系) */
.searchbar button.orphan-btn.fb-btn {
  color: #6b21a8; border-color: #9333ea;
}
.searchbar button.orphan-btn.fb-btn:hover { background: #f3e8ff; }
.searchbar button.orphan-btn.fb-btn .cnt { background: #9333ea; }

/* 製番セレクタ (品目検索後に表示) */
.searchbar .sb-wrap {
  display: none; align-items: center; gap: 5px; font-size: 11.5px; color: #78350f; font-weight: 600;
  background: #fff; border: 1.5px solid #d97706; border-radius: 8px; padding: 2px 6px 2px 10px;
  flex-shrink: 0;
}
.searchbar .sb-wrap.active { display: flex; }
.searchbar .sb-wrap label { font-size: 10.5px; color: #b45309; }
.searchbar .sb-wrap select {
  border: none; outline: none; padding: 3px 4px; font-size: 12px; font-family: inherit;
  background: transparent; color: #1f2937; max-width: 180px; cursor: pointer;
}
.searchbar .sb-wrap select:disabled { color: #94a3b8; cursor: not-allowed; }
.searchbar .sb-mode {
  font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 700;
}
.searchbar .sb-mode.default  { background: #e0f2fe; color: #075985; }
.searchbar .sb-mode.seiban   { background: #bbf7d0; color: #166534; }
.searchbar .sb-mode.fallback { background: #fef3c7; color: #92400e; }
.searchbar .sb-mode.none     { background: #f1f5f9; color: #475569; }

/* ===== iframe コンテナ ===== */
.frame-wrap {
  height: calc(100vh - 42px); position: relative; background: #f8fafc;
}
.frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; background: #fff; }

/* ===== 構成なし品目モーダル ===== */
.orphan-modal {
  position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 1000;
  display: none; align-items: center; justify-content: center; padding: 4vh 4vw;
}
.orphan-modal.open { display: flex; }
.orphan-card {
  background: #fff; border-radius: 12px; width: 100%; max-width: 1100px; max-height: 92vh;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  overflow: hidden;
}
.orphan-head {
  padding: 14px 22px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  border-bottom: 1px solid #f59e0b;
  display: flex; align-items: center; justify-content: space-between;
}
.orphan-head h2 { margin: 0; font-size: 16px; color: #78350f; display: flex; align-items: center; gap: 8px; }
.orphan-head .meta { font-size: 11.5px; color: #78350f; opacity: .85; }
.orphan-head .x { background: none; border: none; font-size: 22px; cursor: pointer; color: #78350f; padding: 0 6px; line-height: 1; }
.orphan-tabs {
  display: flex; gap: 4px; padding: 8px 16px 0; background: #f8fafc;
  border-bottom: 1px solid #e5e7eb;
}
.orphan-tabs .tab {
  padding: 8px 16px; background: transparent; border: 1px solid transparent; border-bottom: none;
  border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; color: #64748b;
  font-family: inherit; display: flex; align-items: center; gap: 6px;
}
.orphan-tabs .tab:hover { color: #b45309; background: #fff; }
.orphan-tabs .tab.active {
  background: #fff; border-color: #e5e7eb; color: #b45309; position: relative; top: 1px;
}
.orphan-tabs .tab .cnt {
  background: #f1f5f9; color: #64748b; padding: 1px 8px; border-radius: 999px; font-size: 10.5px;
  font-family: "SF Mono", "Menlo", monospace;
}
.orphan-tabs .tab.active .cnt { background: #fef3c7; color: #b45309; }
.orphan-tabs .tab[data-cat="active"].active .cnt { background: #fee2e2; color: #991b1b; }

.orphan-toolbar {
  padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.orphan-toolbar input[type=search] {
  flex: 1; min-width: 200px; padding: 6px 12px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 13px; font-family: inherit;
}
.orphan-toolbar input[type=search]:focus { outline: 2px solid #d97706; outline-offset: -1px; border-color: #d97706; }
.orphan-toolbar select {
  padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 12.5px; font-family: inherit; background: #fff;
}
.orphan-toolbar button {
  padding: 6px 14px; background: #1f2937; color: #fff; border: none; border-radius: 6px;
  font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 4px;
}
.orphan-toolbar button:hover { background: #111827; }
.orphan-toolbar .info { font-size: 11.5px; color: #64748b; margin-left: auto; }
.orphan-toolbar .info b { color: #1f2937; }

.orphan-body { flex: 1; overflow: auto; padding: 0; }
.orphan-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.orphan-table thead { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
.orphan-table th {
  padding: 8px 10px; text-align: left; font-weight: 600; color: #475569;
  border-bottom: 2px solid #e5e7eb; white-space: nowrap; user-select: none;
}
.orphan-table th.sortable { cursor: pointer; }
.orphan-table th.sortable:hover { background: #f1f5f9; }
.orphan-table th .sort-arrow { font-size: 9px; opacity: .4; margin-left: 3px; }
.orphan-table th.sorted .sort-arrow { opacity: 1; color: #d97706; }
.orphan-table td {
  padding: 6px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle;
  font-variant-numeric: tabular-nums;
}
.orphan-table tr { cursor: pointer; transition: background .1s; }
.orphan-table tbody tr:hover { background: #fef3c7; }
.orphan-table .code {
  font-family: "SF Mono", "Menlo", monospace; font-weight: 600; color: #1e40af; white-space: nowrap;
}
.orphan-table .name { color: #1f2937; max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.orphan-table .mgmt-on { color: #166534; font-weight: 600; }
.orphan-table .mgmt-off { color: #94a3b8; }
.orphan-table .prohibit { color: #991b1b; font-family: "SF Mono", "Menlo", monospace; font-size: 11px; }
.orphan-table .num { text-align: right; }
.orphan-table .num.neg { color: #dc2626; font-weight: 600; }
.orphan-table .empty { padding: 40px 20px; text-align: center; color: #94a3b8; }
.orphan-table .badge-active { background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.orphan-table .badge-prohibited { background: #f1f5f9; color: #64748b; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
</style>
</head>
<body>

<div class="searchbar">
  <div class="title"><span class="ico">🌲</span><span>構成ツリー</span></div>
  <div class="input-wrap">
    <input id="q" type="search" placeholder="品目コードを貼り付けてEnter (例: UDALS / 21082001000)" autofocus>
    <button class="go" id="go">探す</button>
  </div>
  <button class="clear" id="clear" title="クリア">✕</button>
  <div class="sb-wrap" id="sbWrap" title="この品目に紐づく製番でBOMを切替えます">
    <label>製番:</label>
    <select id="sbSel">
      <option value="">デフォルト構成</option>
    </select>
    <span class="sb-mode none" id="sbMode">—</span>
  </div>
  <button class="orphan-btn nr-btn" id="noRouteBtn" title="BOM親品目で品目手順マスタ未登録（組立工程未定義→製品が完成しない）">
    ⚠ 品目手順が登録漏れ <span class="cnt" id="noRouteBtnCnt">…</span>
  </button>
  <button class="orphan-btn fb-btn" id="forbiddenBtn" title="構成の子に「使用禁止日」が立っている品目を含む親（現在使えない構成）">
    🚫 使用禁止品目を含む構成 <span class="cnt" id="forbiddenBtnCnt">…</span>
  </button>
  <button class="orphan-btn" id="orphanBtn" title="構成マスタに登場しない品目（マイナス在庫の温床候補）">
    📋 構成なし品目 <span class="cnt" id="orphanBtnCnt">…</span>
  </button>
  <button class="orphan-btn" id="printJumpBtn" title="現在のコード/製番で構成印刷タブを開いて1台あたり取数で印刷・CSV出力" style="background:#dbeafe;color:#1e40af;border-color:#93c5fd">
    🖨 印刷用ビュー
  </button>
  <span class="hint-mini">出荷エラー画面の<b>品目コード</b>をペースト→Enter</span>
  <div class="recent" id="recent"><span class="lbl">最近:</span></div>
</div>

<div class="frame-wrap">
  <iframe id="frame" src="about:blank" title="構成ツリー"></iframe>
</div>

<!-- 構成なし品目モーダル -->
<div class="orphan-modal" id="orphanModal">
  <div class="orphan-card">
    <div class="orphan-head" id="orphanHead">
      <h2 id="orphanHeadTitle">📋 構成なし品目（孤立品目）</h2>
      <div class="meta" id="orphanHeadMeta">—</div>
      <button class="x" id="orphanClose" title="閉じる">×</button>
    </div>
    <div class="orphan-tabs">
      <button class="tab active" data-cat="active">現役孤立<span class="cnt" id="cntActive">0</span></button>
      <button class="tab" data-cat="prohibited">使用禁止品目コード<span class="cnt" id="cntProhibited">0</span></button>
      <button class="tab" data-cat="all">全表示<span class="cnt" id="cntAll">0</span></button>
    </div>
    <div class="orphan-toolbar">
      <select id="orphanMatchMode" title="絞り込みの一致方式">
        <option value="contains">部分一致</option>
        <option value="prefix">前方一致</option>
        <option value="suffix">後方一致</option>
        <option value="exact">完全一致</option>
      </select>
      <input id="orphanSearch" type="search" placeholder="品目コード/品目名で絞り込み">
      <select id="orphanMgmt">
        <option value="">在庫管理: 全て</option>
        <option value="行う">行う</option>
        <option value="行わない">行わない</option>
      </select>
      <button id="orphanCsv">📥 CSVダウンロード</button>
      <div class="info">表示中 <b id="orphanShownCount">0</b> 件</div>
    </div>
    <div class="orphan-body">
      <table class="orphan-table" id="orphanTable">
        <thead>
          <tr>
            <th class="sortable" data-sort="code">品目コード <span class="sort-arrow">▼</span></th>
            <th class="sortable" data-sort="name">品目名</th>
            <th class="sortable" data-sort="mgmt">在庫管理</th>
            <th class="sortable" data-sort="supplier">主仕入先</th>
            <th class="sortable" data-sort="prohibit">使用禁止日</th>
            <th>区分</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 孤立品目データ (build_orphan_data.py が生成) -->
<script src="orphan_items.js" onerror="window.ORPHAN_ITEMS=[];window.ORPHAN_META={generated:'未生成',basis_date:'-',n_active:0,n_prohibited:0};"></script>
<!-- 製番別BOM / 品目→製番マップ (build_work_instructions.py が生成) -->
<script src="work_instructions.js" onerror="window.WI_ITEM_SEIBANS={};window.WI_BOM_BY_SEIBAN={};"></script>

<script>
const ARRANGE_SRC = "results_production_2355.html";
const RECENT_KEY = "_fujin_stock_detective_recent";
const RECENT_MAX = 5;

const q = document.getElementById('q');
const go = document.getElementById('go');
const clearBtn = document.getElementById('clear');
const frame = document.getElementById('frame');
const recentBox = document.getElementById('recent');
const sbWrap = document.getElementById('sbWrap');
const sbSel  = document.getElementById('sbSel');
const sbMode = document.getElementById('sbMode');

// ウェルカム画面（srcdoc）
const WELCOME_HTML = `
<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f8fafc; }
.welcome { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:18px; color:#6b7280; padding:20px; text-align:center; }
.big-ico { font-size:88px; opacity:.32; }
.msg-main { font-size:18px; color:#475569; font-weight:600; }
.msg-sub { font-size:13px; color:#94a3b8; max-width:560px; line-height:1.7; }
.flow { display:flex; align-items:center; gap:14px; margin-top:18px; flex-wrap:wrap; justify-content:center; }
.step { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:11px 16px; font-size:12.5px; color:#475569; min-width:140px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.step .num { display:inline-block; width:22px; height:22px; line-height:22px; text-align:center; background:#d97706; color:#fff; border-radius:50%; font-size:11px; font-weight:700; margin-right:7px; }
.arrow { color:#cbd5e1; font-size:18px; }
</style></head><body>
<div class="welcome">
  <div class="big-ico">🔎</div>
  <div class="msg-main">品目コードを貼り付けて検索してください</div>
  <div class="msg-sub">出荷時の「在庫がない」エラー画面の品目コードを<br>上部検索バーにペースト→Enter</div>
  <div class="flow">
    <div class="step"><span class="num">1</span>エラー出る</div>
    <div class="arrow">→</div>
    <div class="step"><span class="num">2</span>品目コピー</div>
    <div class="arrow">→</div>
    <div class="step"><span class="num">3</span>ここに貼付</div>
    <div class="arrow">→</div>
    <div class="step"><span class="num">4</span>原因確認</div>
    <div class="arrow">→</div>
    <div class="step"><span class="num">5</span>FUJINで処理</div>
  </div>
</div>
</body></html>`;

function loadRecent(){
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch(e){ return []; }
}
function saveRecent(code){
  let r = loadRecent().filter(c => c !== code);
  r.unshift(code); r = r.slice(0, RECENT_MAX);
  localStorage.setItem(RECENT_KEY, JSON.stringify(r));
  renderRecent();
}
function renderRecent(){
  const r = loadRecent();
  if (r.length === 0) { recentBox.style.display = "none"; return; }
  recentBox.style.display = "flex";
  recentBox.querySelectorAll('.chip').forEach(c => c.remove());
  r.forEach(code => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = code;
    chip.onclick = () => { q.value = code; search(); };
    recentBox.appendChild(chip);
  });
}

function showWelcome(){
  frame.removeAttribute('src');
  frame.srcdoc = WELCOME_HTML;
  sbWrap.classList.remove('active');
}
// 製番セレクタを更新: 検索コードに紐づく製番リストを設定
function refreshSbOptions(code){
  sbSel.innerHTML = '<option value="">デフォルト構成</option>';
  const list = (window.WI_ITEM_SEIBANS && window.WI_ITEM_SEIBANS[code]) || [];
  if (list.length === 0) {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '(この品目に紐づく製番なし)';
    opt.disabled = true; sbSel.appendChild(opt);
    setSbModeBadge('default', '');
    return;
  }
  list.forEach(sb => {
    const opt = document.createElement('option');
    opt.value = sb; opt.textContent = sb;
    sbSel.appendChild(opt);
  });
}
function setSbModeBadge(mode, seiban){
  sbMode.classList.remove('default','seiban','fallback','none');
  if (mode === 'seiban')        { sbMode.classList.add('seiban');   sbMode.textContent = '📗 製番別 ' + (seiban||''); }
  else if (mode === 'fallback') { sbMode.classList.add('fallback'); sbMode.textContent = '⚠ 製番別BOMなし → デフォルト'; }
  else if (mode === 'default')  { sbMode.classList.add('default');  sbMode.textContent = '📘 デフォルト構成'; }
  else                          { sbMode.classList.add('none');     sbMode.textContent = '—'; }
}
// iframe URLを構築して反映
function reloadFrame(code, seiban){
  const cb = "?v=" + Date.now();
  let hash = "#code=" + encodeURIComponent(code) + "&full=1";
  if (seiban) hash += "&seiban=" + encodeURIComponent(seiban);
  frame.removeAttribute('srcdoc');
  frame.src = ARRANGE_SRC + cb + hash;
  // モードバッジ更新
  if (seiban) {
    if (window.WI_BOM_BY_SEIBAN && window.WI_BOM_BY_SEIBAN[seiban]) setSbModeBadge('seiban', seiban);
    else                                                            setSbModeBadge('fallback', seiban);
  } else {
    setSbModeBadge('default', '');
  }
}
function search(){
  const code = (q.value || "").trim();
  if (!code) { showWelcome(); return; }
  // 製番セレクタを準備
  refreshSbOptions(code);
  sbSel.value = '';
  sbWrap.classList.add('active');
  reloadFrame(code, '');
  saveRecent(code);
}
// 製番変更時: iframeを再読込
sbSel.addEventListener('change', () => {
  const code = (q.value || "").trim();
  if (!code) return;
  reloadFrame(code, sbSel.value);
});

q.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); search(); } });
go.addEventListener('click', search);
clearBtn.addEventListener('click', () => {
  q.value = ""; q.focus();
  showWelcome();
});

showWelcome();
renderRecent();

// 親FUJIN.htmlからハッシュで品目を渡された場合
function _handleParentHash(){
  const m = (window.location.hash || "").match(/code=([^&]+)/);
  if (m) {
    const code = decodeURIComponent(m[1]);
    // MSAL認証コード/トークン (例: "1.AWsAo..." の長い base64 風) を弾く
    // 品目コードは通常30文字以内 / 一方MSAL認証コードは100文字超になる
    if (code.length > 40) {
      console.warn("[stock_detective] MSAL認証コードと思われる文字列を検出、スキップ:", code.substring(0, 24) + "...");
      return;
    }
    if (/^\d+\.[A-Za-z0-9_-]{20,}/.test(code)) {
      console.warn("[stock_detective] MSAL風文字列を検出、スキップ");
      return;
    }
    q.value = code;
    search();
  }
}
window.addEventListener('hashchange', _handleParentHash);
_handleParentHash();

// =================================================================
// 構成なし品目（孤立品目）モーダル
// =================================================================
const orphanModal = document.getElementById('orphanModal');
const orphanBtn = document.getElementById('orphanBtn');
const orphanClose = document.getElementById('orphanClose');
const orphanSearch = document.getElementById('orphanSearch');
const orphanMgmt = document.getElementById('orphanMgmt');
const orphanCsv = document.getElementById('orphanCsv');
const orphanTbody = document.querySelector('#orphanTable tbody');
const orphanShown = document.getElementById('orphanShownCount');
const orphanHeadMeta = document.getElementById('orphanHeadMeta');
const orphanBtnCnt = document.getElementById('orphanBtnCnt');

let orphanCurrentTab = 'active'; // active | prohibited | all
let orphanSortKey = 'code';
let orphanSortAsc = true;
let orphanMode = 'orphan'; // 'orphan' | 'noroute' | 'forbidden'

function orphanCurrentItems(){
  if (orphanMode === 'noroute')   return window.NOROUTE_ITEMS   || [];
  if (orphanMode === 'forbidden') return window.FORBIDDEN_ITEMS || [];
  return window.ORPHAN_ITEMS || [];
}

function orphanInit(){
  const meta = window.ORPHAN_META || {};
  const orphanItems = window.ORPHAN_ITEMS || [];
  const noRouteItems = window.NOROUTE_ITEMS || [];
  const forbiddenItems = window.FORBIDDEN_ITEMS || [];
  // 上部ボタンのカウント表示(常時表示)
  const oActive = orphanItems.filter(x => x.category === 'active').length;
  const nActive = noRouteItems.filter(x => x.category === 'active').length;
  const fActive = forbiddenItems.filter(x => x.category === 'active').length;
  orphanBtnCnt.textContent = oActive.toLocaleString();
  document.getElementById('noRouteBtnCnt').textContent = nActive.toLocaleString();
  document.getElementById('forbiddenBtnCnt').textContent = fActive.toLocaleString();
  // モーダル内の現在モードに応じたタブカウント
  const items = orphanCurrentItems();
  const nA = items.filter(x => x.category === 'active').length;
  const nP = items.filter(x => x.category === 'prohibited').length;
  document.getElementById('cntActive').textContent = nA.toLocaleString();
  document.getElementById('cntProhibited').textContent = nP.toLocaleString();
  document.getElementById('cntAll').textContent = items.length.toLocaleString();
  // タイトルとヘッダ文言の切替
  const title = document.getElementById('orphanHeadTitle');
  const head = document.getElementById('orphanHead');
  if (orphanMode === 'noroute') {
    title.textContent = '⚠ 品目手順が登録漏れ（組立工程未定義）';
    head.style.background = 'linear-gradient(135deg, #fee2e2 0%, #fecaca 100%)';
    head.style.borderBottomColor = '#dc2626';
    orphanHeadMeta.textContent = `生成: ${meta.generated||'?'} ／ 基準日: ${meta.basis_date||'?'} ／ BOM親 ${(meta.n_bom_parents||0).toLocaleString()}件中 ${items.length.toLocaleString()}件が登録漏れ`;
  } else if (orphanMode === 'forbidden') {
    title.textContent = '🚫 使用禁止品目を含む構成';
    head.style.background = 'linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%)';
    head.style.borderBottomColor = '#9333ea';
    orphanHeadMeta.textContent = `生成: ${meta.generated||'?'} ／ 基準日: ${meta.basis_date||'?'} ／ ${items.length.toLocaleString()}件の親品目が「使用禁止子品目」を構成に含む`;
  } else {
    title.textContent = '📋 構成なし品目（孤立品目）';
    head.style.background = '';
    head.style.borderBottomColor = '';
    orphanHeadMeta.textContent = `生成: ${meta.generated||'?'} ／ 基準日: ${meta.basis_date||'?'} ／ 品目マスタ全 ${(meta.n_total_items||0).toLocaleString()}件中 ${(items.length).toLocaleString()}件 (${(items.length*100/(meta.n_total_items||1)).toFixed(1)}%)`;
  }
}

// 共通: 文字列一致(前方/後方/部分/完全)。両フィールドにOR適用、空入力は素通り
function matchByMode(s, q, mode){
  if(!q) return true;
  const str = (s||'').toLowerCase();
  const qq = q.toLowerCase();
  switch(mode){
    case 'prefix':  return str.startsWith(qq);
    case 'suffix':  return str.endsWith(qq);
    case 'exact':   return str === qq;
    case 'contains':
    default:        return str.includes(qq);
  }
}

function orphanFilter(){
  const items = orphanCurrentItems();
  const search = orphanSearch.value.trim();
  const mgmt = orphanMgmt.value;
  const mode = (document.getElementById('orphanMatchMode')||{}).value || 'contains';
  let filtered = items.filter(x => {
    if (orphanCurrentTab !== 'all' && x.category !== orphanCurrentTab) return false;
    if (mgmt && x.mgmt !== mgmt) return false;
    if (search) {
      const hit = matchByMode(x.code, search, mode) || matchByMode(x.name, search, mode);
      if (!hit) return false;
    }
    return true;
  });
  // ソート: 文字列・数値両対応(数値型ならnumeric比較)
  filtered.sort((a, b) => {
    let av = a[orphanSortKey];
    let bv = b[orphanSortKey];
    if (av === undefined || av === null) av = '';
    if (bv === undefined || bv === null) bv = '';
    // 数値型優先
    const an = typeof av === 'number' ? av : null;
    const bn = typeof bv === 'number' ? bv : null;
    if (an !== null && bn !== null) {
      return orphanSortAsc ? an - bn : bn - an;
    }
    const sa = String(av), sb = String(bv);
    if (sa < sb) return orphanSortAsc ? -1 : 1;
    if (sa > sb) return orphanSortAsc ? 1 : -1;
    return 0;
  });
  return filtered;
}

function orphanRender(){
  const filtered = orphanFilter();
  orphanShown.textContent = filtered.length.toLocaleString();
  if (filtered.length === 0) {
    orphanTbody.innerHTML = '<tr><td colspan="6" class="empty">該当する品目はありません</td></tr>';
    return;
  }
  // 1000件超は段階表示（簡易）
  const MAX = 1500;
  const slice = filtered.slice(0, MAX);
  const rows = slice.map(x => {
    const mgmtCls = x.mgmt === '行う' ? 'mgmt-on' : 'mgmt-off';
    const proh = x.prohibit ? formatYmd(x.prohibit) : '';
    const badge = x.category === 'active' ? '<span class="badge-active">現役孤立</span>' : '<span class="badge-prohibited">使用禁止品目コード</span>';
    return `<tr data-code="${escapeHtml(x.code)}">
      <td class="code">${escapeHtml(x.code)}</td>
      <td class="name" title="${escapeHtml(x.name)}">${escapeHtml(x.name)}</td>
      <td class="${mgmtCls}">${escapeHtml(x.mgmt||'')}</td>
      <td>${escapeHtml(x.supplier||'')}</td>
      <td class="prohibit">${proh}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
  let extraNote = '';
  if (filtered.length > MAX) {
    extraNote = `<tr><td colspan="6" class="empty">… 残り ${(filtered.length-MAX).toLocaleString()} 件は省略（CSVダウンロードで全件取得可）</td></tr>`;
  }
  orphanTbody.innerHTML = rows + extraNote;
  // 行クリック: ツリーフロー(検索フロー)に飛ばす - 構成ツリー画面を統一表示
  orphanTbody.querySelectorAll('tr[data-code]').forEach(tr => {
    tr.onclick = () => {
      const code = tr.dataset.code;
      q.value = code;
      search();
      closeOrphanModal();
    };
  });
}

// 孤立/品目手順未登録品目のシンプル品目詳細を iframe に表示(構成がないのでツリー描画ナシ)
function showOrphanDetail(item, mode){
  const isNr = (mode === 'noroute');
  const fmtYmd = (s) => (s && s.length === 8) ? `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}` : (s||'');
  const mgmtCls = item.mgmt === '行う' ? '#166534' : '#94a3b8';
  const proh = item.prohibit ? fmtYmd(item.prohibit) : '';
  const stockVal = (item.stock !== null && item.stock !== undefined) ? item.stock.toLocaleString() : '—';
  const stockCls = (typeof item.stock === 'number' && item.stock < 0) ? '#dc2626' : '#1f2937';
  const tag = isNr
    ? `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700">⚠ 品目手順登録漏れ（組立工程未定義）</span>`
    : (item.category === 'active'
       ? `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700">📋 構成なし品目（現役孤立）</span>`
       : `<span style="background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700">📋 構成なし品目（使用禁止品目コード）</span>`);
  const desc = isNr
    ? 'この品目はBOMで親として登場しますが、品目手順マスタに登録がありません。<br>→ 組み立てる工程が定義されていないため、製品が完成しません。SMILE品目手順マスタへの登録が必要です。'
    : 'この品目は構成マスタで親としても子としても登場しません。<br>→ どの製品にも組み込まれていない孤立した品目です。<br>マイナス在庫の温床になりやすいため、棚卸や用途の見直しを推奨します。';
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
* { box-sizing: border-box; }
body { margin: 0; padding: 24px 40px; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f8fafc; color: #1f2937; }
.card { max-width: 880px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.head { padding: 22px 28px; background: linear-gradient(135deg, ${isNr?'#fef2f2':'#fef3c7'} 0%, ${isNr?'#fee2e2':'#fde68a'} 100%); border-bottom: 1px solid ${isNr?'#fecaca':'#f59e0b'}; }
.head .code { font-family: "SF Mono","Menlo",monospace; font-size: 22px; font-weight: 700; color: ${isNr?'#7f1d1d':'#78350f'}; margin-right: 12px; }
.head .name { font-size: 14px; color: #475569; margin-top: 6px; }
.head .tag-wrap { margin-top: 10px; }
.body { padding: 22px 28px; }
.kpi { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.kpi .tile { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 14px; }
.kpi .tile .v { font-size: 18px; font-weight: 700; color: var(--c, #1f2937); }
.kpi .tile .l { font-size: 11px; color: #64748b; margin-top: 2px; }
.desc { padding: 14px 18px; background: ${isNr?'#fef2f2':'#fef3c7'}; border: 1px solid ${isNr?'#fecaca':'#fde68a'}; border-radius: 8px; font-size: 13px; line-height: 1.7; color: ${isNr?'#7f1d1d':'#78350f'}; }
.detail { margin-top: 18px; display: grid; grid-template-columns: 120px 1fr; gap: 8px 16px; font-size: 13px; }
.detail .k { color: #64748b; }
.detail .v { color: #1f2937; }
.empty { color: #cbd5e1; }
</style></head><body>
<div class="card">
  <div class="head">
    <span class="code">${escapeHtml(item.code)}</span>
    <div class="name">${escapeHtml(item.name||'(品目名なし)')}</div>
    <div class="tag-wrap">${tag}</div>
  </div>
  <div class="body">
    <div class="kpi">
      <div class="tile" style="background:#ecfdf5;border-color:#a7f3d0"><div class="v" style="color:${stockCls}">${stockVal}</div><div class="l" style="color:#065f46;font-weight:600">SMILE有効在庫 (CSV由来・確認値)</div></div>
      <div class="tile"><div class="v" style="color:${mgmtCls}">${escapeHtml(item.mgmt||'—')}</div><div class="l">在庫管理区分</div></div>
      <div class="tile"><div class="v" style="color:${proh?'#991b1b':'#94a3b8'}">${proh || '—'}</div><div class="l">使用禁止日</div></div>
    </div>
    <div class="desc">${desc}</div>
    <div class="detail">
      <div class="k">品目コード</div><div class="v">${escapeHtml(item.code)}</div>
      <div class="k">品目名</div><div class="v">${escapeHtml(item.name||'')}</div>
      <div class="k">主仕入先</div><div class="v">${item.supplier?escapeHtml(item.supplier):'<span class="empty">—</span>'}</div>
      <div class="k">区分</div><div class="v">${isNr?'品目手順登録漏れ':(item.category==='active'?'現役孤立':'使用禁止品目コード')}</div>

</body></html>`;
  frame.removeAttribute('src');
  frame.srcdoc = html;
}

function formatYmd(ymd){
  if (!ymd || ymd.length !== 8) return ymd;
  return `${ymd.slice(0,4)}/${ymd.slice(4,6)}/${ymd.slice(6,8)}`;
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openOrphanModal(mode){
  orphanMode = mode || 'orphan';
  orphanInit();
  orphanRender();
  orphanModal.classList.add('open');
  setTimeout(() => orphanSearch.focus(), 50);
}
function closeOrphanModal(){
  orphanModal.classList.remove('open');
}

orphanBtn.addEventListener('click', () => openOrphanModal('orphan'));
document.getElementById('noRouteBtn').addEventListener('click', () => openOrphanModal('noroute'));
document.getElementById('forbiddenBtn').addEventListener('click', () => openOrphanModal('forbidden'));

// 印刷用ビューへジャンプ: 親(FUJIN.html)に postMessage で「構成印刷タブ + コード/製番」を要求
document.getElementById('printJumpBtn').addEventListener('click', () => {
  const code = (q.value || '').trim();
  if (!code) { alert('まず品目コードを入力してください'); return; }
  const sb = (sbSel && sbSel.value) ? sbSel.value : '';
  const extra = sb ? `code=${encodeURIComponent(code)}&seiban=${encodeURIComponent(sb)}` : `code=${encodeURIComponent(code)}`;
  // 親フレームのURLを書き換えてタブ移動
  if (window.parent && window.parent !== window) {
    window.parent.location.hash = `tab=work&${extra}`;
  } else {
    // 単体表示の場合は work_instruction.html を直接開く
    location.href = `work_instruction.html#${extra}`;
  }
});
orphanClose.addEventListener('click', closeOrphanModal);
orphanModal.addEventListener('click', e => { if (e.target === orphanModal) closeOrphanModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && orphanModal.classList.contains('open')) closeOrphanModal();
});

// タブ切替
document.querySelectorAll('.orphan-tabs .tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.orphan-tabs .tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    orphanCurrentTab = t.dataset.cat;
    orphanRender();
  });
});

// 検索・フィルター
orphanSearch.addEventListener('input', orphanRender);
orphanMgmt.addEventListener('change', orphanRender);
document.getElementById('orphanMatchMode').addEventListener('change', orphanRender);

// ソート
document.querySelectorAll('.orphan-table th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (orphanSortKey === k) {
      orphanSortAsc = !orphanSortAsc;
    } else {
      orphanSortKey = k; orphanSortAsc = true;
    }
    document.querySelectorAll('.orphan-table th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = orphanSortAsc ? '▼' : '▲';
    orphanRender();
  });
});

// CSV出力
orphanCsv.addEventListener('click', () => {
  const filtered = orphanFilter();
  const cols = ['区分','品目コード','品目名','在庫管理','主仕入先','使用禁止日'];
  const rows = filtered.map(x => [
    x.category === 'active' ? '現役孤立' : '使用禁止品目コード',
    x.code, x.name, x.mgmt, x.supplier||'', x.prohibit ? formatYmd(x.prohibit) : ''
  ]);
  // CSV エンコード（カンマ・改行・ダブルクォートを安全に）
  const csv = [cols, ...rows].map(r => r.map(c => {
    const s = String(c||'');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\r\n');
  // BOM付きUTF-8でExcel互換
  const blob = new Blob(["﻿" + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,16).replace(/[-T:]/g,'');
  const prefix = (orphanMode === 'noroute') ? '品目手順登録漏れ'
              : (orphanMode === 'forbidden') ? '使用禁止品目を含む構成'
              : '構成なし品目';
  a.href = url;
  a.download = `${prefix}_${orphanCurrentTab}_${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// 初期化（データロード待ち）
window.addEventListener('load', () => {
  orphanInit();
});
</script>
