function _odmKv(lbl, val, isMono){
  const v = (val == null || val === "") ? `<span class="val empty">—</span>` : `<span class="val${isMono?' mono':''}">${escapeHtml(String(val))}</span>`;
  return `<div><span class="lbl">${lbl}</span>${v}</div>`;
}
function jumpToTreeFromOrder(code){
  if(!code) return;
  closeOrderDetail();
  jumpToTree(code);
}
function _renderOrderDetail(d){
  const h = d.header || {};
  const ext = d.extended || {};
  const lines = d.lines || [];
  const ITEM_HISTORY = window.ITEM_HISTORY || {};
  const asOf = ITEM_HISTORY.as_of || "—";
  let html = "";
  html += `<div style="background:#fffbeb;border:1px solid #fcd34d;color:#92400e;padding:6px 10px;border-radius:5px;margin-bottom:12px;font-size:10.5px;line-height:1.5">
    ⚠ <b>FUJIN取込データ (${escapeHtml(asOf)}時点)</b>。SMILEで直接編集された最新状態とは異なる可能性があります。
  </div>`;
  html += `<div class="odm-smile-hdr">
    <div class="odm-row1">
      <div class="kv lg"><span class="lbl">受注No.</span><span class="val mono">${escapeHtml(h.order_no||"-")}</span></div>
      <div class="kv"><span class="lbl">受注日付</span><span class="val">${escapeHtml(h.order_date||"-")}</span></div>
      <div class="kv"><span class="lbl">受注区分</span><span class="val ${h.order_type==='確定'?'positive':''}">${escapeHtml(h.order_type||"-")}</span></div>
    </div>
    <div class="odm-row2">
      <div class="kv"><span class="lbl">受注納期</span><span class="val">${escapeHtml(h.due_date||"-")}</span></div>
      <div class="kv"><span class="lbl">出荷予定日</span><span class="val">${escapeHtml(h.shipment_date||"-")}</span></div>
      <div class="kv"><span class="lbl">製造納期</span><span class="val">${escapeHtml(h.manufacture_date||"-")}</span></div>
      <div class="kv"><span class="lbl">取引</span><span class="val">${escapeHtml(h.deal_type||"-")}</span></div>
    </div>
  </div>`;
  html += `<div class="odm-section">
    <h4>得意先 / 倉庫 / 担当 / 納品先</h4>
    <div class="odm-grid">
      ${_odmKv("得意先", h.customer_code ? `${h.customer_code} ${h.customer_name||h.customer_alias||""}` : (h.customer_name||h.customer_alias))}
      ${_odmKv("倉庫", h.warehouse_code ? `${h.warehouse_code} ${h.warehouse_name||""}` : h.warehouse_name)}
      ${_odmKv("客先注番", h.customer_po, true)}
      ${_odmKv("担当者", h.staff_code ? `${h.staff_code} ${h.staff_name||""}` : h.staff_name)}
      ${_odmKv("部門", h.dept_code ? `${h.dept_code} ${h.dept_name||""}` : h.dept_name)}
      ${_odmKv("納品先", h.delivery_to_code ? `${h.delivery_to_code} ${h.delivery_to_name||""}` : h.delivery_to_name)}
    </div>
  </div>`;
  html += `<div class="odm-section">
    <h4>明細 (${lines.length}行) <span style="font-weight:400;font-size:10.5px;color:#64748b">— 品目コードをクリックで構成ツリーへ移動</span></h4>
    <table class="odm-lines">
      <thead><tr>
        <th>#</th><th>品目コード</th><th>品目名 / 型番</th><th>製番</th>
        <th class="num">受注数</th><th class="num">売上済</th><th class="num">残量</th>
        <th>単位</th><th class="num">単価</th><th class="num">金額</th>
        <th>納期</th><th>出荷予定</th><th>状態</th>
      </tr></thead><tbody>`;
  lines.forEach((l,i)=>{
    const codeCell = l.code
      ? `<td class="mono"><span style="color:#1e40af;text-decoration:underline;cursor:pointer" onclick="jumpToTreeFromOrder('${escapeHtml(l.code)}')" title="構成ツリーで開く">${escapeHtml(l.code)}</span></td>`
      : `<td class="mono">-</td>`;
    html += `<tr>
      <td>${i+1}</td>
      ${codeCell}
      <td>${escapeHtml(l.name||"-")}${l.model?`<br><span style="color:#94a3b8;font-size:10px">${escapeHtml(l.model)}${l.drawing_no?' / 図'+escapeHtml(l.drawing_no):''}</span>`:""}</td>
      <td class="mono">${escapeHtml(l.seiban||"-")}</td>
      <td class="num">${Math.round(l.qty||0)}</td>
      <td class="num">${Math.round(l.sold_qty||0)}</td>
      <td class="num" style="color:#9a3412;font-weight:700">${Math.round(l.remaining_qty||0)}</td>
      <td>${escapeHtml(l.unit||"")}</td>
      <td class="num">${(l.unit_price||0).toLocaleString()}</td>
      <td class="num">${(l.amount||0).toLocaleString()}</td>
      <td class="mono">${escapeHtml(l.line_due||"-")}</td>
      <td class="mono">${escapeHtml(l.line_shipment_date||"-")}</td>
      <td><span style="font-size:10px;color:#9a3412;background:#ffedd5;padding:1px 5px;border-radius:3px;white-space:nowrap">${escapeHtml(l.complete||"未完納")}</span></td>
    </tr>`;
    if(l.line_remark){
      html += `<tr><td></td><td colspan="12" style="color:#64748b;font-size:10.5px;padding-left:0">摘要: ${escapeHtml(l.line_remark)}</td></tr>`;
    }
  });
  html += `</tbody></table></div>`;
  const sum_qty = lines.reduce((a,l)=>a+(l.qty||0),0);
  const sum_amt = lines.reduce((a,l)=>a+(l.amount||0),0);
  const sum_rem = lines.reduce((a,l)=>a+(l.remaining_qty||0),0);
  html += `<div class="odm-section">
    <h4>合計</h4>
    <div class="odm-grid">
      ${_odmKv("受注数量", Math.round(sum_qty).toLocaleString())}
      ${_odmKv("合計金額", "¥" + Math.round(sum_amt).toLocaleString())}
      ${_odmKv("受注残数量", Math.round(sum_rem).toLocaleString())}
    </div>
  </div>`;
  // 拡張項目 (配送指定など、ext)
  const extKeys = Object.keys(ext || {});
  if(extKeys.length){
    html += `<div class="odm-section"><h4>拡張項目</h4><div class="odm-grid">
      ${_odmKv("配送指定日", ext.delivery_designated_date)}
      ${_odmKv("配達指定(西濃用)", ext.delivery_seino)}
      ${_odmKv("社内メモ", ext.internal_memo)}
      ${_odmKv("BS受注№", ext.bs_order_no, true)}
    </div></div>`;
  }
  return html;
}

// 詳細リストの「使用先」セルをクリック→このポップアップ→各品目クリックでツリー遷移
function showUsedInPopup(srcCode, srcName){
  // 該当レコードを探す (item_code で one)
  const data = currentData();
  const rec = data.records.find(r => r.item_code === srcCode);
  if(!rec || !rec.used_in || rec.used_in.length === 0){
    return;
  }
  const modal = document.getElementById("usedInModal");
  document.getElementById("uimSrc").textContent = `(${srcCode}${srcName ? ' / ' + srcName : ''} が使われている最終製品 ${rec.used_in.length}件)`;
  const items = rec.used_in.map(it => {
    const code = (typeof it === 'string') ? it : (it[0] || '');
    const name = (typeof it === 'string') ? '' : (it[1] || '');
    if(code.startsWith('…')){
      return `<div class="uim-item" style="cursor:default;background:#f9fafb"><span class="uim-code">${escapeHtml(code)}</span></div>`;
    }
    return `<div class="uim-item" onclick="closeUsedInPopup();jumpToTree('${escapeHtml(code)}')">
      <span class="uim-code">${escapeHtml(code)}</span>
      <span class="uim-name">${escapeHtml(name)}</span>
      <span class="uim-arrow">→ ツリー</span>
    </div>`;
  }).join("");
  document.getElementById("uimContent").innerHTML = items;
  modal.classList.add("show");
}
function closeUsedInPopup(){
  document.getElementById("usedInModal")?.classList.remove("show");
}

// ===== 計画チップバー描画 (案A: グラフ上の横スクロール行) =====
function renderPlanChipBar(){
  const bar = document.getElementById("planChipBar");
  if(!bar) return;
  bar.innerHTML = '';
  const flagData = window._planFlagData;
  if(!flagData || !state.showPlanFlags || !Object.keys(flagData).length){
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');

  // 左端に「計画」固定ラベル + 隠すボタン
  const lbl = document.createElement('span');
  lbl.className = 'plan-chip-bar-label';
  lbl.innerHTML = '<i class="ti ti-calendar-event" aria-hidden="true"></i> 計画';
  bar.appendChild(lbl);

  const now = new Date(); now.setHours(0,0,0,0);
  const dowJp = ['日','月','火','水','木','金','土'];
  // 日付昇順 (過去→未来)
  const entries = Object.entries(flagData).sort((a,b) => a[0].localeCompare(b[0]));

  for(const [date, items] of entries){
    const dueD = new Date(date.replace(/\//g,'-'));
    const daysLeft = Math.round((dueD - now) / 86400000);
    const isPast = daysLeft < 0;
    const colorClass = isPast         ? 'plan-chip-gray'
                     : daysLeft <= 3  ? 'plan-chip-red'
                     : daysLeft <= 7  ? 'plan-chip-orange'
                                      : 'plan-chip-amber';
    const sorted = Object.entries(items).sort((a,b) => b[1].qty - a[1].qty);
    const top = sorted[0];
    const topQty = Math.round(top[1].qty);
    const otherCnt = sorted.length - 1;
    const code = top[0];
    const rawName = top[1].name || '';
    // 品目名をメイン表示 (なければ品目コード)
    const displayName = rawName
      ? (rawName.length > 14 ? rawName.slice(0,13) + '…' : rawName)
      : (code.length > 12 ? code.slice(0,11) + '…' : code);
    // 品目コードはサブ表示 (名前がある場合のみ)
    const displayCode = rawName
      ? (code.length > 12 ? code.slice(0,11) + '…' : code)
      : '';
    const md = date.slice(5).replace(/^0/,'').replace(/\/0/,'/');
    const dow = dueD.getDay();
    const dateLabel = `${md}${dowJp[dow]}`;
    const qtyLabel = `${topQty}台${otherCnt > 0 ? ' 他' + otherCnt + '機種' : ''}`;
    // tooltip: 全機種一覧 (品目名 + コード)
    const allItems = sorted.map(([c,v]) => `${v.name || c} (${c}) ×${Math.round(v.qty)}台`).join('\n');

    const btn = document.createElement('button');
    btn.className = `plan-chip ${colorClass}`;
    btn.title = `${date}\n${allItems}`;
    btn.innerHTML =
      `<span class="pc-date">${dateLabel}</span>` +
      `<span class="pc-model">${displayName}</span>` +
      (displayCode ? `<span class="pc-code">${displayCode}</span>` : '') +
      `<span class="pc-qty">${qtyLabel}</span>`;
    btn.addEventListener('click', () => {
      // 詳細リストをその日付に絞り込み
      state._dateFilter = date;
      state.detailLimit = 500;
      renderDetail();
      // アクティブ枠
      bar.querySelectorAll('.plan-chip').forEach(c => c.style.outline = '');
      btn.style.outline = '2px solid rgba(255,255,255,0.9)';
      btn.style.outlineOffset = '1px';
    });
    bar.appendChild(btn);
  }
}

// QRコード/バーコードスキャナー (雅さん 2026-05-29: 品目コードをカメラで検索)
async function openQrScanner(){
  if(!('BarcodeDetector' in window)){
    alert('このブラウザはバーコード読み取りに対応していません。\nChrome/Edge 最新版をお試しください。');
    return;
  }
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  }catch(e){
    alert('カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。');
    return;
  }
  const detector = new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_13','ean_8','itf','codabar']});
  // モーダル作成
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px';
  const title = document.createElement('div');
  title.innerHTML = '<i class="ti ti-scan" style="font-size:16px;vertical-align:-2px" aria-hidden="true"></i> 品目コードをスキャン';
  title.style.cssText = 'color:#fff;font-size:15px;font-weight:700';
  const video = document.createElement('video');
  video.autoplay = true; video.playsInline = true;
  video.style.cssText = 'max-width:90vw;max-height:60vh;border-radius:10px;border:3px solid #22c55e';
  video.srcObject = stream;
  const hint = document.createElement('div');
  hint.textContent = 'バーコードをカメラに向けてください';
  hint.style.cssText = 'color:#94a3b8;font-size:12px';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ キャンセル';
  closeBtn.style.cssText = 'padding:8px 24px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:14px';
  overlay.append(title, video, hint, closeBtn);
  document.body.appendChild(overlay);
  let scanTimer = null;
  const close = () => {
    clearInterval(scanTimer);
    stream.getTracks().forEach(t=>t.stop());
    overlay.remove();
  };
  closeBtn.onclick = close;
  overlay.onclick = e => { if(e.target === overlay) close(); };
  // スキャンループ
  scanTimer = setInterval(async ()=>{
    if(video.readyState < video.HAVE_ENOUGH_DATA) return;
    try{
      const codes = await detector.detect(video);
      if(codes.length > 0){
        const val = codes[0].rawValue.trim();
        close();
        const el = document.getElementById('itemCodeSearch');
        if(el){ el.value = val; }
        state.itemCodeSearch = val;
        document.getElementById('itemCodeSearchClear').style.display = '';
        renderAll();
      }
    }catch(_){}
  }, 300);
}

const _ordererSearchEl = document.getElementById("ordererSearch");
_ordererSearchEl?.addEventListener("focus", showOrdererDropdown);
_ordererSearchEl?.addEventListener("input", showOrdererDropdown);
_ordererSearchEl?.addEventListener("blur", hideOrdererDropdown);

// 初回描画 (雅さん 2026-05-24: 構成ツリーから戻ったとき完全復元)
function initialRender(){
  const s = restoreYamaState();
  // UIを復元状態に合わせる
  if(s){
    applyRestoredUI(s);
    renderAll({preserveDateFilter: true});
  } else {
    renderAll();
  }
  // 詳細リストスクロール: 状態保存 + グラフ同期
  const dw = document.querySelector('.detail-wrap');
  if(dw){
    let scrollTimer = null;
    let scrollSyncTimer = null;
    dw.addEventListener('scroll', () => {
      // (1) 状態保存
      if(scrollTimer) clearTimeout(scrollTimer);
      scrollTimer = setTimeout(saveYamaState, 300);
      // (2) スクロール同期: 先頭可視行の期間をグラフにハイライト (雅さん 2026-05-27)
      if(scrollSyncTimer) clearTimeout(scrollSyncTimer);
      scrollSyncTimer = setTimeout(() => {
        const tbody = document.getElementById('detailBody');
        if(!tbody) return;
        const wrapTop = dw.getBoundingClientRect().top;
        const rows = tbody.querySelectorAll('tr[data-idx]');
        for(const row of rows){
          const rect = row.getBoundingClientRect();
          if(rect.bottom > wrapTop + 4){
            const idx = parseInt(row.dataset.idx);
            const r = _detailRecs[idx];
            if(r){
              const sd = r.start_date || r.date;
              const label = `${r.item_code} × ${Math.round(r.qty)}台`;
              highlightPeriod(sd, r.date, label);
            }
            break;
          }
        }
      }, 80);  // 80ms debounce
    });
  }
}
window.addEventListener("load", initialRender);
// data遅延ロードの保険
setTimeout(() => {
  if(!chart) initialRender();
}, 800);
</script>
