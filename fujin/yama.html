<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>山リスト | FUJIN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f4f5f7; --card:#fff; --ink:#1f2a37; --muted:#6b7280;
  --line:#e5e7eb; --accent:#2b6cb0;
}
*{box-sizing:border-box}
html, body { height: 100%; }
body{margin:0;font-family:"Hiragino Sans","Meiryo","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;overflow:hidden}
/* レイアウト方針 (雅さん 2026-05-24):
   - グラフを画面に常時固定 (詳細スクロール中も消えない)
   - 詳細リストは内部スクロール、ヘッダーは sticky
   - iPad/スマホでもグラフが見える */
header{padding:6px 14px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:100}
header h1{margin:0;font-size:14px;font-weight:600}
header .sub{font-size:10.5px;opacity:.85}
header .meta{margin-left:auto;font-size:10.5px;opacity:.85}
.toolbar-wrap{flex-shrink:0;background:#fff;border-bottom:1px solid var(--line);z-index:90}
.toolbar{background:#fff;padding:5px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.toolbar .group{display:flex;align-items:center;gap:5px}
.toolbar label{font-size:11px;color:var(--muted)}
.toolbar button{padding:3px 10px;font-size:11.5px;border:1px solid #cbd5e1;background:#fff;border-radius:5px;cursor:pointer;font-family:inherit;color:#475569;transition:all .15s}
.toolbar button .ti,.toolbar label .ti,.chart-toggle .ti,.chart-hint .ti,.plan-chip-bar-label .ti{font-size:13px;vertical-align:-2px}
.toolbar button:hover{background:#f1f5f9}
.toolbar button.active{background:#1e40af;color:#fff;border-color:#1e40af;font-weight:600}
.toolbar input[type="date"]{padding:2px 5px;font-size:11px;border:1px solid #cbd5e1;border-radius:4px;font-family:inherit}
.toolbar .count{font-size:11px;color:#475569;margin-left:auto}
.toolbar .count b{color:#1e40af;font-size:12.5px;font-variant-numeric:tabular-nums}
/* メインステージ = 残り全部、縦に chart-wrap + detail-wrap */
.print-stage{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.chart-wrap{background:#fff;border-bottom:2px solid #cbd5e1;padding:8px 14px 4px;position:relative;flex-shrink:0;height:38vh;min-height:240px;max-height:420px;transition:height .2s,min-height .2s,max-height .2s,padding .2s}
/* 雅さん 2026-05-25: 折りたたみ可能に */
.chart-wrap.collapsed{height:28px;min-height:28px;max-height:28px;padding:4px 14px;border-bottom:1px solid #cbd5e1}
.chart-wrap.collapsed #yamaChart,.chart-wrap.collapsed .chart-hint{display:none}
.chart-wrap.collapsed + .weeknav-bar{display:none!important}
.chart-toggle{position:absolute;top:4px;right:8px;background:#fff;border:1px solid #cbd5e1;color:#475569;font-size:11px;padding:1px 8px;border-radius:4px;cursor:pointer;font-family:inherit;z-index:30}
.chart-toggle:hover{background:#f1f5f9;border-color:#94a3b8}
.chart-wrap.collapsed .chart-toggle{top:2px;right:8px}
.chart-collapsed-label{display:none;position:absolute;left:14px;top:5px;font-size:11px;color:#475569;font-weight:600}
.chart-wrap.collapsed .chart-collapsed-label{display:inline}
/* 雅さん 2026-05-25: 日付ラベルと被るので右上(隠すボタンの左)に移動 */
.chart-wrap .chart-hint{position:absolute;bottom:6px;right:80px;font-size:10px;color:#94a3b8;background:#f1f5f9;padding:2px 8px;border-radius:10px;pointer-events:none;opacity:.85;transition:opacity .15s}
.chart-wrap.is-hovering .chart-hint{opacity:0}
@media (max-width: 900px) { .chart-wrap .chart-hint{display:none} }
#yamaChart{width:100%!important;height:100%!important}
/* 計画チップバー (雅さん 2026-05-30 案A: グラフ上の横スクロール一覧) */
#planChipBar{background:#fff;border-bottom:0.5px solid #e2e8f0;padding:5px 14px;display:flex;align-items:center;gap:5px;overflow-x:auto;overflow-y:hidden;flex-shrink:0;min-height:46px;scrollbar-width:thin;scrollbar-color:#e2e8f0 transparent}
#planChipBar::-webkit-scrollbar{height:4px}
#planChipBar::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
#planChipBar.hidden{display:none!important}
.plan-chip{display:inline-flex;flex-direction:column;align-items:flex-start;padding:3px 9px 4px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:opacity .12s,transform .1s;line-height:1.3}
.plan-chip:hover{opacity:.82;transform:translateY(-1px)}
.plan-chip:active{transform:scale(.97)}
.plan-chip .pc-date{font-size:9px;opacity:.82}
.plan-chip .pc-model{font-size:11.5px;font-weight:600}
.plan-chip .pc-code{font-size:9px;opacity:.72;font-family:"SF Mono","Menlo",monospace;letter-spacing:.02em}
.plan-chip .pc-qty{font-size:14px;font-weight:700}
.plan-chip-bar-label{font-size:10.5px;font-weight:600;color:#64748b;flex-shrink:0;white-space:nowrap;padding:2px 6px 2px 0;border-right:1px solid #e2e8f0;margin-right:6px;align-self:stretch;display:flex;align-items:center}
.plan-chip-red{background:#ef4444;color:#fff}
.plan-chip-orange{background:#f97316;color:#fff}
.plan-chip-amber{background:#f59e0b;color:#fff}
.plan-chip-gray{background:#94a3b8;color:#fff;opacity:.6}
.weeknav-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:4px 14px;display:flex;justify-content:center;align-items:center;gap:6px;flex-shrink:0}
.weeknav-bar button{padding:3px 12px;font-size:11.5px;border:1px solid #cbd5e1;background:#fff;border-radius:5px;cursor:pointer;font-family:inherit;color:#475569;transition:all .12s}
.weeknav-bar button:hover{background:#eff6ff;border-color:#2563eb;color:#1e40af}
.weeknav-bar button#todayBtn{background:#fef3c7;color:#92400e;border-color:#f59e0b;font-weight:600}
.weeknav-bar button#todayBtn:hover{background:#fde68a}
.weeknav-bar button#todayBtn.shifted{background:#fde68a}
.detail-wrap{background:#fff;padding:4px 14px;flex:1;overflow-y:auto;min-height:0}
/* 詳細リストヘッダーは table の caption に統合済 (雅さん 2026-05-25 行確保) */
.detail-table{width:100%;border-collapse:collapse;font-size:11.5px}
.detail-table th{background:#f1f5f9;padding:5px 7px;text-align:left;font-weight:700;color:#475569;border-bottom:1px solid #cbd5e1;position:sticky;top:0;z-index:5;cursor:pointer;box-shadow:0 1px 0 #cbd5e1}
.detail-table th:hover{background:#e2e8f0}
.detail-table td{padding:4px 7px;border-bottom:1px solid #f1f5f9}
.detail-table tr{cursor:pointer;transition:background .08s}
.detail-table tr:hover{background:#dbeafe!important}
.detail-table tr.row-highlighted{background:#fde68a!important;outline:2px solid #f59e0b;outline-offset:-2px}
.detail-table .num{text-align:right;font-variant-numeric:tabular-nums}
.detail-table .mono{font-family:"SF Mono","Menlo",monospace;font-size:10.5px}
.detail-table tr.confirmed{background:#f8fafc}
.detail-table tr.unconfirmed{background:#fef9c3}
.detail-table .item-link{color:#1e40af;cursor:pointer;text-decoration:underline}
.detail-table .item-link:hover{color:#1e3a8a}
.used-in-chip{display:inline-block;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:0 5px;margin:0 2px 0 0;font-size:10px;line-height:1.5;white-space:nowrap}
.used-in-cell{cursor:pointer;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.used-in-cell:hover{background:#eff6ff}
.used-in-more{color:#475569;font-size:10px;background:#dbeafe;border-radius:4px;padding:0 5px;font-weight:600;border:1px solid #93c5fd}
.used-in-none{color:#cbd5e1;font-size:10.5px;font-style:italic}
.used-in-none-stock{color:#94a3b8;font-size:10px;background:#f1f5f9;border-radius:3px;padding:0 6px}
.used-in-expense{color:#9a3412;font-size:10px;background:#ffedd5;border-radius:3px;padding:0 6px;font-weight:600}
/* 発注者チップ */
.orderer-chip{display:inline-block;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;border-radius:11px;padding:1px 8px;font-size:10.5px;cursor:pointer;transition:all .12s;white-space:nowrap}
.orderer-chip:hover{background:#c7d2fe}
.orderer-chip.active{background:#3730a3;color:#fff;border-color:#3730a3;font-weight:600}
.orderer-none{color:#cbd5e1;font-size:10.5px;font-style:italic}
/* 紐づくNoセル (雅さん 2026-05-24: 縦積みやめて1行に圧縮、overflowは+N) */
.ids-cell{font-size:10px;line-height:1.4;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.id-chip{display:inline-block;margin:0 2px 0 0;padding:0 5px;border-radius:3px;font-family:"SF Mono","Menlo",monospace;font-size:9.5px;line-height:1.5;vertical-align:middle;cursor:pointer;transition:opacity .1s}
.id-chip:hover{opacity:.75}
.id-chip.id-po{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.id-chip.id-th{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe}
.id-chip.id-so{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.orderer-filter{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.orderer-filter .of-chip{padding:3px 10px;font-size:10.5px;border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.orderer-filter .of-chip:hover{background:#c7d2fe}
.orderer-filter .of-chip.active{background:#3730a3;color:#fff;border-color:#3730a3;font-weight:600}
.orderer-filter .of-me{background:#fef3c7;border-color:#f59e0b;color:#92400e;font-weight:700}
.orderer-filter .of-me.active{background:#d97706;color:#fff;border-color:#d97706}
/* 受注詳細モーダル (results_production.html から移植 雅さん 2026-05-24) */
#orderDetailModal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99998;display:none}
#orderDetailModal.show{display:block}
#orderDetailModal .odm-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.55)}
#orderDetailModal .odm-box{position:absolute;top:4vh;left:50%;transform:translateX(-50%);width:92vw;max-width:920px;max-height:92vh;overflow-y:auto;background:#fff;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.25)}
.odm-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:2}
.odm-header h3{margin:0;font-size:15px;color:#1e3a8a;font-weight:700;display:flex;align-items:baseline;gap:10px}
.odm-header h3 .ono{font-family:"SF Mono","Menlo",monospace;color:#1e40af;font-size:18px}
.odm-header button{background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;line-height:1;padding:4px 10px;border-radius:6px}
.odm-header button:hover{background:#f1f5f9;color:#1e293b}
.odm-content{padding:14px 18px 20px}
.odm-section{margin-bottom:18px}
.odm-section h4{margin:0 0 8px;font-size:11px;color:#64748b;letter-spacing:.06em;text-transform:uppercase;font-weight:700;border-bottom:1px solid #e5e7eb;padding-bottom:4px}
.odm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:5px 14px;font-size:11.5px}
.odm-grid > div{display:flex;gap:8px;padding:2px 0}
.odm-grid .lbl{color:#64748b;min-width:96px;flex-shrink:0}
.odm-grid .val{color:#1e293b;font-weight:600;word-break:break-all}
.odm-grid .val.empty{color:#cbd5e1;font-weight:400}
.odm-lines{width:100%;font-size:11px;border-collapse:collapse;margin-top:4px}
.odm-lines th{background:#f1f5f9;padding:5px 8px;text-align:left;font-weight:700;color:#475569;border-bottom:1px solid #cbd5e1;font-size:10.5px;white-space:nowrap}
.odm-lines td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.odm-lines .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.odm-lines .mono{font-family:"SF Mono","Menlo",monospace}
.odm-empty{padding:24px;text-align:center;color:#94a3b8;font-size:12px;line-height:1.6}
.odm-smile-hdr{background:#f8fafc;border:1px solid #cbd5e1;border-radius:6px;padding:10px 14px;margin-bottom:14px}
.odm-smile-hdr .odm-row1,.odm-smile-hdr .odm-row2{display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;padding:3px 0}
.odm-smile-hdr .odm-row1{border-bottom:1px dashed #cbd5e1;padding-bottom:8px;margin-bottom:6px}
.odm-smile-hdr .kv{display:flex;align-items:baseline;gap:8px}
.odm-smile-hdr .kv .lbl{font-size:11px;color:#64748b;font-weight:700;min-width:62px}
.odm-smile-hdr .kv .val{font-size:12.5px;color:#1e293b;font-weight:600}
.odm-smile-hdr .kv .val.mono{font-family:"SF Mono","Menlo",monospace}
.odm-smile-hdr .kv .val.positive{color:#065f46;background:#d1fae5;padding:1px 6px;border-radius:3px;font-size:11px}
.odm-smile-hdr .kv.lg .val{font-size:18px;color:#1e40af;font-weight:700}
.odm-smile-hdr .kv.lg .lbl{font-size:11px}
.detail-table .seiban-link{color:#1e40af;cursor:pointer;text-decoration:underline}
.detail-table .seiban-link:hover{color:#1e3a8a;background:#dbeafe}
/* 使用先一覧ポップアップ */
#usedInModal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99997;display:none;background:rgba(15,23,42,.55)}
#usedInModal.show{display:flex;align-items:flex-start;justify-content:center;padding-top:8vh}
#usedInModal .uim-box{background:#fff;border-radius:8px;width:92vw;max-width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.25)}
.uim-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:2}
.uim-header h3{margin:0;font-size:14px;color:#1e3a8a;font-weight:700}
.uim-header .uim-src{font-size:11px;color:#64748b;font-weight:400;margin-left:8px}
.uim-header button{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b;line-height:1;padding:4px 8px;border-radius:6px}
.uim-header button:hover{background:#f1f5f9}
.uim-content{padding:12px 16px 16px}
.uim-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:5px;cursor:pointer;transition:all .12s}
.uim-item:hover{background:#eff6ff;border-color:#2563eb}
.uim-item .uim-code{font-family:"SF Mono","Menlo",monospace;font-weight:600;color:#1e40af;min-width:100px}
.uim-item .uim-name{color:#475569;font-size:12px;flex:1}
.uim-item .uim-arrow{color:#94a3b8}
.empty{color:#94a3b8;text-align:center;padding:24px;font-style:italic}
.status-badge{font-size:9.5px;padding:1px 5px;border-radius:3px;font-weight:600}
.status-badge.confirmed{background:#d1fae5;color:#065f46}
.status-badge.unconfirmed{background:#fef3c7;color:#854d0e}

/* iPad/スマホ対応 (雅さん 2026-05-24: 詳細リストが見えない問題を強化) */
@media (max-width: 1024px) {
  .chart-wrap { height: 30vh; min-height: 180px; max-height: 320px; padding: 4px 10px 2px; }
  header h1 { font-size: 13px; }
  header .sub { font-size: 10px; }
  .toolbar { padding: 3px 10px; gap: 6px; }
  .toolbar label { font-size: 11px; }
  .toolbar button { padding: 2px 8px; font-size: 10.5px; }
  .toolbar input[type="date"]{ font-size:10.5px; padding:1px 4px }
  .detail-wrap { padding: 6px 10px; }
  .detail-table { font-size: 11px; }
  .detail-table th, .detail-table td { padding: 3px 5px; }
}
/* 画面が縦方向に狭い場合: グラフを圧縮して詳細リストの面積を確保 */
@media (max-height: 800px) {
  .chart-wrap { height: 30vh; min-height: 160px; max-height: 280px; }
}
@media (max-height: 650px) {
  .chart-wrap { height: 26vh; min-height: 140px; max-height: 220px; }
  .toolbar { padding: 2px 10px; gap: 5px; }
  .toolbar button { padding: 1px 7px; font-size: 10px; }
}
@media (max-width: 768px) {
  /* タブレット縦/スマホ: ツールバー要素を更に圧縮 */
  .chart-wrap { height: 26vh; min-height: 150px; max-height: 240px; padding: 3px 8px 2px; }
  .toolbar { padding: 3px 8px; gap: 5px; flex-wrap: wrap }
  .toolbar > .group { gap: 3px; flex-wrap: wrap }
  .toolbar button { padding: 2px 6px; font-size: 10px }
  .toolbar label { font-size: 10.5px }
  .toolbar input[type="search"] { font-size: 11px; padding: 3px 6px }
  .detail-wrap { padding: 4px 8px }
  .detail-table th, .detail-table td { padding: 2px 4px; font-size: 10.5px }
  .id-chip { font-size: 9px; padding: 0 4px }
  .ids-cell { max-width: 130px }
}
@media (max-width: 640px) {
  .chart-wrap { height: 24vh; min-height: 130px; max-height: 200px }
  header .sub, header .meta { display: none }
  .toolbar .count { display: none }
  .detail-table .mono { font-size: 9.5px }
}
/* 詳細リストには最低限の表示面積を確保 */
.detail-wrap { min-height: 200px }

/* 作業区/仕入先チップ (雅さん 2026-05-24: チップ一覧UIに戻し) */
.wp-filter{display:flex;flex-wrap:nowrap;gap:4px;padding:0 0 2px;margin:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.wp-filter::-webkit-scrollbar{height:5px}
.wp-filter::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.wp-filter .wp-chip{padding:3px 9px;font-size:10.5px;border:1px solid #cbd5e1;background:#fff;border-radius:11px;cursor:pointer;color:#475569;transition:all .12s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.wp-filter .wp-chip:hover{background:#f1f5f9}
.wp-filter .wp-chip.active{background:#1e40af;color:#fff;border-color:#1e40af;font-weight:600}
.wp-filter .wp-chip.all{font-weight:700}
/* 発注者の検索ボックス型は維持 */
.combo-filter{position:relative}
.combo-input{width:100%;padding:5px 10px;font-size:12px;border:1px solid #cbd5e1;border-radius:4px;font-family:inherit;background:#fff}
.combo-input:focus{outline:2px solid #2563eb;outline-offset:-1px;border-color:#2563eb}
.combo-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;max-height:280px;overflow-y:auto;background:#fff;border:1px solid #cbd5e1;border-radius:5px;box-shadow:0 6px 18px rgba(0,0,0,0.12);z-index:50;padding:4px}
.combo-dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;font-size:11.5px;cursor:pointer;border-radius:4px;transition:background .1s}
.combo-dropdown-item:hover{background:#eff6ff}
.combo-dropdown-item.selected{background:#dbeafe;color:#1e40af;font-weight:600}
.combo-dropdown-item .count{color:#94a3b8;font-size:10px;margin-left:8px}
.combo-dropdown-item .me-tag{background:#fef3c7;color:#92400e;font-size:9.5px;padding:0 5px;border-radius:3px;margin-left:6px;font-weight:600}
.combo-dropdown-empty{padding:10px;text-align:center;color:#94a3b8;font-size:11px}
.combo-selected{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.combo-selected .sel-chip{display:inline-flex;align-items:center;gap:5px;background:#1e40af;color:#fff;padding:3px 8px 3px 10px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap}
.combo-selected .sel-chip .x{cursor:pointer;opacity:.85;background:rgba(255,255,255,.25);width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
.combo-selected .sel-chip .x:hover{opacity:1;background:rgba(255,255,255,.4)}
.combo-selected .sel-chip.orderer{background:#3730a3}
.combo-selected .sel-chip.me{background:#d97706}

/* 印刷用: A3横で「左=大きいグラフ / 右=明細」のレイアウト (雅さん 2026-05-24) */
@media print {
  @page { size: A3 landscape; margin: 10mm; }
  body { font-size: 9px; }
  html, body { background: #fff !important; }
  header { background: #1e40af !important; color: #fff !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    position: static !important; padding: 4px 10px;
  }
  header h1 { font-size: 13px; }

<script>
// ===== 状態 =====
let state = {
  scope: "internal",           // internal / external
  status: "all",               // all / confirmed / unconfirmed
  stockFilter: "all",          // all / managed / unmanaged (在庫管理区分フィルター 雅さん 2026-05-29)
  period: "30",                // 7/14/30/60/90/custom
  from: null, to: null,
  selectedWps: new Set(),      // 選択された作業区/仕入先 (空=全部)
  selectedOrderers: new Set(), // 選択された発注者 (空=全員) 雅さん 2026-05-24
  finalOnly: false,            // 最終製品のみフィルタ (雅さん 2026-05-25)
  sortCol: "date", sortAsc: true,
  dateOffset: 0,               // 基準日のずらし量 (日, 雅さん 2026-05-24: 前週/翌週ナビ用)
  globalSearch: "",            // 製番/受注No/品目名/発注No/手配No 横断検索
  itemCodeSearch: "",          // 品目コード専用検索 (雅さん 2026-05-29: カメラ連動)
  showPlanFlags: true,         // 計画旗マーカー表示ON/OFF (雅さん 2026-05-30)
  detailLimit: 500,            // 詳細リスト表示件数上限 (「他N件」クリックで拡張)
};
// 「自分」判定用のログインID (雅さん想定。将来 MSAL から取得可能)
// デフォルトは H016 (花岡 雅) 2026-05-24
let _myLoginId = "";
try { _myLoginId = (localStorage.getItem("_fujin_my_login") || "H016").toUpperCase(); } catch(_){ _myLoginId = "H016"; }
let chart = null;
let _detailRecs = [];  // 最後にrenderDetailで描画したレコード配列 (chipクリック・スクロール同期用)

function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

// ===== 状態保存/復元 (雅さん 2026-05-24: 構成ツリーから戻ったとき元の見え方に戻したい) =====
const _STATE_KEY = "_fujin_yama_state_v1";
function saveYamaState(){
  try {
    const dw = document.querySelector('.detail-wrap');
    sessionStorage.setItem(_STATE_KEY, JSON.stringify({
      scope: state.scope, status: state.status, period: state.period,
      from: state.from, to: state.to,
      dateOffset: state.dateOffset || 0,
      selectedWps: Array.from(state.selectedWps),
      selectedOrderers: state.selectedOrderers ? Array.from(state.selectedOrderers) : [],
      sortCol: state.sortCol, sortAsc: state.sortAsc,
      scrollTop: dw ? dw.scrollTop : 0,
      _dateFilter: state._dateFilter || null,
      wpSearch: document.getElementById('wpSearch')?.value || "",
      ts: Date.now(),
    }));
  } catch(_){}
}
function restoreYamaState(){
  try {
    const raw = sessionStorage.getItem(_STATE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    // 30分以上経ってたら古いので無視 (戻りに使うことは想定しない)
    if(!s.ts || (Date.now() - s.ts) > 30*60*1000) return null;
    state.scope = s.scope || 'internal';
    state.status = s.status || 'all';
    state.period = s.period || '30';
    state.from = s.from || null; state.to = s.to || null;
    state.dateOffset = s.dateOffset || 0;
    state.selectedWps = new Set(s.selectedWps || []);
    state.selectedOrderers = new Set(s.selectedOrderers || []);
    state.sortCol = s.sortCol || 'date';
    state.sortAsc = s.sortAsc !== false;
    state._dateFilter = s._dateFilter || null;
    return s;
  } catch(_){ return null; }
}
function applyRestoredUI(s){
  if(!s) return;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === state.scope));
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.status === state.status));
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === state.period));
  if(s.wpSearch){
    const el = document.getElementById('wpSearch');
    if(el) el.value = s.wpSearch;
  }
  if(state.period === 'custom'){
    if(state.from) document.getElementById('periodFrom').value = state.from.replace(/\//g,'-');
    if(state.to) document.getElementById('periodTo').value = state.to.replace(/\//g,'-');
  }
  // スクロール復元は描画後に
  setTimeout(() => {
    const dw = document.querySelector('.detail-wrap');
    if(dw && s.scrollTop) dw.scrollTop = s.scrollTop;
  }, 200);
}

// 営業日数 (土日除外、両端含む)
function businessDaysBetween(startStr, endStr){
  if(!startStr || !endStr) return 1;
  try {
    const a = new Date(startStr.replace(/\//g,'-'));
    const b = new Date(endStr.replace(/\//g,'-'));
    if(a > b) return 1;
    let count = 0;
    const cur = new Date(a);
    while(cur <= b){
      const dow = cur.getDay();
      if(dow !== 0 && dow !== 6) count++;
      cur.setDate(cur.getDate() + 1);
    }
    return Math.max(1, count);
  } catch(_){ return 1; }
}

// ローカルタイムゾーンで YYYY/MM/DD を返す（toISOString はJSTで1日ズレるため使わない）
function _d2ymd(d){
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// 期間範囲の決定
function getDateRange(){
  if(state.period === "custom" && state.from && state.to){
    return {from: state.from, to: state.to};
  }
  // today をローカル日付で取得（YAMA_DATA.as_of があればそれを使う）
  const _now = new Date();
  const today = (window.YAMA_DATA && window.YAMA_DATA.as_of) ||
    `${_now.getFullYear()}/${String(_now.getMonth()+1).padStart(2,'0')}/${String(_now.getDate()).padStart(2,'0')}`;
  // baseDate: YMD をローカルパーツから構築してタイムゾーンズレを防ぐ
  const [ty,tm,td] = today.replace(/-/g,'/').split('/').map(Number);
  const baseDate = new Date(ty, tm-1, td);
  if(state.dateOffset) baseDate.setDate(baseDate.getDate() + state.dateOffset);
  const days = parseInt(state.period) || 30;
  const isShort = days <= 14;
  // 雅さん 2026-05-25/2026-05-27:
  //   - 短期 (1週間/2週間): 当日から N日。"全て"は±14日、"実績のみ"は過去60日
  //   - 月単位 (1ヶ月/2ヶ月/3ヶ月): 当月1日から Nヶ月末 (ステータスに関わらず共通)
  //     → "全て"はデータ種別の表示切替であって期間拡張ではない
  //     → "実績のみ"は過去のみ表示に絞るため当月1日〜今日
  let fromD, toD;
  if(isShort){
    // 短期: 当週月曜日から起算 (雅さん 2026-05-27)
    fromD = new Date(baseDate);
    if(state.status === "actual"){
      fromD.setDate(fromD.getDate() - Math.max(60, days));
      toD = new Date(baseDate);
    } else {
      const dow = fromD.getDay();  // 0=日, 1=月 ... 6=土
      const daysToMon = dow === 0 ? 6 : dow - 1;
      fromD.setDate(fromD.getDate() - daysToMon);
      toD = new Date(fromD);
      toD.setDate(toD.getDate() + days - 1);
    }
  } else {
    // 月単位: 当月1日起算 (ステータスによらず基準は同じ)
    const months = Math.round(days / 30);
    fromD = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
    if(state.status === "actual"){
      // 実績のみ: 当月1日〜今日
      toD = new Date(baseDate);
    } else {
      // 全て / 計画・未確定 / 確定のみ: 当月1日〜N ヶ月後の末日
      toD = new Date(baseDate.getFullYear(), baseDate.getMonth() + months, 0);
    }
  }
  return {
    from: _d2ymd(fromD),
    to: _d2ymd(toD),
  };
}

// 週ナビボタンの表示制御 + ステップ計算
function updateWeekNav(){
  const nav = document.getElementById("weekNavGroup");
  if(!nav) return;
  const periodNum = parseInt(state.period) || 30;
  // 短期 (1週間/2週間) と 1ヶ月 でのみ表示
  if(state.period === "custom"){
    nav.style.display = "none";
  } else {
    nav.style.display = "";
  }
  // 「今日」ボタンの強調 (dateOffset != 0 なら強調)
  const todayBtn = document.getElementById("todayBtn");
  if(todayBtn){
    if(state.dateOffset){
      todayBtn.classList.add("shifted");
      todayBtn.textContent = `今日に戻す (${state.dateOffset > 0 ? '+' : ''}${state.dateOffset}日)`;
    } else {
      todayBtn.classList.remove("shifted");
      todayBtn.textContent = "今日";
    }
  }
}

// 現在のscopeに対応するデータ
function currentData(){
  return (window.YAMA_DATA && window.YAMA_DATA[state.scope]) || {workplaces:[],daily:[],records:[]};
}

// 統合検索: レコードに紐づく全ID群を文字列化 (検索用)
function _recIdBlob(r){
  // 受注Nリスト (seiban_to_order から引く)
  let orderNos = "";
  if(window.ITEM_HISTORY && r.seiban){
    const list = (window.ITEM_HISTORY.seiban_to_order || {})[r.seiban] || [];
    orderNos = list.map(o => (typeof o === 'string' ? o : (o.order_no || ''))).join(' ');
  }
  return [
    r.seiban, r.item_name, r.tehai_no,
    r.purchase_no, orderNos, r.orderer,
  ].filter(Boolean).join(' ').toLowerCase();
}

// フィルタ適用後のレコードを返す
function filteredRecords(){
  const data = currentData();
  const range = getDateRange();
  const term = (state.globalSearch || "").toLowerCase().trim();
  let out = data.records.filter(r=>{
    if(r.date < range.from || r.date > range.to) return false;
    if(state.status === "confirmed" && r.status !== "確定済") return false;
    // 雅さん 2026-05-24: "確定前" = "確定済/実績以外" (実データのstatus: 所要量計算/計画/確定済/実績)
    if(state.status === "unconfirmed" && (r.status === "確定済" || r.status === "実績")) return false;
    // 雅さん 2026-05-25: "計画のみ" = status === "計画" のレコードだけ
    if(state.status === "plan" && r.status !== "計画") return false;
    // 雅さん 2026-05-25: "実績のみ" = status === "実績" のレコードだけ
    if(state.status === "actual" && r.status !== "実績") return false;
    // 雅さん 2026-05-25: "最終製品のみ" = is_final=true のレコードだけ
    if(state.finalOnly && !r.is_final) return false;
    // 雅さん 2026-05-29: 在庫管理区分フィルター (stock_managed フィールドが付与されていれば有効)
    if(state.stockFilter === "managed" && r.stock_managed === false) return false;
    if(state.stockFilter === "unmanaged" && r.stock_managed !== false) return false;
    if(state.selectedWps.size > 0 && !state.selectedWps.has(r.workplace)) return false;
    if(state.selectedOrderers && state.selectedOrderers.size > 0){
      const o = r.orderer || "";
      if(!state.selectedOrderers.has(o)) return false;
    }
    // 統合検索 (雅さん 2026-05-24): 製番/受注No/品目名/発注No/手配No
    if(term){
      if(!_recIdBlob(r).includes(term)) return false;
    }
    // 品目コード専用検索 (雅さん 2026-05-29: itemCodeSearch行から入力 or QRスキャン)
    const icTerm = (state.itemCodeSearch || "").toLowerCase().trim();
    if(icTerm){
      if(!(r.item_code || "").toLowerCase().includes(icTerm)) return false;
    }
    return true;
  });
  // 実績があるものは確定済を非表示 (出荷・外注/購買・製造 全種別対応)
  // build_yama.py修正がyama_data.jsに未反映の間の暫定対応
  // ただし "確定済のみ" "実績のみ" フィルタ時は二重除去しないよう除外
  if(state.status !== "actual" && state.status !== "confirmed"){
    // kind × item_code × date で実績キーを収集
    const actualKeys = new Set();
    for(const r of out){
      if(r.status === "実績"){
        actualKeys.add(`${r.kind}|${r.item_code}|${r.date}`);
      }
    }
    if(actualKeys.size > 0){
      out = out.filter(r => {
        if(r.status !== "確定済") return true;
        return !actualKeys.has(`${r.kind}|${r.item_code}|${r.date}`);
      });
    }
  }
  return out;
}

// フィルタ適用後の日次集計
// 雅さん 2026-05-24: 検索フィルタも反映されるよう filteredRecords ベースで再集計
// データ形式: daily[].by_wp[wp][kind][status] = qty
function filteredDaily(){
  const range = getDateRange();
  const recs = filteredRecords();
  // レコードを期間内の各日に展開 (土日除外、build_yama.py の aggregate_daily と同じロジック)
  const dailyMap = {};
  for(const r of recs){
    const sd = r.start_date || r.date;
    const ed = r.date;
    const kind = r.kind || 'manufacture';
    const status = r.status || '所要量計算';
    const wp = r.workplace;
    const qty = r.qty;
    let sdD, edD;
    try {
      sdD = new Date(sd.replace(/\//g,'-'));
      edD = new Date(ed.replace(/\//g,'-'));
      if(sdD > edD){ const t = sdD; sdD = edD; edD = t; }
    } catch(_) { continue; }
    if(sdD.getTime() === edD.getTime()){
      // 単発: FUJINデータをそのまま反映（土日祝日はFUJIN側で判断済み）
      const dstr = ed;
      if(!dailyMap[dstr]) dailyMap[dstr] = {date:dstr, by_wp:{}};
      const wpMap = dailyMap[dstr].by_wp;
      if(!wpMap[wp]) wpMap[wp] = {};
      if(!wpMap[wp][kind]) wpMap[wp][kind] = {};
      wpMap[wp][kind][status] = (wpMap[wp][kind][status] || 0) + qty;
    } else {
      // 期間案件: start_date〜dateの営業日(土日除く)に加算
      // Pythonの_business_days_subtractが土日をスキップして start_date を計算しているため、
      // JS側も土日をスキップして整合させる (雅さん 2026-05-29: UDL25 10営業日スパン対応)
      const cur = new Date(sdD);
      while(cur <= edD){
        const dow = cur.getDay();
        if(dow !== 0 && dow !== 6){  // 土日はスキップ (0=日, 6=土)
          const y = cur.getFullYear(), m = String(cur.getMonth()+1).padStart(2,'0'), day = String(cur.getDate()).padStart(2,'0');
          const dstr = `${y}/${m}/${day}`;
          if(!dailyMap[dstr]) dailyMap[dstr] = {date:dstr, by_wp:{}};
          const wpMap = dailyMap[dstr].by_wp;
          if(!wpMap[wp]) wpMap[wp] = {};
          if(!wpMap[wp][kind]) wpMap[wp][kind] = {};
          wpMap[wp][kind][status] = (wpMap[wp][kind][status] || 0) + qty;
        }
        cur.setDate(cur.getDate() + 1);
      }
    }
  }
  // 期間内の日付配列を作成
  const result = [];
  const fromD = new Date(range.from.replace(/\//g,'-'));
  const toD = new Date(range.to.replace(/\//g,'-'));
  for(let d = new Date(fromD); d <= toD; d.setDate(d.getDate()+1)){
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    const dateStr = `${y}/${m}/${day}`;
    const entry = dailyMap[dateStr] || {date: dateStr, by_wp: {}};
    entry.dow = d.getDay();
    result.push(entry);
  }
  return result;
}

// 業務種別×確定度の色マップ (雅さん 2026-05-24 推奨採用)
// 色=業務種別(3色) × 透過度=確定度(3階調)
const KIND_COLORS = {
  manufacture: "#3b82f6",  // 製造=青
  external:    "#10b981",  // 外注/購買=緑
  shipment:    "#f97316",  // 出荷=オレンジ
};
// 実績は過去なので「グレー寄り」の業務種別色 (雅さん 2026-05-25)
const KIND_COLORS_ACTUAL = {
  manufacture: "#6b7280",  // 製造実績=濃グレー
  external:    "#9ca3af",  // 外注/購買実績=中グレー
  shipment:    "#94a3b8",  // 出荷実績=薄グレー (青寄り)
};
const STATUS_ALPHA = {
  "確定済":     1.0,   // 濃
  "所要量計算": 0.6,   // 中
  "計画":       0.3,   // 薄
  "実績":       0.85,  // 過去実績(グレー系で別表現)
};
const KIND_LABEL = {manufacture:"製造", external:"外注/購買", shipment:"出荷"};

function colorForKindStatus(kind, status){
  // 実績は別カラーランプ (雅さん 2026-05-25)
  if(status === "実績"){
    const base = KIND_COLORS_ACTUAL[kind] || "#9ca3af";
    const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
    return `rgba(${r},${g},${b},${STATUS_ALPHA["実績"]})`;
  }
  const base = KIND_COLORS[kind] || "#94a3b8";
  const alpha = STATUS_ALPHA[status] !== undefined ? STATUS_ALPHA[status] : 0.5;
  const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 作業区/仕入先別の色 (詳細リスト用、グラフは業務種別ベースなのでこちらは保険)
const COLOR_PALETTE = [
  "#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316",
  "#06b6d4","#84cc16","#a855f7","#eab308","#6366f1","#22c55e","#fb7185","#0ea5e9",
];
function colorForWp(wp){
  let h = 0;
  for(let i=0;i<wp.length;i++) h = (h*31 + wp.charCodeAt(i)) >>> 0;
  return COLOR_PALETTE[h % COLOR_PALETTE.length];
}

// ===== 計画旗プラグイン: チャート内は破線のみ。テキスト表示は #planChipBar に移譲 (雅さん 2026-05-30 案A) =====
const planFlagPlugin = {
  id: 'planFlag',
  afterDraw(chart) {
    if(!state.showPlanFlags) return;
    const flagData = window._planFlagData;
    if(!flagData || !Object.keys(flagData).length) return;
    const dateToIdx = window._planDateToIdx || {};
    const ctx = chart.ctx;
    const xAxis = chart.scales.x;
    const chartArea = chart.chartArea;
    const now = new Date(); now.setHours(0,0,0,0);
    ctx.save();
    for(const [date] of Object.entries(flagData)){
      const idx = dateToIdx[date];
      if(idx === undefined) continue;
      const x = xAxis.getPixelForValue(idx);
      const dueD = new Date(date.replace(/\//g,'-'));
      const daysLeft = Math.round((dueD - now) / 86400000);
      const isPast = daysLeft < 0;
      const lineColor = isPast         ? '#94a3b8'
                      : daysLeft <= 3  ? '#ef4444'
                      : daysLeft <= 7  ? '#f97316'
                                       : '#f59e0b';
      ctx.globalAlpha = isPast ? 0.22 : 0.50;
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1.0;
    ctx.restore();
  }
};

// ===== グラフ描画 =====
function renderChart(){
  const daily = filteredDaily();
  const dowJp = ['日','月','火','水','木','金','土'];
  // 雅さん 2026-05-25: コンパクトに「5/25月」(先頭0なし)
  const labels = daily.map(d => {
    const md = d.date.slice(5).replace(/^0/,'').replace(/\/0/,'/');
    return `${md}${dowJp[d.dow]}`;
  });
  const dowList = daily.map(d => d.dow);
  // 業務種別×確定度別の系列を作る (出荷=下、製造=中、外注=上 の順で積み上げ)
  // 雅さん 2026-05-24: 出荷は朝の作業なので下に積む
  // 凡例の見やすさのため、業務種別×確定度で集約 (作業区別ではない、作業区はチップフィルタで絞る)
  const STACK_ORDER = ["shipment","manufacture","external"];  // 下→上
  // 実績(過去)を一番下に置くと未来と区別しやすい (雅さん 2026-05-25)
  // 「計画」はバー積み上げから除外し旗マーカーで別表現 (雅さん 2026-05-30)
  const STATUS_ORDER = ["実績","確定済","所要量計算"];
  const datasets = [];
  for(const kind of STACK_ORDER){
    for(const status of STATUS_ORDER){
      const dataArr = daily.map(d => {
        let sum = 0;
        for(const [wp, kindMap] of Object.entries(d.by_wp)){
          const v = kindMap[kind]?.[status];
          if(v) sum += v;
        }
        return Math.round(sum*10)/10;
      });
      if(dataArr.every(v => v === 0)) continue; // 全部0ならdataset追加しない
      datasets.push({
        label: `${KIND_LABEL[kind]} (${status})`,
        data: dataArr,
        backgroundColor: colorForKindStatus(kind, status),
        borderWidth: 0,
        stack: "stk",
        _kind: kind, _status: status,
      });
    }
  }
  const ctx = document.getElementById("yamaChart").getContext("2d");
  if(chart) chart.destroy();
  if(!window.Chart){
    document.querySelector(".chart-wrap").innerHTML = "<div class='empty'>Chart.jsライブラリの読込に失敗しました</div>";
    return;
  }
  // 期間ハイライト用のラベル→index マップ
  const dateToIdx = {};
  daily.forEach((d,i) => { dateToIdx[d.date] = i; });
  window._planDateToIdx = dateToIdx;  // planFlagPlugin が参照

  // 計画レコード(status="計画")を旗データとして集計
  // { date: { item_code: {qty, name} } }
  window._planFlagData = {};
  for(const r of filteredRecords()){
    if(r.status !== '計画') continue;
    const d = r.date;
    if(!window._planFlagData[d]) window._planFlagData[d] = {};
    const code = r.item_code || r.seiban || '?';
    if(!window._planFlagData[d][code])
      window._planFlagData[d][code] = {qty: 0, name: r.item_name || ''};
    window._planFlagData[d][code].qty += (r.qty || 0);
  }
  renderPlanChipBar();  // チップバーを更新 (チャート描画より先に)

  // 表示範囲の最初と最後の日付 (バッチが表示外まで続く場合の判定用)
  const _firstDate = daily.length ? daily[0].date : null;
  const _lastDate = daily.length ? daily[daily.length-1].date : null;

  // 雅さん 2026-05-25: 各日 × (kind, status) セグメント内で「レコード単位」で累積位置を事前計算
  // 同一品目内でも複数のレコード (製番違いなど) は別々の位置にスライスを表示するため
  // _segItemCumulative[date][kind_status][recordKey] = {qtyBelow, qty}
  function _recordKey(r){
    return [r.item_code||'', r.seiban||'', r.tehai_no||'', String(r.qty||0)].join('|');
  }
  const _segItemCumulative = {};
  {
    // FUJINデータをそのまま反映（土日判断はFUJIN側で済み）
    const allRecsForCum = filteredRecords();
    for(const d of daily){
      _segItemCumulative[d.date] = {};
      const dayRecs = allRecsForCum.filter(r => {
        const sd = r.start_date || r.date;
        return sd <= d.date && d.date <= r.date;
      });
      const groups = {};
      for(const r of dayRecs){
        const segKey = `${r.kind||'manufacture'}_${r.status||'所要量計算'}`;
        if(!groups[segKey]) groups[segKey] = [];
        groups[segKey].push(r);
      }
      // 各セグメント内で「レコード単位」で台数の多い順に累積
      for(const [segKey, recs] of Object.entries(groups)){
        recs.sort((a,b) => (b.qty||0) - (a.qty||0));
        let cum = 0;
        const segMap = {};
        for(const r of recs){
          const key = _recordKey(r);
          if(segMap[key]) continue;  // 重複キーはスキップ (理論上ないはずだが安全策)
          segMap[key] = {qtyBelow: cum, qty: r.qty};
          cum += r.qty;
        }
        _segItemCumulative[d.date][segKey] = segMap;
      }
    }
  }
  // Chart.js プラグイン: 詳細リスト行ホバー時に
  //   ① 期間を薄い縦帯で背景に
  //   ② 各日の積み上げバー内に「このバッチのスライス」を浮き上がらせる
  //   ③ 上部にラベル「品目 × N台 (期間)」
  // 雅さん 2026-05-24 ご指摘: 期間バンドだけでは「このバッチがこの日のバーに含まれているか」が分からない
  //   → 積み上げ位置に明確にスライスを描画して可視化する
  const batchSlicePlugin = {
    id: 'batchSlice',
    afterDatasetsDraw(c) {
      const hb = state._highlightBatch;
      if(!hb) return;
      const xa = c.scales.x;
      const ya = c.scales.y;
      const ctx2 = c.ctx;
      const datasets = c.data.datasets;
      const labels = c.data.labels;
      // Chart.js メタデータから実際のバー幅を取得 (隣バーとの隙間に食い込まないよう)
      // barPercentage * categoryPercentage * categorySpacing = 実際の幅
      function _actualBarHalf(idx) {
        for(let di = 0; di < datasets.length; di++){
          try{
            const meta = c.getDatasetMeta(di);
            const bar = meta.data && meta.data[idx];
            if(bar && bar.width > 0) return bar.width / 2;
          }catch(_){}
        }
        // フォールバック: カテゴリ幅 × 0.36 (barPercentage=0.9 * categoryPercentage=0.8 / 2)
        if(labels.length > 1) return (xa.getPixelForValue(1) - xa.getPixelForValue(0)) * 0.36;
        return 14;
      }
      // 期間内 index 範囲
      // 雅さん 2026-05-24: バッチの start/end が表示範囲外でも、点線/赤線は端まで伸ばし
      // 「ここより前/後も続く」を示す矢印キャップを追加
      const i1 = dateToIdx[hb.start];
      const i2 = dateToIdx[hb.end];
      let lo = -1, hi = -1;
      let startBeforeRange = false, endAfterRange = false;
      if(i1 !== undefined) lo = i1;
      else if(hb.start && _firstDate && hb.start < _firstDate){ startBeforeRange = true; lo = 0; }
      if(i2 !== undefined) hi = i2;
      else if(hb.end && _lastDate && hb.end > _lastDate){ endAfterRange = true; hi = labels.length - 1; }
      // 片側のみ判定できた場合は反対側を同じ値に
      if(lo === -1 && hi !== -1) lo = hi;
      if(hi === -1 && lo !== -1) hi = lo;
      // (1) 期間背景バンド (薄め) + 期間下線 (常時見える太赤線)
      if(lo >= 0){
        // 実際のバー幅に合わせる (隣日のバーに食い込まないよう)
        const barH = _actualBarHalf(lo);
        let xLo = xa.getPixelForValue(lo) - barH;
        let xHi = xa.getPixelForValue(hi) + _actualBarHalf(hi);
        // 表示範囲外まで続く場合、端まで拡張
        if(startBeforeRange) xLo = xa.left;
        if(endAfterRange) xHi = xa.right;
        ctx2.save();
        ctx2.fillStyle = 'rgba(245,158,11,0.15)';
        ctx2.fillRect(xLo, ya.top, xHi - xLo, ya.bottom - ya.top);
        ctx2.restore();
        // 期間下線: バーが大きい日でスライスが埋もれてもこれだけは絶対見える
        if(hb.start !== hb.end){
          ctx2.save();
          ctx2.fillStyle = 'rgba(220, 38, 38, 0.85)';
          ctx2.fillRect(xLo + 2, ya.bottom - 5, (xHi - xLo) - 4, 4);
          // 端のキャップ: 範囲内端は短い縦バー、範囲外まで続く側は矢印に
          ctx2.fillStyle = '#7f1d1d';
          if(startBeforeRange){
            // 左矢印 (◀)
            ctx2.beginPath();
            ctx2.moveTo(xLo + 2, ya.bottom - 3);
            ctx2.lineTo(xLo + 11, ya.bottom - 10);
            ctx2.lineTo(xLo + 11, ya.bottom + 4);
            ctx2.closePath();
            ctx2.fill();
          } else {
            ctx2.fillRect(xLo + 2, ya.bottom - 8, 3, 7);
          }
          if(endAfterRange){
            // 右矢印 (▶)
            ctx2.beginPath();
            ctx2.moveTo(xHi - 2, ya.bottom - 3);
            ctx2.lineTo(xHi - 11, ya.bottom - 10);
            ctx2.lineTo(xHi - 11, ya.bottom + 4);
            ctx2.closePath();
            ctx2.fill();
          } else {
            ctx2.fillRect(xHi - 5, ya.bottom - 8, 3, 7);
          }
          ctx2.restore();
          // 範囲外まで続く側に「⋯前/後にも続く」の小さなラベル
          if(startBeforeRange || endAfterRange){
            ctx2.save();
            ctx2.font = '9.5px sans-serif';
            ctx2.fillStyle = '#7f1d1d';
            ctx2.textBaseline = 'bottom';
            if(startBeforeRange){
              ctx2.textAlign = 'left';
              ctx2.fillText('⋯ ' + hb.start + ' 〜', xLo + 14, ya.bottom - 10);
            }
            if(endAfterRange){
              ctx2.textAlign = 'right';
              ctx2.fillText('〜 ' + hb.end + ' ⋯', xHi - 14, ya.bottom - 10);
            }
            ctx2.restore();
          }
        }
      }
      // (2) 該当日のバー全体を赤枠でアウトライン表示
      // ※ バー内の「スライス位置」算出は複雑さ・誤表示の原因となるため廃止
      //    「どの日付列か」が一目で分かる列ハイライトのみ提供
      for(let i = lo; i >= 0 && i <= hi; i++){
        const barH = _actualBarHalf(i);
        const xCenter = xa.getPixelForValue(i);
        const xL = xCenter - barH;
        const xR = xCenter + barH;
        // バー全体の高さを取得 (全 dataset の合計)
        let totalQty = 0;
        for(const ds of datasets) totalQty += (ds.data[i] || 0);
        if(totalQty <= 0) continue;
        const yTop = ya.getPixelForValue(totalQty);
        const yBot = ya.getPixelForValue(0);
        ctx2.save();
        ctx2.strokeStyle = 'rgba(220,38,38,0.9)';
        ctx2.lineWidth = 2.5;
        ctx2.strokeRect(xL, yTop, xR - xL, yBot - yTop);
        ctx2.restore();
      }
      // (3) 上部ラベル
      if(hb.label && lo >= 0){
        ctx2.save();
        ctx2.font = 'bold 11.5px sans-serif';
        const txt = hb.label;
        const w = ctx2.measureText(txt).width + 16;
        // 帯の中央計算 (実際のバー幅に合わせる)
        let xLo = (i1 !== undefined) ? (xa.getPixelForValue(lo) - _actualBarHalf(lo)) : (startBeforeRange ? xa.left : xa.left);
        let xHi = (i2 !== undefined) ? (xa.getPixelForValue(hi) + _actualBarHalf(hi)) : (endAfterRange ? xa.right : xa.right);
        const bandCenter = (xLo + xHi) / 2;
        let lx = bandCenter - w / 2;
        // 範囲外にはみ出さないよう調整
        if(lx < xa.left + 4) lx = xa.left + 4;
        if(lx + w > xa.right - 4) lx = xa.right - w - 4;
        ctx2.fillStyle = 'rgba(220,38,38,0.95)';
        ctx2.fillRect(lx, ya.top + 4, w, 20);
        ctx2.fillStyle = '#fff';
        ctx2.textAlign = 'left';
        ctx2.textBaseline = 'middle';
        ctx2.fillText(txt, lx + 8, ya.top + 14);
        ctx2.restore();
      }
    }
  };
  // 雅さん 2026-05-24: 1週間/2週間プリセットでは常に表示 (作業区ON条件を外した)
  // 全社表示でも品目直書きを表示。多すぎる場合は上位5+他N機種で抑制済み
  const _periodNum = parseInt(state.period) || 30;
  const _showInlineItems = _periodNum <= 14;
  // 各日のトップ品目を事前計算 (台数の多い順 / 雅さんQ3回答a)
  // 6機種以上ある日は最後の行に「他N機種 X台」を追加 (雅さんQ3指摘)
  const dailyTopItems = [];
  if(_showInlineItems){
    const allRecs = filteredRecords();
    for(const d of daily){
      const byItem = {};
      for(const r of allRecs){
        const sd = r.start_date || r.date;
        if(sd <= d.date && d.date <= r.date){
          byItem[r.item_code] = (byItem[r.item_code] || 0) + r.qty;
        }
      }
      const sorted = Object.entries(byItem).sort((a,b)=>b[1]-a[1]);
      let top = sorted.slice(0, 5);  // 上位5機種
      if(sorted.length > 5){
        const restCount = sorted.length - 5;
        const restQty = sorted.slice(5).reduce((s,[,q]) => s + q, 0);
        top.push([`+他${restCount}機種`, restQty, true]);  // 3要素目=overflow flag
      }
      dailyTopItems.push(top);
    }
  }
  // 各日の合計値 (バーの上端計算用)
  const dailyTotals = daily.map((_,i) => datasets.reduce((s,ds)=>s + (ds.data[i]||0), 0));
  const inlineItemsPlugin = {
    id: 'inlineItems',
    afterDatasetsDraw(c){
      if(!_showInlineItems) return;
      const xa = c.scales.x;
      const ya = c.scales.y;
      const ctx2 = c.ctx;
      // (B) 品目名と台数のラベル描画
      // 雅さん 2026-05-24: 数値を先にして右揃え (数がまず分かるように)
      ctx2.save();
      ctx2.textAlign = 'right';
      ctx2.textBaseline = 'bottom';
      for(let i = 0; i < c.data.labels.length; i++){
        const items = dailyTopItems[i];
        if(!items || items.length === 0) continue;
        const xCenter = xa.getPixelForValue(i);
        const total = dailyTotals[i];
        let yTop = ya.getPixelForValue(total) - 2;
        // チャート上端を超えないよう
        if(yTop < ya.top + 8) yTop = ya.top + 8;
        // バー幅を超えそうな場合は最大文字数調整
        const half = (xa.getPixelForValue(1) - xa.getPixelForValue(0)) / 2;
        const maxW = (half * 2) - 4;
        // 縦に積む。数値を先頭/太字で「数がまず分かる」(雅さん 2026-05-24)
        // 各行: 「<台数>  <品目コード>」右揃え。台数は太字
        const xRight = xCenter + (xa.getPixelForValue(1) - xa.getPixelForValue(0)) * 0.40 - 2;
        for(let k = 0; k < items.length; k++){
          const [code, qty, isOverflow] = items[k];
          const qStr = String(Math.round(qty));
          // 台数を強調表示 (太字) してから品目コードを描画
          ctx2.font = isOverflow ? 'italic 9.5px sans-serif' : '9.5px sans-serif';
          // 品目コードの幅を測ってからフィット判定
          let cut = code;
          while(cut.length > 3 && ctx2.measureText(qStr + '  ' + cut).width > maxW){
            cut = cut.slice(0, -1);
          }
          const codeTxt = (cut !== code) ? cut + '…' : code;
          const fullTxt = qStr + '  ' + codeTxt;
          const tw = ctx2.measureText(fullTxt).width;
          // 背景白で読みやすく
          ctx2.fillStyle = 'rgba(255,255,255,0.88)';
          ctx2.fillRect(xRight - tw - 1, yTop - 10, tw + 2, 10);
          // 品目コード (薄め)
          ctx2.fillStyle = isOverflow ? '#92400e' : '#475569';
          ctx2.font = isOverflow ? 'italic 9.5px sans-serif' : '9.5px sans-serif';
          ctx2.fillText(codeTxt, xRight, yTop);
          // 台数 (太字で強調) — 品目コードの左に右揃え
          const codeW = ctx2.measureText(codeTxt).width;
          ctx2.font = isOverflow ? 'italic bold 9.5px sans-serif' : 'bold 10px sans-serif';
          ctx2.fillStyle = isOverflow ? '#92400e' : '#1e40af';
          ctx2.fillText(qStr, xRight - codeW - 4, yTop);
          yTop -= 11;
          if(yTop < ya.top + 4) break;
        }
      }
      ctx2.restore();
    }
  };
  chart = new Chart(ctx, {
    type: "bar",
    data: {labels, datasets},
    // 雅さん 2026-05-25: 境界線(白線)が赤スライスの上に被って区切られる問題対策で、
    //   先に inlineItems(境界線+ラベル) を描き、最後に batchSlice(赤スライス) を上に重ねる
    plugins: [inlineItemsPlugin, batchSlicePlugin, planFlagPlugin],
    options: {
      responsive: true, maintainAspectRatio: false,
      datasets: {
        bar: { borderWidth: 0 }  // セグメント間の境界線を全消し
      },
      plugins: {
        legend: {position:"bottom", labels:{font:{size:10},boxWidth:12,padding:6}},
        tooltip: {
          position: "nearest",
          callbacks:{
            title: items => items[0]?.label || "",
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}台`,
            // 雅さん 2026-05-25: ホバーで「どの品目の何台」を表示 (品目別内訳)
            afterBody: items => {
              if(!items || !items.length) return [];
              const dayIdx = items[0].dataIndex;
              const date = daily[dayIdx]?.date;
              if(!date) return [];
              // ホバー中のセグメント (kind+status) に絞って品目別を表示
              const hovKind = items[0].dataset._kind;
              const hovStatus = items[0].dataset._status;
              const recs = filteredRecords();
              const itemMap = {};
              for(const r of recs){
                // セグメント一致フィルタ
                if(hovKind && r.kind !== hovKind) continue;
                if(hovStatus && r.status !== hovStatus) continue;
                const sd = r.start_date || r.date;
                if(sd <= date && date <= r.date){
                  const key = r.item_code || '(品目なし)';
                  if(!itemMap[key]) itemMap[key] = {qty:0};
                  itemMap[key].qty += r.qty;
                }
              }
              const sorted = Object.entries(itemMap).sort((a,b)=>b[1].qty - a[1].qty);
              if(!sorted.length) return [];
              const lines = ["", `─── 品目別 (${sorted.length}機種) ───`];
              const top = sorted.slice(0, 6);
              for(const [code, info] of top){
                lines.push(`  ${Math.round(info.qty)}台  ${code}`);
              }
              if(sorted.length > 8){
                const rest = sorted.slice(8).reduce((s,[,info]) => s + info.qty, 0);
                lines.push(`  +他${sorted.length - 8}機種 計${Math.round(rest)}台`);
              }
              lines.push("", "💡 クリックでこの日に絞込");
              return lines;
            },
            footer: items => {
              const total = items.reduce((s,it)=>s+it.parsed.y, 0);
              return `合計: ${total}台 (重複加算)`;
            },
          },
          // 内訳が長くなるので tooltip サイズ調整
          bodyFont:{size:11},
          footerFont:{size:10.5},
          titleFont:{size:11.5},
          padding:8,
        }
      },
      scales: {
        x:{
          stacked:true,
          ticks:{
            font:{size:10},
            color: (ctx)=>{
              const dow = dowList[ctx.index];
              if(dow === 0) return "#dc2626";  // 日曜=赤
              if(dow === 6) return "#2563eb";  // 土曜=青
              return "#64748b";
            },
          },
          grid:{
            color: (ctx)=>{
              const dow = dowList[ctx.index];
              if(dow === 0) return "rgba(220,38,38,0.12)";  // 日曜
              if(dow === 6) return "rgba(37,99,235,0.08)";  // 土曜
              return "rgba(0,0,0,0.05)";
            },
          },
        },
        y:{stacked:true,beginAtZero:true,title:{display:true,text:"台数",font:{size:11}}},
      },
      onClick: (e, items) => {
        if(items.length){
          const idx = items[0].index;
          const date = daily[idx].date;
          // 詳細リストをこの日付に絞る
          state._dateFilter = date;
          state.detailLimit = 500;
          renderDetail();
        }
      }
    }
  });
}

// ===== 作業区/仕入先フィルタ (チップ一覧 雅さん 2026-05-24 戻し) =====
function renderWpFilter(){
  const wrap = document.getElementById("wpFilter");
  if(!wrap) return;
  // 外注/購買モードのみ仕入先検索ボックスを表示 (雅さん 2026-05-30)
  const wpSearchEl = document.getElementById("wpSearch");
  if(wpSearchEl){
    // 外注は仕入先が多い(100件超)ので検索ボックスが必要、社内は9作業区のみでチップで十分
    wpSearchEl.style.display = state.scope === "external" ? "" : "none";
    wpSearchEl.placeholder = "仕入先を検索 (入力で絞り込み)";
  }
  const data = currentData();
  const wps = data.workplaces || [];
  const searchTerm = (document.getElementById("wpSearch")?.value || "").toLowerCase().trim();
  const wpCount = {};
  for(const r of data.records){ wpCount[r.workplace] = (wpCount[r.workplace]||0) + 1; }
  let visibleWps = wps.slice();
  if(searchTerm){
    visibleWps = wps.filter(w => w.toLowerCase().includes(searchTerm) || state.selectedWps.has(w));
  } else if(state.scope === "external" && wps.length > 12){
    // 外注: 件数多い順 TOP10 + 選択中
    const sorted = wps.slice().sort((a,b)=>(wpCount[b]||0)-(wpCount[a]||0));
    const top = new Set(sorted.slice(0, 10));
    visibleWps = wps.filter(w => top.has(w) || state.selectedWps.has(w));
  }
  let html = `<button class="wp-chip all ${state.selectedWps.size===0?'active':''}" onclick="toggleWp(null)">全て(${wps.length})</button>`;
  for(const wp of visibleWps){
    const active = state.selectedWps.has(wp);
    const cnt = wpCount[wp] || 0;
    html += `<button class="wp-chip${active?' active':''}" onclick="toggleWp('${wp.replace(/'/g,"\\'")}')" title="${escapeHtml(wp)} (${cnt}件)">${escapeHtml(wp)}<span style="color:#94a3b8;margin-left:3px;font-size:9.5px">${cnt}</span></button>`;
  }
  const hidden = wps.length - visibleWps.length;
  if(hidden > 0){
    html += `<span style="font-size:10.5px;color:#94a3b8;align-self:center;padding:0 6px;flex-shrink:0">他${hidden}件 (検索で表示)</span>`;
  }
  wrap.innerHTML = html;
}
function toggleWp(wp){
  if(wp === null){
    state.selectedWps.clear();
  } else if(state.selectedWps.has(wp)){
    state.selectedWps.delete(wp);
  } else {
    state.selectedWps.add(wp);
  }
  renderAll();
}

function showOrdererDropdown(){
  const dd = document.getElementById("ordererDropdown");

  const data = currentData();

  const loginByName = {};
  for(const r of data.records){
    const o = r.orderer;
    if(!o) continue;
    cnt[o] = (cnt[o] || 0) + 1;
    if(r.orderer_login && !loginByName[o]) loginByName[o] = r.orderer_login;
  }
  const orderers = Object.entries(cnt).sort((a,b) => b[1] - a[1]);
  const searchTerm = (document.getElementById("ordererSearch")?.value || "").toLowerCase().trim();
  // 私 (H016)
  let myName = null;
  for(const [name] of orderers){
    if((loginByName[name] || "").toUpperCase() === _myLoginId){ myName = name; break; }
  }
  let filtered = orderers;
  if(searchTerm){
    filtered = orderers.filter(([n]) => n.toLowerCase().includes(searchTerm));
  }
  const top = filtered.slice(0, 60);
  let html = "";
  if(myName && !searchTerm){
    const active = state.selectedOrderers.has(myName);
    html += `<div class="combo-dropdown-item${active?' selected':''}" onmousedown="event.preventDefault()" onclick="toggleOrderer('${myName.replace(/'/g,"\\'")}');showOrdererDropdown()">${active?'☑ ':'☐ '}<b>${escapeHtml(myName)}</b><span class="me-tag">👤 私</span><span class="count">${cnt[myName]}件</span></div>`;
  }
  for(const [name, n] of top){
    if(name === myName && !searchTerm) continue;
    const active = state.selectedOrderers.has(name);
    html += `<div class="combo-dropdown-item${active?' selected':''}" onmousedown="event.preventDefault()" onclick="toggleOrderer('${name.replace(/'/g,"\\'")}');showOrdererDropdown()">${active?'☑ ':'☐ '}${escapeHtml(name)}<span class="count">${n}件</span></div>`;
  }
  const noneCount = data.records.filter(r => !r.orderer).length;
  if(noneCount > 0 && !searchTerm){
    const active = state.selectedOrderers.has("");
    html += `<div class="combo-dropdown-item${active?' selected':''}" onmousedown="event.preventDefault()" onclick="toggleOrderer('');showOrdererDropdown()" style="color:#64748b">${active?'☑ ':'☐ '}未紐付 (発注者情報なし)<span class="count">${noneCount}件</span></div>`;
  }
  if(!html){
    html = `<div class="combo-dropdown-empty">該当なし</div>`;
  } else if(filtered.length > 60){
    html += `<div class="combo-dropdown-empty">…他${filtered.length - 60}名 (検索で絞り込み)</div>`;
  }
  dd.innerHTML = html;
  dd.style.display = "";
}
function hideOrdererDropdown(){

  if(dd) setTimeout(() => dd.style.display = "none", 150);
}
function toggleOrderer(name){
  if(!state.selectedOrderers) state.selectedOrderers = new Set();
  if(state.selectedOrderers.has(name)){
    state.selectedOrderers.delete(name);
  } else {
    state.selectedOrderers.add(name);
  }
  renderAll();
}
function clearOrdererFilter(){
  state.selectedOrderers.clear();
  renderAll();
}

// ===== 詳細リスト =====
function renderDetail(){
  let recs = filteredRecords();
  if(state._dateFilter){
    // 期間が _dateFilter にかかっているレコードを抽出 (start_date 〜 date 期間内)
    const f = state._dateFilter;
    recs = recs.filter(r => {
      const sd = r.start_date || r.date;
      return sd <= f && f <= r.date;
    });
  }
  // ソート: 日付を常にprimary (グラフのx軸と一致させる)
  // 雅さん 2026-05-27: グラフ積み上げ順と同じ並びに
  //   Primary: date 昇順 (グラフ左→右 = リスト上→下)
  //   Secondary: status順 グラフ積み上げ下→上 (実績→確定済→所要量計算→計画)
  //   Tertiary: start_date 昇順
  //   Quaternary: sortCol (ユーザー列クリック時のカスタム並び替え)
  const STATUS_SORT_ORDER = {"実績":0,"確定済":1,"所要量計算":2,"計画":3};
  const col = state.sortCol;
  const _getSortKey = (r) => {
    if(col === "primary_no") return (r.purchase_no || r.tehai_no || r.seiban || "");
    if(col === "status"){
      const w = STATUS_SORT_ORDER[r.status];
      return (w !== undefined ? w : 9) + "_" + (r.status||"");
    }
    return r[col] || "";
  };
  recs = recs.slice().sort((a,b)=>{
    // 1: date
    const da=a.date||"",db=b.date||"";
    if(da!==db) return state.sortAsc ? da.localeCompare(db) : db.localeCompare(da);
    // 2: status (グラフ積み上げ下→上: 実績0 確定済1 所要量計算2 計画3)
    if(col === "date" || col === "status"){
      const wa = STATUS_SORT_ORDER[a.status]??9, wb = STATUS_SORT_ORDER[b.status]??9;
      if(wa!==wb) return state.sortAsc ? wa-wb : wb-wa;
    }
    // 3: start_date
    const sa=a.start_date||da, sb=b.start_date||db;
    if(sa!==sb) return state.sortAsc ? sa.localeCompare(sb) : sb.localeCompare(sa);
    // 4: sortCol (日付・状態以外のカスタムソート)
    if(col !== "date" && col !== "status"){
      const va = _getSortKey(a), vb = _getSortKey(b);
      if(col === "qty") return state.sortAsc ? (parseFloat(va)||0)-(parseFloat(vb)||0) : (parseFloat(vb)||0)-(parseFloat(va)||0);
      return state.sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    }
    // 5: workplace (仕入先/作業区) をfinal tiebreaker
    return (a.workplace||"").localeCompare(b.workplace||"");
  });
  // ヘッダー
  document.getElementById("detailTitle").innerHTML =
    "詳細リスト" +
    (state._dateFilter ? ` <span style="color:#1e40af">[${state._dateFilter} のみ]</span> <button onclick="clearDateFilter()" style="font-size:11px;padding:2px 8px;margin-left:6px;border:1px solid #cbd5e1;background:#fff;border-radius:4px;cursor:pointer">クリア</button>` : "") +
    ` <span style="color:#64748b;font-weight:400;font-size:11px;margin-left:8px">${recs.length}件</span>`;
  // ボディ
  const tbody = document.getElementById("detailBody");
  const cs = state.scope === "external" ? 11 : 9;
  if(!recs.length){
    tbody.innerHTML = `<tr><td colspan="${cs}" class="empty">該当データなし</td></tr>`;
    const thUsedIn = document.getElementById("thUsedIn");
    if(thUsedIn) thUsedIn.style.display = state.scope === "external" ? "" : "none";
    const thOrderer = document.getElementById("thOrderer");
    if(thOrderer) thOrderer.style.display = state.scope === "external" ? "" : "none";
    return;
  }
  const fmtPeriod = (r)=>{
    const sd = r.start_date, ed = r.date;
    if(!sd || sd === ed) return `<span class="mono">${escapeHtml(ed)}</span>`;
    // 日数 (両端含む) + 営業日数 (土日除外)
    let days = 1;
    try{
      const a = new Date(sd.replace(/\//g,'-'));
      const b = new Date(ed.replace(/\//g,'-'));
      days = Math.round((b-a)/86400000) + 1;
    }catch(_){}
    const bizDays = businessDaysBetween(sd, ed);
    const sShort = sd.slice(5);  // MM/DD
    const eShort = ed.slice(5);
    // 雅さん 2026-05-24: 営業日も併記 (LTがこれでいいかの検証用)
    return `<span class="mono" style="font-size:11px">${escapeHtml(sd.slice(0,4))}</span>
      <span class="period-bar" title="期間: ${escapeHtml(sd)} 〜 ${escapeHtml(ed)} / ${days}日間 (うち営業日${bizDays}日)">
        <b>${escapeHtml(sShort)}</b><span style="color:#94a3b8"> → </span><b>${escapeHtml(eShort)}</b>
        <span style="color:#0ea5e9;font-size:10px;margin-left:4px">[${days}日<span style="color:#64748b">/${bizDays}営業日</span>]</span>
      </span>`;
  };
  _detailRecs = recs.slice(0, state.detailLimit);
  const rows = _detailRecs.map((r,i) => {
    const sd = r.start_date || r.date;
    const ed = r.date;
    let days = 1;
    try{
      const a = new Date(sd.replace(/\//g,'-'));
      const b = new Date(ed.replace(/\//g,'-'));
      days = Math.round((b-a)/86400000) + 1;
    }catch(_){}
    const periodTxt = (sd === ed) ? ed.slice(5) : `${sd.slice(5)}→${ed.slice(5)} (${days}日)`;
    const label = `${r.item_code} × ${Math.round(r.qty)}台 / ${periodTxt}`;
    const kind = (r.kind||'manufacture').replace(/'/g,"\\'");
    const status = (r.status||'').replace(/'/g,"\\'");
    // レコード単位の識別キー (同一品目で複数レコードを区別、雅さん 2026-05-25)
    const recordKey = [r.item_code||'', r.seiban||'', r.tehai_no||'', String(r.qty||0)].join('|').replace(/'/g,"\\'");
    // 使用先(最終製品) — 外注/購買のみ
    // 雅さん 2026-05-24: 1行に収める / 多い場合は +N / クリックで一覧ポップアップ
    // 雅さんQ3回答: 「BOM親なし=在庫管理なし」と言い切れない。3桁数字コード=在庫管理なし、ZZxxx=経費、それ以外=判定不可
    let usedInCell = "";
    if(state.scope === "external"){
      const ui = r.used_in;
      if(ui && ui.length > 0){
        const show = ui.slice(0, 3);
        const more = ui.length - show.length;
        const items = show.map(it => {
          const code = (typeof it === 'string') ? it : (it[0] || '');
          return `<span class="mono used-in-chip">${escapeHtml(code)}</span>`;
        }).join('');
        usedInCell = `<td class="used-in-cell" onclick="event.stopPropagation();showUsedInPopup('${escapeHtml(r.item_code)}','${escapeHtml(r.item_name||'')}')" title="クリックで使用先一覧">${items}${more > 0 ? `<span class="used-in-more">+${more}</span>` : ''}</td>`;
      } else {
        // 品目コードのパターンで分類
        const code = r.item_code || "";
        let note = "—", cls = "used-in-none";
        if(/^ZZ/i.test(code)){ note = "経費"; cls = "used-in-expense"; }
        else if(/^\d{3}$/.test(code)){ note = "在庫管理なし"; cls = "used-in-none-stock"; }
        // それ以外は "—" のまま (構成作成途中の可能性あり)
        usedInCell = `<td><span class="${cls}" title="${code ? 'コードパターンから判定: ' + note : ''}">${escapeHtml(note)}</span></td>`;
      }
    }
    // 発注者列 (外注/購買のみ)
    let ordererCell = "";
    if(state.scope === "external"){
      const orderer = r.orderer;
      if(orderer){
        const sel = state.selectedOrderers && state.selectedOrderers.has(orderer);
        ordererCell = `<td><span class="orderer-chip${sel?' active':''}" onclick="event.stopPropagation();toggleOrderer('${escapeHtml(orderer)}')" title="クリックでこの発注者でフィルタ">${escapeHtml(orderer)}</span></td>`;
      } else {
        ordererCell = `<td><span class="orderer-none">—</span></td>`;
      }
    }
    // 紐づくNoセル (発注No / 手配No / 受注No) — 雅さん 2026-05-24: 1行に圧縮
    // クリックでポップアップ明細 — 雅さん 2026-05-27
    const ids = [];
    if(r.purchase_no) ids.push(`<span class="id-chip id-po" title="発注No — クリックで明細" onclick="event.stopPropagation();openChipDetail('po',${i})">発${escapeHtml(r.purchase_no)}</span>`);
    if(r.tehai_no && r.tehai_no !== '0' && state.scope === 'internal'){
      ids.push(`<span class="id-chip id-th" title="製造指示No — クリックで明細" onclick="event.stopPropagation();openChipDetail('th',${i})">指${escapeHtml(r.tehai_no)}</span>`);
    }
    let orderTotal = 0;
    if(window.ITEM_HISTORY && r.seiban){
      // 受注Noは「受注に紐づく製番 (J/M/K/P/X開始)」の場合のみ表示
      // 雅さん 2026-05-27: 00製番や在庫参照製番では数千件ヒットするため J系のみに限定
      const _sbn = r.seiban || "";
      const _showOrder = /^[JMKPXjmkpx]/.test(_sbn);
      if(_showOrder){
        const list = (window.ITEM_HISTORY.seiban_to_order || {})[_sbn] || [];
        const orderNos = list.map(o => (typeof o === 'string' ? o : (o.order_no || ''))).filter(Boolean);
        orderTotal = orderNos.length;
        // 最初の1件のみ表示、それ以上は +N にまとめる (1行確保のため)
        if(orderNos.length > 0){
          ids.push(`<span class="id-chip id-so" title="受注No (${orderTotal}件) — クリックで受注明細" onclick="event.stopPropagation();openChipDetail('so',${i})">受${escapeHtml(orderNos[0])}</span>`);
          if(orderTotal > 1){
            ids.push(`<span class="id-chip" style="background:#dbeafe;color:#1e40af;cursor:pointer" title="その他の受注No: ${orderNos.slice(1).join(', ')} — クリックで一覧" onclick="event.stopPropagation();openChipDetail('so',${i})">+${orderTotal - 1}</span>`);
          }
        }
      }
    }
    const idsCell = `<td class="ids-cell">${ids.length ? ids.join('') : '<span style="color:#cbd5e1;font-size:10.5px">—</span>'}</td>`;
    return `<tr class="${r.status==='確定済'?'confirmed':'unconfirmed'}"
    data-idx="${i}"
    onmouseenter="highlightBatch('${escapeHtml(sd)}','${escapeHtml(ed)}','${kind}','${status}',${r.qty},'${escapeHtml(label).replace(/'/g,'&apos;')}','${escapeHtml(r.item_code||'')}','${escapeHtml(recordKey)}')"
    onmouseleave="clearHighlight()">
    <td>${fmtPeriod(r)}</td>
    <td>${escapeHtml(r.workplace)}</td>
    <td>${escapeHtml(r.process_name||'-')}</td>
    <td class="mono"><span class="item-link" onclick="event.stopPropagation();jumpToTree('${escapeHtml(r.item_code)}')">${escapeHtml(r.item_code)}</span></td>
    <td>${escapeHtml(r.item_name||'')}</td>
    <td class="mono">${r.seiban && r.seiban !== '-' && r.seiban !== '00' ? `<span class="seiban-link" onclick="event.stopPropagation();openChipDetail('so',${i})" title="クリックで受注詳細">${escapeHtml(r.seiban)}</span>` : escapeHtml(r.seiban||'-')}</td>
    <td class="num">${Math.round(r.qty)}</td>
    <td><span class="status-badge ${r.status==='確定済'?'confirmed':'unconfirmed'}">${escapeHtml(r.status)}</span></td>
    ${ordererCell}
    ${idsCell}
    ${usedInCell}
  </tr>`;
  }).join("");
  const colspan = state.scope === "external" ? 11 : 9;
  const remaining = recs.length - state.detailLimit;
  const moreRow = remaining > 0
    ? `<tr><td colspan="${colspan}" style="text-align:center;padding:10px 0">
        <button onclick="loadMoreDetail()" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 20px;border-radius:6px;cursor:pointer;font-size:13px">
          ▼ 他 ${remaining} 件を表示
        </button>
        <button onclick="loadAllDetail()" style="background:#1e293b;border:1px solid #334155;color:#64748b;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:6px">
          全件 (${recs.length})
        </button>
      </td></tr>`
    : "";
  tbody.innerHTML = rows + moreRow;
  // 使用先・発注者列の表示制御
  const thUsedIn = document.getElementById("thUsedIn");
  if(thUsedIn) thUsedIn.style.display = state.scope === "external" ? "" : "none";
  const thOrderer = document.getElementById("thOrderer");
  if(thOrderer) thOrderer.style.display = state.scope === "external" ? "" : "none";
}

function clearDateFilter(){ state._dateFilter = null; state.detailLimit = 500; renderDetail(); }

// 詳細リスト「他N件を表示」— 500件ずつ追加表示
function loadMoreDetail(){
  const tbody = document.getElementById("detailTbody");
  const scrollY = tbody?.closest(".detail-table-wrap")?.scrollTop || 0;
  state.detailLimit = (state.detailLimit || 500) + 500;
  renderDetail();
  // スクロール位置を維持
  const wrap = tbody?.closest(".detail-table-wrap");
  if(wrap) wrap.scrollTop = scrollY;
}

// 詳細リスト「全件表示」
function loadAllDetail(){
  state.detailLimit = Infinity;

}

// 詳細リスト行ホバー → グラフ上に「このバッチが日々のバーに含まれるスライス」を可視化
// 雅さん 2026-05-25: ハイライト残留バグ修正 → debounceで「最新のホバー」を確実に反映
let _hoverUpdateTimer = null;
function _scheduleChartUpdate(){
  if(_hoverUpdateTimer) clearTimeout(_hoverUpdateTimer);
  _hoverUpdateTimer = setTimeout(() => {
    if(chart){
      // 強制再描画: animation:false + chart.draw() で確実にキャンバスをリセット
      chart.update('none');
    }
    _hoverUpdateTimer = null;
  }, 16);  // 1フレーム遅延 (重複ホバー時の連続更新を抑制)
}
function highlightBatch(start, end, kind, status, qty, label, itemCode, recordKey){
  // filteredDaily は '2026/05/25' (スラッシュ) で dateToIdx を構築するため
  // r.date が '2026-05-25' (ダッシュ) の場合はここで正規化する
  const norm = s => s ? s.replace(/-/g, '/') : s;
  state._highlightBatch = {start:norm(start), end:norm(end), kind, status, qty:Number(qty)||0, label, item_code:itemCode, record_key:recordKey};
  document.querySelector('.chart-wrap')?.classList.add('is-hovering');
  _scheduleChartUpdate();
}
function clearHighlight(){
  state._highlightBatch = null;
  document.querySelector('.chart-wrap')?.classList.remove('is-hovering');
  _scheduleChartUpdate();
}
function highlightPeriod(start, end, label){
  const norm = s => s ? s.replace(/-/g, '/') : s;
  state._highlightBatch = {start:norm(start), end:norm(end), kind:null, status:null, qty:0, label};
  _scheduleChartUpdate();
}

// 構成ツリーへジャンプ (親FUJIN.htmlに通知)
function jumpToTree(code){
  if(!code) return;
  // 戻ったときに状態を完全復元できるよう保存
  saveYamaState();
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({type:"fujin_switch_to_tree", code:code}, "*");
    } else {
      window.location.href = "stock_detective.html#code=" + encodeURIComponent(code);
    }
  }catch(_){}
}

// ===== 受注詳細モーダル (雅さん 2026-05-24: 製番クリックで受注内容ポップアップ) =====
// 修正 2026-05-24: seiban_to_order は [{order_no, customer, ...}, ...] のオブジェクト配列
//   私の初期実装は文字列前提で [object Object] が表示される問題があった
function _orderKey(item){
  // item は {order_no, ...} のオブジェクト or 単純な文字列
  if(typeof item === 'string') return item;
  return item.order_no || item.orderNo || "";
}
function openOrderBySeiban(seiban){
  if(!seiban || seiban === '-') return;
  const ITEM_HISTORY = window.ITEM_HISTORY || {};
  const list = (ITEM_HISTORY.seiban_to_order || {})[seiban] || [];
  if(list.length === 0){
    openOrderDetailWithNone(seiban);
    return;
  }
  // 単一でもリストを渡しておく (sales_order_details が無い場合の fallback で基本情報を見せるため)
  openOrderDetail(_orderKey(list[0]), list, seiban);
}
// 全受注Nのリストをグローバルに保管 (HTMLにJSONを埋め込むより安全)
let _currentOrderList = null;
let _currentOrderSeiban = null;
function openOrderDetail(orderNo, allList, seiban){
  const modal = document.getElementById("orderDetailModal");
  const titleEl = document.getElementById("odmOrderNo");
  const contentEl = document.getElementById("odmContent");
  const pickerEl = document.getElementById("odmOrderPicker");
  titleEl.textContent = orderNo;
  // リスト切替用に保持
  if(allList){
    _currentOrderList = allList;
    _currentOrderSeiban = seiban;
  }
  // 複数受注選択リンク
  if(_currentOrderList && _currentOrderList.length > 1 && pickerEl){
    pickerEl.innerHTML = `(製番${escapeHtml(_currentOrderSeiban||"")}の受注: ${
      _currentOrderList.map((o,i) => {
        const oNo = _orderKey(o);
        const cust = (typeof o === 'object' ? (o.customer || '') : '');
        const txt = cust ? `${oNo} <span style="color:#94a3b8">${escapeHtml(cust.slice(0,8))}</span>` : oNo;
        return oNo === orderNo
          ? `<b style="color:#1e40af">${escapeHtml(oNo)}</b>${cust?` <span style="color:#94a3b8">${escapeHtml(cust.slice(0,8))}</span>`:''}`
          : `<span style="cursor:pointer;text-decoration:underline;color:#475569" onclick="_switchOrderInModal(${i})">${txt}</span>`;
      }).join(' / ')
    })`;
  } else if(pickerEl){
    pickerEl.innerHTML = "";
  }
  const ITEM_HISTORY = window.ITEM_HISTORY || {};
  const d = (ITEM_HISTORY.sales_order_details || {})[orderNo];
  if(!d){
    // 完納済等で詳細明細なし → seiban_to_order の基本情報があればそれだけ表示
    const summary = _currentOrderList ? _currentOrderList.find(o => _orderKey(o) === orderNo) : null;
    if(summary && typeof summary === 'object'){
      contentEl.innerHTML = _renderOrderSummary(summary, orderNo);
    } else {
      contentEl.innerHTML = `<div class="odm-empty">
        受注 <b>${escapeHtml(orderNo)}</b> の詳細データは取り込まれていません。<br>
        <span style="font-size:11px">※ FUJINでは「未完納」の受注のみ詳細を保持しています。<br>
        完納済み・部分完納済みでもう動かない受注は SMILE で確認してください。</span>
      </div>`;
    }
  } else {
    contentEl.innerHTML = _renderOrderDetail(d);
  }
  modal.classList.add("show");
}
function _renderOrderSummary(s, orderNo){
  // 完納済 (sales_order_details 未収録) の基本情報のみ表示
  return `<div style="background:#fffbeb;border:1px solid #fcd34d;color:#92400e;padding:8px 12px;border-radius:5px;margin-bottom:14px;font-size:11.5px;line-height:1.5">
    ℹ <b>この受注は完納済み (または未完納外)</b> のため、明細詳細はFUJINで保持していません。<br>
    <span style="font-size:10.5px">基本情報のみ表示します。明細は SMILE で確認してください。</span>
  </div>
  <div class="odm-smile-hdr">
    <div class="odm-row1">
      <div class="kv lg"><span class="lbl">受注No.</span><span class="val mono">${escapeHtml(orderNo)}</span></div>
      <div class="kv"><span class="lbl">受注日付</span><span class="val">${escapeHtml(s.date||"-")}</span></div>
      <div class="kv"><span class="lbl">受注納期</span><span class="val">${escapeHtml(s.due||"-")}</span></div>
    </div>
    <div class="odm-row2">
      <div class="kv"><span class="lbl">得意先</span><span class="val">${escapeHtml(s.customer||"-")}</span></div>
      <div class="kv"><span class="lbl">客先注番</span><span class="val mono">${escapeHtml(s.order_id||"-")}</span></div>
    </div>
  </div>
  <div style="text-align:center;color:#94a3b8;font-size:11px;padding:20px">— 明細データなし —</div>`;
}
function openOrderDetailWithNone(seiban){
  const modal = document.getElementById("orderDetailModal");
  const titleEl = document.getElementById("odmOrderNo");
  const contentEl = document.getElementById("odmContent");
  const pickerEl = document.getElementById("odmOrderPicker");
  titleEl.textContent = '—';
  if(pickerEl) pickerEl.innerHTML = `(製番 ${escapeHtml(seiban)})`;
  contentEl.innerHTML = `<div class="odm-empty">
    製番 <b>${escapeHtml(seiban)}</b> に紐づく受注情報がFUJINに取り込まれていません。<br>
    <span style="font-size:11px">※ 完納済み受注／受注を伴わない製番 (在庫補充など) の場合があります。<br>
    詳細はSMILEで確認してください。</span>
  </div>`;
  modal.classList.add("show");
}
function _switchOrderInModal(idx){
  if(!_currentOrderList || !_currentOrderList[idx]) return;
  const oNo = _orderKey(_currentOrderList[idx]);
  openOrderDetail(oNo, _currentOrderList, _currentOrderSeiban);
}
function closeOrderDetail(){
  document.getElementById("orderDetailModal").classList.remove("show");
  _currentOrderList = null;
  _currentOrderSeiban = null;
}

// ===== 紐づくNoチップ クリック → ポップアップ明細 (雅さん 2026-05-27) =====
// type: 'po'(発注) / 'th'(製造指示) / 'so'(受注)  recIdx: _detailRecs の行インデックス
function openChipDetail(type, recIdx){
  const r = _detailRecs[recIdx];
  if(!r) return;
  if(type === 'so'){
    // 受注詳細 — 既存の製番ベース検索を流用
    const sbn = r.seiban || '';
    const list = window.ITEM_HISTORY ? (window.ITEM_HISTORY.seiban_to_order||{})[sbn]||[] : [];
    // K/M/P/X製番で受注データなし → ポップアップ不要（J製番は「見つからない」でも表示）
    if(!list.length && !/^[Jj]/.test(sbn)) return;
    openOrderBySeiban(sbn);
    return;
  }
  // 製造指示 or 発注: odmモーダルを流用して記録情報を表示
  const modal = document.getElementById("orderDetailModal");
  const titleEl = document.getElementById("odmOrderNo");
  const contentEl = document.getElementById("odmContent");
  const pickerEl = document.getElementById("odmOrderPicker");
  if(!modal) return;
  _currentOrderList = null;
  _currentOrderSeiban = null;
  if(type === 'th'){
    titleEl.textContent = `製造指示 ${r.tehai_no}`;
    if(pickerEl) pickerEl.innerHTML = '<span style="color:#64748b;font-size:11px">製造指示 明細</span>';
    contentEl.innerHTML = _renderTehaiDetail(r);
  } else if(type === 'po'){
    titleEl.textContent = `発注 ${r.purchase_no}`;
    if(pickerEl) pickerEl.innerHTML = '<span style="color:#64748b;font-size:11px">発注 明細</span>';
    contentEl.innerHTML = _renderPurchaseDetail(r);
  }
  modal.classList.add("show");
}

  // 紐づく受注リンクを生成 (tehai/purchase 共通)
  if(!r.seiban || r.seiban === '-' || r.seiban === '00' || !window.ITEM_HISTORY) return "";
  const list = (window.ITEM_HISTORY.seiban_to_order || {})[r.seiban] || [];
  if(!list.length) return "";
  const links = list.map(o => {
    const no = (typeof o === 'string') ? o : (o.order_no || '');
    const cust = (typeof o === 'object') ? (o.customer || '') : '';
    if(!no) return '';
    return `<span style="cursor:pointer;color:#1e40af;text-decoration:underline;font-family:monospace"
      onclick="openOrderDetail('${escapeHtml(no)}',window.ITEM_HISTORY.seiban_to_order?.['${escapeHtml(r.seiban)}']||[],'${escapeHtml(r.seiban)}')"
    >${escapeHtml(no)}</span>${cust ? `<span style="color:#94a3b8;font-size:10px"> (${escapeHtml(cust.slice(0,10))})</span>` : ''}`;
  }).filter(Boolean);
  if(!links.length) return "";
  return `<div class="odm-section">
    <h4>紐づく受注</h4>
    <div style="padding:4px 0;line-height:2">${links.join(' &nbsp;/&nbsp; ')}</div>

}
