name: Regenerate dashboard_facts.json

# 毎日 06:00 JST (前日 21:00 UTC) に実行
# + 手動実行可能
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate dashboard_facts.json
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python scripts/regenerate_facts.py

      - name: Job Summary
        if: always()
        run: |
          echo "## 🔄 dashboard_facts.json 再生成" >> $GITHUB_STEP_SUMMARY
          echo "実行時刻: $(TZ=Asia/Tokyo date)" >> $GITHUB_STEP_SUMMARY
          echo "ステータス: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
