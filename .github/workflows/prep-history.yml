name: Prep History (one-time)

# 手動実行のみ - 初回セットアップ時に1度だけ実行
on:
  workflow_dispatch:

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard_facts_history.json
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python scripts/prep_history.py

      - name: Job Summary
        if: always()
        run: |
          echo "## 📜 履歴JSON初回生成" >> $GITHUB_STEP_SUMMARY
          echo "実行時刻: $(TZ=Asia/Tokyo date)" >> $GITHUB_STEP_SUMMARY
          echo "ステータス: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 完了したら SharedMasters の **2024年度売上実績.csv は削除可能** です（任意）。" >> $GITHUB_STEP_SUMMARY
