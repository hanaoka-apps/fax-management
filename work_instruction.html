<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>品目構成検索 - FUJIN</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  color: #1f2937; background: #f8fafc;
}
body { display: flex; flex-direction: column; overflow: hidden; }

/* ===== ヘッダ ===== */
.wi-head {
  height: 48px; background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
  color: #fff; display: flex; align-items: center; padding: 0 18px; gap: 14px;
  flex-shrink: 0;
}
.wi-head h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .02em; }
.wi-head .meta { font-size: 11px; opacity: .85; }

/* ===== 検索フォーム ===== */
.wi-search {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 12px 18px; display: flex; gap: 12px; align-items: end; flex-wrap: wrap;
  flex-shrink: 0;
}
.wi-field { display: flex; flex-direction: column; gap: 3px; }
.wi-field label { font-size: 10.5px; color: #64748b; font-weight: 600; }
.wi-field input, .wi-field select {
  padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 13px; font-family: inherit;
}
.wi-field input { min-width: 220px; }
.wi-field select { min-width: 200px; }
.wi-field input:focus, .wi-field select:focus { outline: 2px solid #06b6d4; outline-offset: -1px; border-color: #06b6d4; }
.wi-search button {
  padding: 7px 16px; background: #0e7490; color: #fff; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.wi-search button:hover { background: #155e75; }
.wi-search button.clear { background: #fff; color: #475569; border: 1px solid #cbd5e1; }
.wi-search button.clear:hover { background: #f1f5f9; }
.wi-search .hint { font-size: 11px; color: #64748b; max-width: 280px; line-height: 1.5; }

/* ===== 本体: 左右2ペイン ===== */
.wi-body { flex: 1; display: flex; overflow: hidden; }
.wi-list {
  width: 360px; min-width: 280px; max-width: 50%; resize: horizontal; overflow: auto;
  background: #fff; border-right: 1px solid #e5e7eb;
}
.wi-detail { flex: 1; overflow: auto; padding: 18px; background: #f8fafc; }

/* ===== 候補リスト ===== */
.wi-list table { width: 100%; border-collapse: collapse; font-size: 12px; }
.wi-list thead { position: sticky; top: 0; background: #f1f5f9; z-index: 1; }
.wi-list th { padding: 7px 8px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
.wi-list td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
.wi-list tr:hover td { background: #ecfeff; }
.wi-list tr.selected td { background: #cffafe; }
.wi-list .code { font-family: "SF Mono","Menlo",monospace; color: #155e75; font-weight: 600; font-size: 11.5px; }
.wi-list .empty { padding: 30px 18px; text-align: center; color: #94a3b8; }
.wi-list .seiban-row td { font-style: italic; color: #6b21a8; background: #faf5ff; }

/* ===== 詳細パネル ===== */
.wi-detail .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; max-width: 900px; }
.wi-detail .card .head {
  background: linear-gradient(135deg, #ecfeff 0%, #cffafe 100%);
  border-bottom: 1px solid #67e8f9; padding: 14px 18px;
}
.wi-detail .card .head h2 { margin: 0 0 6px; font-size: 16px; color: #0c4a6e; }
.wi-detail .card .head .code { font-family: "SF Mono","Menlo",monospace; font-size: 18px; color: #155e75; font-weight: 700; }
.wi-detail .card .head .meta { font-size: 12px; color: #475569; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
.wi-detail .card .head .meta span b { color: #0c4a6e; }
.wi-detail .card .head .mode {
  display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; margin-top: 4px;
}
.wi-detail .card .head .mode.default { background: #e0f2fe; color: #075985; }
.wi-detail .card .head .mode.seiban  { background: #f3e8ff; color: #6b21a8; }
.wi-detail .card .head .mode.fallback { background: #fef3c7; color: #92400e; }
.wi-detail .card .body { padding: 14px 18px; }
.wi-detail .card .actions { padding: 10px 18px; background: #f8fafc; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
.wi-detail .card .actions button { padding: 6px 14px; background: #0e7490; color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.wi-detail .card .actions button:hover { background: #155e75; }
.wi-detail .card .actions button.csv { background: #1f2937; }
.wi-detail .card .actions button.csv:hover { background: #111827; }
.wi-detail .placeholder { text-align: center; padding: 60px 30px; color: #94a3b8; }
.wi-detail .placeholder .ico { font-size: 64px; opacity: .3; margin-bottom: 12px; }

/* ===== 縦型BOMツリー ===== */
.bom-tree { font-size: 12.5px; }
.bom-tree .row {
  display: grid; grid-template-columns: 1fr 80px; gap: 10px;
  padding: 5px 0; border-bottom: 1px dashed #e5e7eb; align-items: baseline;
}
.bom-tree .row:hover { background: #f8fafc; }
.bom-tree .row.lv0 { font-weight: 700; background: #fef3c7; border-radius: 4px; padding: 6px 8px; margin-bottom: 4px; border-bottom: 2px solid #f59e0b; }
.bom-tree .row[data-hidden="1"] { display: none; }
.bom-tree .row[data-haschild="1"] { cursor: pointer; }
.bom-tree .row[data-haschild="1"]:hover { background: #ecfeff; }
.bom-tree .row[data-collapsed="1"] { background: #fef9c3; }
.bom-tree .row[data-collapsed="1"] .toggle { transform: rotate(-90deg); }
.bom-tree .toggle {
  display: inline-block; width: 11px; color: #0ea5e9; font-size: 10px;
  transition: transform .12s; user-select: none; text-align: center;
}
.bom-tree .toggle.empty { color: #e5e7eb; }
.bom-tree .name { display: flex; align-items: baseline; gap: 4px; min-width: 0; }
.bom-tree .indent { display: inline-block; color: #cbd5e1; user-select: none; font-family: monospace; font-size: 11px; white-space: pre; }
.bom-tree .code { font-family: "SF Mono","Menlo",monospace; font-weight: 600; color: #155e75; }
.bom-tree .itemname { color: #475569; }
.bom-tree .qty { text-align: right; font-variant-numeric: tabular-nums; color: #166534; font-weight: 600; }
.bom-tree .child-count { color: #0ea5e9; font-size: 10.5px; margin-left: 4px; font-weight: 600; }
.bom-tree .hdr { display: grid; grid-template-columns: 1fr 80px; gap: 10px; padding: 6px 0; font-size: 10.5px; color: #64748b; font-weight: 700; border-bottom: 1px solid #e5e7eb; margin-bottom: 4px; }
.bom-tree .hdr .qty { color: #64748b; }
.bom-tree .note { color: #94a3b8; font-size: 11px; padding: 8px 0; }
.bom-tree .dup { color: #f59e0b; font-size: 10px; font-style: italic; }
.bom-tree .toolbar {
  display: flex; gap: 6px; padding: 6px 0 10px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid #e5e7eb; margin-bottom: 8px;
}
.bom-tree .toolbar button {
  padding: 4px 10px; background: #fff; color: #475569; border: 1px solid #cbd5e1; border-radius: 5px;
  font-size: 11.5px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.bom-tree .toolbar button:hover { background: #f1f5f9; border-color: #94a3b8; }
.bom-tree .toolbar button.primary { background: #0e7490; color: #fff; border-color: #0e7490; }
.bom-tree .toolbar button.primary:hover { background: #155e75; }
.bom-tree .toolbar .summary { font-size: 11px; color: #64748b; margin-left: auto; }

/* 構成ツリーへのジャンプボタン */
.wi-detail .card .actions button.tree {
  background: #7c3aed;
}
.wi-detail .card .actions button.tree:hover { background: #6d28d9; }

/* 印刷用 */
@media print {
  .wi-head, .wi-search, .wi-list, .wi-detail .actions, .bom-tree .toolbar { display: none !important; }
  .wi-body { display: block; height: auto; }
  .wi-detail { padding: 0; background: #fff; overflow: visible; }
  .wi-detail .card { box-shadow: none; max-width: 100%; border: none; }
  body { overflow: visible; }
  .bom-tree .row[data-hidden="1"] { display: none !important; }
  .bom-tree .row[data-collapsed="1"] { background: #fff !important; }
}
</style>
</head>
<body>

<div class="wi-head">
  <h1>🔧 品目構成検索</h1>
  <span class="meta" id="wiMeta">—</span>
</div>

<div class="wi-search">
  <div class="wi-field">
    <label>品目コード／品目名</label>
    <input id="wiCode" type="search" placeholder="例: UDALS / DGBWH6 / UDA" autofocus>
  </div>
  <div class="wi-field">
    <label>製番（この品目に紐づく製番）</label>
    <select id="wiSeiban"><option value="">デフォルト構成</option></select>
  </div>
  <span style="color:#94a3b8;font-size:11px">または</span>
  <div class="wi-field">
    <label>製番で直接検索</label>
    <input id="wiSeibanDirect" type="search" placeholder="例: J26040070700">
  </div>
  <button class="clear" id="wiClear">クリア</button>
  <div class="hint">
    品目コードを選ぶとその品目に紐づく製番リストが自動表示されます。製番だけ直接検索することも可能。
  </div>
</div>

<div class="wi-body">
  <div class="wi-list">
    <table id="wiTable">
      <thead><tr>
        <th>品目コード</th><th>品目名</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="wi-detail" id="wiDetail">
    <div class="placeholder">
      <div class="ico">🔧</div>
      <div>品目コードで検索→候補をクリック→構成ツリーが表示されます</div>
    </div>
  </div>
</div>

<script src="work_instructions.js"
        onerror="window.WI_ITEMS={};window.WI_BOM_DEFAULT={};window.WI_BOM_BY_SEIBAN={};window.WI_META={};"></script>
<script>
const ITEMS         = window.WI_ITEMS || {};
const BOM_D         = window.WI_BOM_DEFAULT || {};
const BOM_SB        = window.WI_BOM_BY_SEIBAN || {};
const ITEM_SEIBANS  = window.WI_ITEM_SEIBANS || {};  // 親code→[製番リスト]
const ALL_SEIBANS   = window.WI_ALL_SEIBANS || [];
const META          = window.WI_META || {};

document.getElementById('wiMeta').textContent =
  `生成: ${META.generated||'?'} ／ 基準日: ${META.basis_date||'?'} ／ 品目 ${Object.keys(ITEMS).length.toLocaleString()}件 ／ デフォBOM親${(META.n_bom_default||0).toLocaleString()} ／ 製番別BOM${(META.n_bom_seiban||0)}製番`;

const seibanSel = document.getElementById('wiSeiban');
function refreshSeibanOptions(itemCode) {
  // 品目に紐づく製番のみ表示。なければデフォルト構成のみ
  seibanSel.innerHTML = '<option value="">デフォルト構成</option>';
  if (!itemCode) return;
  const list = ITEM_SEIBANS[itemCode] || [];
  if (list.length === 0) {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '(この品目に紐づく製番なし)';
    opt.disabled = true; seibanSel.appendChild(opt);
    return;
  }
  list.forEach(sb => {
    const opt = document.createElement('option');
    opt.value = sb; opt.textContent = sb;
    seibanSel.appendChild(opt);
  });
}

const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function searchItems() {
  const q = document.getElementById('wiCode').value.trim().toLowerCase();
  if (!q) return [];
  const result = [];
  for (const [code, info] of Object.entries(ITEMS)) {
    if (code.toLowerCase().includes(q) || (info.n||'').toLowerCase().includes(q)) {
      result.push({code, name: info.n||''});
      if (result.length >= 200) break;
    }
  }
  // 完全一致を先頭に
  result.sort((a,b) => {
    const ae = a.code.toLowerCase() === q ? 0 : 1;
    const be = b.code.toLowerCase() === q ? 0 : 1;
    if (ae !== be) return ae - be;
    return a.code.localeCompare(b.code);
  });
  return result;
}

function renderList() {
  const rows = searchItems();
  const tbody = document.querySelector('#wiTable tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" class="empty">品目コード／名で絞り込みしてください</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr data-code="${escapeHtml(r.code)}">
      <td class="code">${escapeHtml(r.code)}</td>
      <td>${escapeHtml(r.name)}</td>
    </tr>
  `).join('') + (rows.length === 200 ? '<tr><td colspan="2" class="empty">…他あり(絞り込みを推奨)</td></tr>' : '');
  tbody.querySelectorAll('tr[data-code]').forEach(tr => {
    tr.onclick = () => {
      tbody.querySelectorAll('tr').forEach(x => x.classList.remove('selected'));
      tr.classList.add('selected');
      const code = tr.dataset.code;
      refreshSeibanOptions(code);  // この品目に紐づく製番だけプルダウンに
      renderDetail(code);
    };
  });
}

// 製番直接検索: 入力された製番に紐づく親品目を一覧表示
function renderSeibanList() {
  const q = document.getElementById('wiSeibanDirect').value.trim();
  if (!q) { renderList(); return; }
  // 部分一致で BOM_SB のキー(製番)を絞る
  const hits = Object.keys(BOM_SB).filter(sb => sb.toLowerCase().includes(q.toLowerCase()));
  const tbody = document.querySelector('#wiTable tbody');
  if (hits.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" class="empty">該当する製番なし</td></tr>';
    return;
  }
  // 各製番→親品目をフラット展開
  const rows = [];
  hits.forEach(sb => {
    Object.keys(BOM_SB[sb]).forEach(parent => {
      rows.push({code: parent, name: (ITEMS[parent]||{}).n||'', seiban: sb});
    });
  });
  tbody.innerHTML = rows.slice(0, 200).map(r => `
    <tr data-code="${escapeHtml(r.code)}" data-seiban="${escapeHtml(r.seiban)}" class="seiban-row">
      <td class="code">${escapeHtml(r.code)}<br><small style="color:#6b21a8">製番:${escapeHtml(r.seiban)}</small></td>
      <td>${escapeHtml(r.name)}</td>
    </tr>
  `).join('');
  tbody.querySelectorAll('tr[data-code]').forEach(tr => {
    tr.onclick = () => {
      tbody.querySelectorAll('tr').forEach(x => x.classList.remove('selected'));
      tr.classList.add('selected');
      const code = tr.dataset.code;
      const sb = tr.dataset.seiban;
      refreshSeibanOptions(code);
      document.getElementById('wiSeiban').value = sb;
      renderDetail(code);
    };
  });
}

// BOM展開: 製番別優先, なければデフォルトにフォールバック
// 同じコードが直系祖先にあれば循環防止、それ以外は経路ごとに表示
const MAX_DEPTH = 8;
function getChildren(code, seiban) {
  if (seiban && BOM_SB[seiban] && BOM_SB[seiban][code]) return BOM_SB[seiban][code];
  if (BOM_D[code]) return BOM_D[code];
  return [];
}
function expandBom(rootCode, seiban) {
  const rows = []; // {id, lv, code, name, qty, hasChild, childCount, parentId}
  let usedSeibanBom = false, fallback = false;
  let nextId = 0;
  function walk(code, depth, ancestors, parentId) {
    if (depth > MAX_DEPTH) return;
    let children = [];
    if (seiban && BOM_SB[seiban] && BOM_SB[seiban][code]) {
      children = BOM_SB[seiban][code];
      usedSeibanBom = true;
    } else if (BOM_D[code]) {
      children = BOM_D[code];
      if (seiban && !BOM_SB[seiban]?.[code]) fallback = true;
    }
    for (const ch of children) {
      if (ancestors.has(ch.c)) continue;  // 循環防止
      const myId = nextId++;
      const grandChildren = getChildren(ch.c, seiban);
      // 循環で実際に展開できない孫を除外したカウント
      const realChildren = grandChildren.filter(g => !ancestors.has(g.c) && g.c !== ch.c);
      rows.push({
        id: myId, lv: depth, code: ch.c, name: (ITEMS[ch.c]||{}).n||'', qty: ch.q,
        hasChild: realChildren.length > 0, childCount: realChildren.length, parentId: parentId,
      });
      const next = new Set(ancestors); next.add(ch.c);
      walk(ch.c, depth + 1, next, myId);
    }
  }
  walk(rootCode, 1, new Set([rootCode]), -1);
  return { rows, usedSeibanBom, fallback };
}

let currentDetail = null;  // {code, seiban, rows, collapsed:Set}

function renderDetail(code) {
  const seiban = document.getElementById('wiSeiban').value;
  const itemName = (ITEMS[code]||{}).n||'';
  const { rows, usedSeibanBom, fallback } = expandBom(code, seiban);
  currentDetail = { code, seiban, name: itemName, rows, collapsed: new Set() };
  const indent = (lv) => '　'.repeat(Math.max(0,lv-1)) + (lv > 0 ? '└─ ' : '');
  let modeLabel = '<span class="mode default">デフォルト構成</span>';
  if (seiban && usedSeibanBom)       modeLabel = `<span class="mode seiban">製番別構成 (${escapeHtml(seiban)})</span>`;
  else if (seiban && !usedSeibanBom) modeLabel = `<span class="mode fallback">⚠ 製番別BOMなし → デフォルトで展開</span>`;
  const maxLv = rows.reduce((m, r) => Math.max(m, r.lv), 0);
  let bomHtml = `<div class="bom-tree" id="bomTree">
    <div class="toolbar">
      <button onclick="expandAll()">📂 全て展開</button>
      <button onclick="collapseAll()">📁 全て畳む</button>
      <button onclick="collapseToLevel(1)">Lv.1まで</button>
      ${maxLv >= 2 ? '<button onclick="collapseToLevel(2)">Lv.2まで</button>' : ''}
      ${maxLv >= 3 ? '<button onclick="collapseToLevel(3)">Lv.3まで</button>' : ''}
      <span class="summary">親行▼/▶クリックで個別に畳めます</span>
    </div>
    <div class="hdr"><div>品目</div><div class="qty">1台あたり</div></div>
    <div class="row lv0">
      <div class="name"><span class="toggle empty">●</span><span class="code">${escapeHtml(code)}</span> <span class="itemname">${escapeHtml(itemName)}</span></div>
      <div class="qty">1</div>
    </div>`;
  if (rows.length === 0) {
    bomHtml += `<div class="note">この品目には構成が登録されていません(=終端の購買部品・最終製品)</div>`;
  } else {
    for (const b of rows) {
      const tog = b.hasChild ? `<span class="toggle">▼</span>` : `<span class="toggle empty">·</span>`;
      const cc  = b.hasChild ? `<span class="child-count">(${b.childCount})</span>` : '';
      bomHtml += `<div class="row" data-id="${b.id}" data-lv="${b.lv}" data-parent="${b.parentId}"${b.hasChild?' data-haschild="1"':''}>
        <div class="name"><span class="indent">${indent(b.lv)}</span>${tog}<span class="code">${escapeHtml(b.code)}</span> <span class="itemname">${escapeHtml(b.name)}</span>${cc}</div>
        <div class="qty">${b.qty}</div>
      </div>`;
    }
  }
  bomHtml += `</div>`;
  const treeUrl = `results_production_2355.html#code=${encodeURIComponent(code)}&full=1`;
  document.getElementById('wiDetail').innerHTML = `
    <div class="card">
      <div class="head">
        <h2><span class="code">${escapeHtml(code)}</span> ${escapeHtml(itemName)}</h2>
        ${modeLabel}
        <div class="meta">
          <span>構成行数: <b>${rows.length}</b></span>
          <span>最大階層: <b>${maxLv}</b></span>
          <span>基準日: <b>${META.basis_date||'?'}</b></span>
        </div>
      </div>
      <div class="body">${bomHtml}</div>
      <div class="actions">
        <button onclick="window.print()">🖨 印刷</button>
        <button class="csv" onclick="downloadCsv()">📥 CSVダウンロード</button>
        <button class="tree" onclick="openTreeView('${escapeHtml(code)}')">🌳 構成ツリー画面で開く</button>
      </div>
    </div>
  `;
  // 親行のクリックでトグル
  document.querySelectorAll('#bomTree .row[data-haschild="1"]').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      toggleRow(parseInt(el.dataset.id, 10));
    });
  });
}

// ---- 畳み/展開ロジック ----
function applyCollapseState() {
  if (!currentDetail) return;
  const rows = currentDetail.rows;
  const collapsed = currentDetail.collapsed;
  // DFS順なので、collapsed の行を見つけたら lv <= 自分の lv が現れるまで非表示
  let hideUntilLv = -1;
  const tree = document.getElementById('bomTree');
  if (!tree) return;
  for (const r of rows) {
    const el = tree.querySelector(`.row[data-id="${r.id}"]`);
    if (!el) continue;
    if (hideUntilLv >= 0 && r.lv > hideUntilLv) {
      el.setAttribute('data-hidden', '1');
      continue;
    } else {
      hideUntilLv = -1;
      el.removeAttribute('data-hidden');
    }
    if (collapsed.has(r.id)) {
      el.setAttribute('data-collapsed', '1');
      hideUntilLv = r.lv;
    } else {
      el.removeAttribute('data-collapsed');
    }
  }
}
function toggleRow(id) {
  if (!currentDetail) return;
  if (currentDetail.collapsed.has(id)) currentDetail.collapsed.delete(id);
  else                                  currentDetail.collapsed.add(id);
  applyCollapseState();
}
function expandAll() {
  if (!currentDetail) return;
  currentDetail.collapsed.clear();
  applyCollapseState();
}
function collapseAll() {
  if (!currentDetail) return;
  currentDetail.collapsed = new Set(currentDetail.rows.filter(r => r.hasChild).map(r => r.id));
  applyCollapseState();
}
function collapseToLevel(lv) {
  if (!currentDetail) return;
  // 指定 lv の親行のみ畳む（lv より深い行はその親で隠される）
  currentDetail.collapsed = new Set(
    currentDetail.rows.filter(r => r.hasChild && r.lv >= lv).map(r => r.id)
  );
  applyCollapseState();
}
function openTreeView(code) {
  // 構成ツリー画面（既存の results_production_2355.html）を同タブで開く（親FUJIN.htmlのiframeを書き換え）
  // 戻る時に検索状態を復元するため、現在の検索状態を back ハッシュに埋め込む
  const seiban = (document.getElementById('wiSeiban').value || '').trim();
  const sbDir  = (document.getElementById('wiSeibanDirect').value || '').trim();
  let backHash = 'tab=work&code=' + encodeURIComponent(code);
  if (seiban) backHash += '&seiban=' + encodeURIComponent(seiban);
  if (sbDir)  backHash += '&sbdir='  + encodeURIComponent(sbDir);
  // 戻り先は相対URL "FUJIN.html#..." で固定（parent.location.hrefの読み取りはcross-originで
  // 例外を投げる可能性があるため、敢えて参照しない。tree側back処理は hash 部分しか使わない）
  const backUrl = 'FUJIN.html#' + backHash;
  const treeUrl = `results_production_2355.html#code=${encodeURIComponent(code)}&full=1&back=${encodeURIComponent(backUrl)}`;
  // 親FUJIN.htmlのiframeを直接書き換える（同タブ遷移、新タブを増やさない）
  try {
    if (window.parent && window.parent !== window) {
      const frame = window.parent.document.getElementById('main-frame');
      if (frame) {
        frame.src = treeUrl;
        return;
      }
    }
  } catch(e) { console.warn('parent frame access failed, fallback to self navigation:', e); }
  // フォールバック: スタンドアロンで開いている場合は自タブ遷移
  window.location.href = treeUrl;
}

// ---- URLハッシュから検索状態を復元 ----
function _parseHashParams() {
  const out = {};
  const h = (window.location.hash || '').replace(/^#/, '');
  if (!h) return out;
  h.split('&').forEach(p => {
    const eq = p.indexOf('=');
    if (eq < 0) return;
    const k = p.substring(0, eq);
    const v = p.substring(eq + 1);
    if (k) out[k] = decodeURIComponent(v || '');
  });
  return out;
}
function _selectRowByCode(code, seiban) {
  const tbody = document.querySelector('#wiTable tbody');
  if (!tbody) return false;
  const trs = Array.from(tbody.querySelectorAll('tr[data-code]'));
  const tr = trs.find(t => t.dataset.code === code);
  if (tr) {
    tr.click();
    if (seiban) {
      setTimeout(() => {
        const sel = document.getElementById('wiSeiban');
        if (sel && Array.from(sel.options).some(o => o.value === seiban)) {
          sel.value = seiban;
          sel.dispatchEvent(new Event('change'));
        }
      }, 0);
    }
    return true;
  }
  // 候補リストにない場合: 直接描画にフォールバック
  if (ITEMS[code] || BOM_D[code] || (seiban && BOM_SB[seiban] && BOM_SB[seiban][code])) {
    refreshSeibanOptions(code);
    if (seiban) {
      const sel = document.getElementById('wiSeiban');
      if (sel) sel.value = seiban;
    }
    renderDetail(code);
    return true;
  }
  return false;
}
function restoreFromHash() {
  const p = _parseHashParams();
  if (!p.code && !p.sbdir) return;
  if (p.sbdir) {
    // 製番直接検索モードで復元
    const inp = document.getElementById('wiSeibanDirect');
    if (inp) inp.value = p.sbdir;
    const codeInp = document.getElementById('wiCode');
    if (codeInp) codeInp.value = '';
    renderSeibanList();
    if (p.code) setTimeout(() => _selectRowByCode(p.code, p.seiban), 30);
    return;
  }
  // 通常の品目コード検索モードで復元
  const codeInp = document.getElementById('wiCode');
  if (codeInp) codeInp.value = p.code;
  const sbDirInp = document.getElementById('wiSeibanDirect');
  if (sbDirInp) sbDirInp.value = '';
  renderList();
  setTimeout(() => _selectRowByCode(p.code, p.seiban), 30);
}
// 初回ロード時 / hash変更時に復元
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', restoreFromHash);
} else {
  restoreFromHash();
}
window.addEventListener('hashchange', restoreFromHash);

function downloadCsv() {
  if (!currentDetail) return;
  const { code, name, seiban, rows } = currentDetail;
  const lines = ['階層,品目コード,品目名,1台あたり'];
  lines.push(`0,${code},${name.replace(/,/g,' ')},1`);
  for (const r of rows) {
    lines.push(`${r.lv},${r.code},${(r.name||'').replace(/,/g,' ')},${r.qty}`);
  }
  const csv = lines.join('\r\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,16).replace(/[-T:]/g,'');
  a.href = url; a.download = `品目構成_${code}${seiban?'_'+seiban:''}_${ts}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

document.getElementById('wiClear').addEventListener('click', () => {
  document.getElementById('wiCode').value = '';
  document.getElementById('wiSeibanDirect').value = '';
  refreshSeibanOptions('');
  document.querySelector('#wiTable tbody').innerHTML = '';
  document.getElementById('wiDetail').innerHTML = `<div class="placeholder"><div class="ico">🔧</div><div>品目コードで検索→候補をクリック→構成ツリーが表示されます</div></div>`;
});
function resetDetail() {
  currentDetail = null;
  refreshSeibanOptions('');
  document.getElementById('wiDetail').innerHTML = `<div class="placeholder"><div class="ico">🔧</div><div>品目コードで検索→候補をクリック→構成ツリーが表示されます</div></div>`;
}
document.getElementById('wiCode').addEventListener('input', () => {
  // 品目コード側で入力したら、製番直接検索をクリア＋詳細パネルをリセット
  document.getElementById('wiSeibanDirect').value = '';
  resetDetail();
  renderList();
});
document.getElementById('wiSeibanDirect').addEventListener('input', () => {
  // 製番直接検索側で入力したら、品目コード側をクリア＋詳細パネルをリセット
  document.getElementById('wiCode').value = '';
  resetDetail();
  renderSeibanList();
});
document.getElementById('wiSeiban').addEventListener('change', () => {
  if (currentDetail) renderDetail(currentDetail.code);
});
</script>
