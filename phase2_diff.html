<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Phase 2 ビフォーアフター - FUJIN</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans","Noto Sans JP", sans-serif;
  color: #1f2937; background: #f8fafc;
}
body { display: flex; flex-direction: column; overflow: hidden; }
.head {
  height: 50px; background: linear-gradient(135deg, #4338ca 0%, #7c3aed 100%); color: #fff;
  display: flex; align-items: center; padding: 0 18px; gap: 14px; flex-shrink: 0;
}
.head h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .02em; }
.head .meta { font-size: 11px; opacity: .9; }
.body { flex: 1; overflow: auto; padding: 16px 20px 40px; }
.note {
  padding: 12px 14px; background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px;
  font-size: 12.5px; color: #78350f; line-height: 1.7; max-width: 1100px; margin: 0 0 14px;
}
.note b { color: #92400e; }
.summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
.summary .kpi {
  background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 14px;
  min-width: 110px;
}
.summary .kpi .lbl { font-size: 11px; color: #64748b; }
.summary .kpi .val { font-size: 22px; font-weight: 700; color: #1f2937; margin-top: 3px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; max-width: 1100px; }
.card {
  background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 11px 14px;
  cursor: pointer; transition: all .15s;
}
.card:hover { border-color: #7c3aed; box-shadow: 0 3px 10px rgba(124,58,237,.18); transform: translateY(-1px); }
.card.active { border-color: #7c3aed; background: #faf5ff; }
.card .trans { font-size: 12px; font-weight: 600; color: #475569; line-height: 1.4; }
.card .arrow { color: #94a3b8; padding: 0 4px; }
.card .cnt { font-size: 22px; font-weight: 700; color: #6d28d9; margin-top: 6px; }
.detail {
  margin-top: 16px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
  max-width: 1300px; overflow: hidden;
}
.detail .dh { padding: 10px 16px; background: #faf5ff; border-bottom: 1px solid #e9d5ff;
  font-size: 13px; font-weight: 700; color: #581c87; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.detail .dh .csv { font-size: 11px; padding: 4px 10px; background: #6d28d9; color: #fff;
  border: none; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: 600; }
.detail .dh .csv:hover { background: #5b21b6; }
.detail .dh select, .detail .dh input { font-size: 11.5px; padding: 3px 7px; border: 1px solid #cbd5e1;
  border-radius: 5px; font-family: inherit; background: #fff; }
.detail table { width: 100%; border-collapse: collapse; font-size: 12px; }
.detail th { padding: 7px 10px; background: #f8fafc; color: #475569; font-weight: 600; text-align: left;
  border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; white-space: nowrap; }
.detail td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; font-variant-numeric: tabular-nums; }
.detail .code { font-family: "SF Mono","Menlo",monospace; color: #1e40af; font-weight: 600; }
.detail .seiban { font-family: "SF Mono","Menlo",monospace; color: #6b21a8; font-weight: 600; font-size: 11px; }
.detail .empty { padding: 30px; text-align: center; color: #94a3b8; }
.kind-tag { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 10.5px; font-weight: 700; }
.kind-order { background: #dbeafe; color: #1e40af; }
.kind-zombie { background: #fee2e2; color: #991b1b; }
.kind-ma_residue { background: #fef3c7; color: #78350f; }
.kind-idle { background: #f1f5f9; color: #475569; }
.kind-sold_via_parent, .kind-sold_self { background: #fde68a; color: #78350f; }
.kind-j_parent_alive { background: #bbf7d0; color: #166534; }
.kind-j_parent_completed { background: #fecaca; color: #7f1d1d; }
.kind-pure_delay { background: #fef9c3; color: #713f12; }
.kind-deep_idle { background: #fee2e2; color: #991b1b; }
.kind-no_record, .kind-no_parent, .kind-partial, .kind-orphan, .kind-top_item, .kind-stock, .kind-stock_ok, .kind-none { background: #e5e7eb; color: #475569; }
.no-data { text-align: center; padding: 60px 20px; color: #94a3b8; }
.no-data .ico { font-size: 64px; opacity: .3; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="head">
  <h1>🔬 Phase 2 ビフォーアフター</h1>
  <span class="meta" id="metaSpan">—</span>
</div>

<div class="body" id="body">
  <div class="note">
    <b>製番別BOMで判定ロジックを変えた結果の差分</b>。手配品目を J製番BOMで親辿りした時、J製番の最終製品に到達したら、そのJ製番の受注生死で再分類します。
    <b>結果は判断材料</b>として扱ってください。「破棄候補」と出た手配も、別のM/K受注で部品が使われている可能性があるため、最終確認は必須です。
  </div>
  <div class="summary" id="summary"></div>
  <div class="cards" id="cards"></div>
  <div id="detail"></div>
</div>

<script>
let DIFF = null;
let SELECTED = null;

// kind ラベル日本語化
const KIND_LABEL = {
  "order": "受注のため",
  "zombie": "ゾンビ手配",
  "ma_residue": "古い受注の残り",
  "idle": "計画放置疑い",
  "sold_via_parent": "売上済(親経由)",
  "sold_self": "売上済(自身)",
  "pure_delay": "要確認の遅れ",
  "deep_idle": "長期の遅れ",
  "j_parent_alive": "受注のため(J製番経由)",
  "j_parent_completed": "売上済(J製番経由) ⚠破棄候補",
  "no_record": "受注履歴なし",
  "no_parent": "親なし",
  "partial": "部分完納",
  "orphan": "製番紐付きなし",
  "top_item": "BOM最上位",
  "stock": "在庫維持",
  "stock_ok": "在庫充足",
  "none": "なし",
};

async function load() {
  try {
    const res = await fetch("phase2_diff.json?v=" + Date.now());
    if (!res.ok) throw new Error("fetch failed: " + res.status);
    DIFF = await res.json();
  } catch (e) {
    document.getElementById("body").innerHTML = `
      <div class="no-data">
        <div class="ico">📭</div>
        <div style="font-size:14px;color:#475569">Phase 2 差分データが見つかりません</div>
        <div style="font-size:11px;margin-top:8px">build_enhanced_summary.py を実行すると phase2_diff.json が生成されます</div>
      </div>`;
    return;
  }
  render();
}

function kindTag(kind) {
  const label = KIND_LABEL[kind] || kind;
  const cls = "kind-" + (kind || "none");
  return `<span class="kind-tag ${cls}">${escapeHtml(label)}</span>`;
}

function render() {
  document.getElementById("metaSpan").textContent = `生成: ${DIFF.generated||'?'} ／ 基準日: ${DIFF.basis_date||'?'} ／ 全${(DIFF.total_records||0).toLocaleString()}件中 ${DIFF.diff_count.toLocaleString()}件が変化`;
  // KPI
  const byPref = DIFF.by_pref || {};
  document.getElementById("summary").innerHTML = `
    <div class="kpi"><div class="lbl">全手配</div><div class="val">${DIFF.total_records.toLocaleString()}</div></div>
    <div class="kpi"><div class="lbl">分類変化</div><div class="val">${DIFF.diff_count.toLocaleString()}</div></div>
    ${Object.entries(byPref).map(([k,v])=>`<div class="kpi"><div class="lbl">${k||'製番なし'}製番</div><div class="val">${v.toLocaleString()}</div></div>`).join("")}
  `;
  // 遷移カード
  const trans = DIFF.transitions || [];
  document.getElementById("cards").innerHTML = trans.map(([key, cnt])=>{
    const [pre, post] = key.split(" → ");
    return `<div class="card" data-key="${escapeAttr(key)}">
      <div class="trans">
        ${kindTag(pre)}<span class="arrow">→</span>${kindTag(post)}
      </div>
      <div class="cnt">${cnt.toLocaleString()}件</div>
    </div>`;
  }).join("");
  document.querySelectorAll(".card[data-key]").forEach(el=>{
    el.addEventListener("click", ()=>renderDetail(el.dataset.key));
  });
}

function renderDetail(key) {
  SELECTED = key;
  document.querySelectorAll(".card[data-key]").forEach(el=>el.classList.toggle("active", el.dataset.key===key));
  const [pre, post] = key.split(" → ");
  const arr = (DIFF.records||[]).filter(r => r.before_kind===pre && r.after_kind===post);
  const headerHtml = `
    <div class="dh">
      <span>${kindTag(pre)} <span style="color:#94a3b8;margin:0 6px">→</span> ${kindTag(post)} <span style="margin-left:8px">(${arr.length.toLocaleString()}件)</span></span>
      <button class="csv" id="csvBtn">📥 CSVダウンロード</button>
    </div>`;
  if (arr.length===0) {
    document.getElementById("detail").innerHTML = `<div class="detail">${headerHtml}<div class="empty">該当データなし</div></div>`;
    return;
  }
  const rows = arr.slice(0, 500).map(r => `
    <tr>
      <td><span class="code">${escapeHtml(r.item_code||"")}</span></td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.item_name||"")}</td>
      <td><span class="seiban">${escapeHtml(r.seiban||"-")}</span></td>
      <td>${escapeHtml(r.schedule_date||"")}</td>
      <td style="text-align:right">${escapeHtml(String(r.demand||""))}</td>
      <td style="text-align:right">${escapeHtml(String(r.effective_stock||""))}</td>
      <td><span style="font-size:10.5px;color:#64748b">${escapeHtml(r.before_label||"")}</span></td>
      <td><span style="font-size:10.5px;color:#1f2937;font-weight:600">${escapeHtml(r.after_label||"")}</span></td>
    </tr>`).join("");
  document.getElementById("detail").innerHTML = `
    <div class="detail">
      ${headerHtml}
      <div style="max-height:64vh;overflow:auto">
        <table>
          <thead><tr>
            <th>品目コード</th><th>品目名</th><th>製番</th><th>手配予定日</th>
            <th style="text-align:right">所要量</th><th style="text-align:right">有効在庫</th>
            <th>前ラベル詳細</th><th>新ラベル詳細</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${arr.length > 500 ? `<div style="padding:10px 14px;font-size:11px;color:#94a3b8;text-align:center">上位500件のみ表示中 (全${arr.length.toLocaleString()}件)</div>` : ''}
      </div>
    </div>`;
  document.getElementById("csvBtn").addEventListener("click", ()=>downloadCsv(pre, post, arr));
}

function downloadCsv(pre, post, arr) {
  const headers = ["case_id","品目コード","品目名","製番","手配予定日","所要量","有効在庫","前kind","前ラベル","新kind","新ラベル"];
  const lines = [headers.join(",")];
  for (const r of arr) {
    const row = [
      r.case_id || "",
      r.item_code || "",
      (r.item_name||"").replace(/,/g,' '),
      r.seiban || "",
      r.schedule_date || "",
      r.demand || "",
      r.effective_stock || "",
      r.before_kind || "",
      (r.before_label||"").replace(/,/g,' '),
      r.after_kind || "",
      (r.after_label||"").replace(/,/g,' '),
    ];
    lines.push(row.join(","));
  }
  const blob = new Blob(["﻿" + lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,16).replace(/[-T:]/g,"");
  a.href = url; a.download = `Phase2差分_${pre}_to_${post}_${ts}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}

load();
</script>
</body>
</html>
